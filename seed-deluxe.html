    // ── Auth ──────────────────────────────────────────────────────────
    auth.onAuthStateChanged(user => {

        document.getElementById('login-section').style.display = 'none';
        document.getElementById('seed-section').style.display  = '';
        document.getElementById('logged-as').textContent = '✓ Autenticado como ' + user.email;

        document.getElementById('login-section').style.display = '';
        document.getElementById('seed-section').style.display  = 'none';
      }
    });

    async function loginGoogle() {
      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      document.getElementById('user-status').textContent = 'Abriendo ventana de Google…';
      try {
        await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      } catch (e) {
        document.getElementById('user-status').textContent = 'Error: ' + e.message;
        btn.disabled = false;
      }
    }

    function log(msg, cls = '') {
      const el = document.getElementById('log');
      el.innerHTML += `<div class="${cls}">${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    async function seed() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      document.getElementById('log').innerHTML = '';

      log('Iniciando…', 'info');

      const tenantRef = db.collection('tenants').doc('deluxeperfumes');

      // Settings
      try {
        await tenantRef.collection('settings').doc('main').set({
          nombre:      'Deluxe Perfumes',
          logo:        '',
          whatsapp:    '',
          accentColor: '#C9A84C',
        }, { merge: true });
        log('✓ settings/main guardado', 'ok');
      } catch (e) {
        log('✗ settings/main: ' + e.message, 'err');
      }

      // Productos
      let ok = 0, err = 0;
      for (const p of PRODUCTOS) {
        const { id, ...data } = p;
        try {
          await tenantRef.collection('productos').doc(id).set({
            ...data,
            activo:    true,
            imagen:    null,
            creadoEn:  firebase.firestore.FieldValue.serverTimestamp(),
          }, { merge: true });
          log(`✓ ${data.marca} — ${data.nombre}`, 'ok');
          ok++;
        } catch (e) {
          log(`✗ ${id}: ${e.message}`, 'err');
          err++;
        }
      }

      log('', '');
      log(`Listo: ${ok} productos cargados${err ? `, ${err} errores` : ''}.`, 'info');
      log('Puedes cerrar esta pestaña.', 'info');
      btn.textContent = 'Completado';
    }
