<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Canjear premio · SynapTech</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; min-height: 100dvh; background: #08090c; color: #f4f4f6;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      width: 100%; max-width: 380px; background: #0f1116;
      border: 1px solid rgba(255,255,255,.08); border-radius: 20px;
      padding: 24px; box-shadow: 0 20px 60px -20px rgba(0,0,0,.7);
    }
    .brand { text-align: center; margin-bottom: 18px; }
    .brand b { font-size: 13px; letter-spacing: .18em; color: rgba(255,255,255,.45); font-weight: 800; text-transform: uppercase; }
    h1 { font-size: 18px; margin: 0 0 4px; font-weight: 800; }
    .sub { font-size: 12.5px; color: rgba(255,255,255,.5); line-height: 1.5; margin: 0; }
    label { display:block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: rgba(255,255,255,.4); margin: 14px 0 6px; }
    input {
      width: 100%; height: 46px; background: #0a0a0d; border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px; padding: 0 14px; color: #fff; font-size: 15px; font-family: inherit;
    }
    input:focus { outline: none; border-color: #10b981; }
    button {
      width: 100%; height: 48px; border: 0; border-radius: 12px; font-family: inherit;
      font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 16px; transition: transform .1s, filter .15s;
    }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .5; cursor: default; }
    .btn-primary { background: #10b981; color: #05130d; }
    .btn-primary:hover { filter: brightness(1.06); }
    .btn-ghost { background: transparent; color: rgba(255,255,255,.55); border: 1px solid rgba(255,255,255,.12); height: 42px; font-size: 13px; }
    .prize {
      text-align: center; padding: 18px; border-radius: 16px; margin: 8px 0 4px;
      background: linear-gradient(135deg, rgba(16,185,129,.10), rgba(16,185,129,.03)); border: 1px solid rgba(16,185,129,.25);
    }
    .prize .gift { font-size: 30px; }
    .prize .name { font-size: 19px; font-weight: 800; margin: 6px 0 2px; }
    .prize .origen { font-size: 11px; color: rgba(255,255,255,.5); }
    .instru { margin-top: 12px; padding: 12px 14px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); font-size: 13px; color: rgba(255,255,255,.85); line-height: 1.5; }
    .ok-icon { width: 66px; height: 66px; border-radius: 50%; background: #10b981; color: #05130d; font-size: 34px; font-weight: 900; display:flex; align-items:center; justify-content:center; margin: 0 auto 14px; }
    .err { padding: 14px; border-radius: 12px; background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25); color: #fca5a5; font-size: 13.5px; line-height: 1.5; text-align: center; }
    .center { text-align: center; }
    .muted { font-size: 11px; color: rgba(255,255,255,.35); text-align: center; margin-top: 14px; line-height: 1.5; }
    .spin { width: 26px; height: 26px; border: 3px solid rgba(255,255,255,.15); border-top-color: #10b981; border-radius: 50%; animation: s 1s linear infinite; margin: 30px auto; }
    @keyframes s { to { transform: rotate(360deg); } }
    .who { font-size: 11px; color: rgba(255,255,255,.4); text-align:center; margin-top: 10px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><b>Canjear premio</b></div>

    <!-- Cargando -->
    <div id="loading"><div class="spin"></div></div>

    <!-- Login del staff -->
    <div id="login" class="hidden">
      <h1>Inicia sesión</h1>
      <p class="sub">Ingresa con tu cuenta del local (barbero o admin) para entregar este premio.</p>
      <label for="email">Correo</label>
      <input id="email" type="email" inputmode="email" autocomplete="username" placeholder="tucorreo@ejemplo.com" />
      <label for="pass">Contraseña</label>
      <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••" />
      <p id="loginErr" class="err hidden" style="margin-top:14px"></p>
      <button id="loginBtn" class="btn-primary">Entrar</button>
    </div>

    <!-- Preview del premio -->
    <div id="preview" class="hidden">
      <div class="prize">
        <div class="gift">🎁</div>
        <div class="name" id="pvName">—</div>
        <div class="origen" id="pvOrigen"></div>
      </div>
      <div class="instru" id="pvInstru"></div>
      <button id="confirmBtn" class="btn-primary">✓ Confirmar entrega</button>
      <div class="who" id="pvWho"></div>
      <button id="switchBtn" class="btn-ghost">Cambiar de cuenta</button>
    </div>

    <!-- Éxito -->
    <div id="success" class="hidden center">
      <div class="ok-icon">✓</div>
      <h1>¡Premio entregado!</h1>
      <p class="sub" id="okName"></p>
      <div class="instru" id="okInstru" style="margin-top:16px"></div>
    </div>

    <!-- Error -->
    <div id="error" class="hidden">
      <div class="err" id="errMsg">Algo salió mal.</div>
      <button id="retryBtn" class="btn-ghost" style="margin-top:14px">Reintentar</button>
    </div>

    <p class="muted">Powered by SynapTech · el cliente no puede canjear su propio premio.</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script>
  (function () {
    'use strict';
    var q = new URLSearchParams(location.search);
    var TENANT = (q.get('t') || '').trim();
    var RID    = (q.get('r') || '').trim();
    var TOKEN  = (q.get('k') || '').trim();

    var el = function (id) { return document.getElementById(id); };
    var show = function (id) {
      ['loading', 'login', 'preview', 'success', 'error'].forEach(function (s) {
        el(s).classList.toggle('hidden', s !== id);
      });
    };

    if (!TENANT || !RID) { el('errMsg').textContent = 'Link de canje inválido.'; show('error'); return; }

    var fnCanje = firebase.app().functions('us-central1').httpsCallable('canjearRecompensaLink');
    var _info = null;

    firebase.auth().onAuthStateChanged(function (user) {
      if (!user) { show('login'); return; }
      cargarPreview();
    });

    function cargarPreview() {
      show('loading');
      fnCanje({ tenant: TENANT, rid: RID, token: TOKEN, confirm: false })
        .then(function (res) {
          _info = res.data || {};
          el('pvName').textContent   = _info.prizeName || 'Recompensa';
          el('pvInstru').textContent = _info.instruccion || '';
          el('pvOrigen').textContent =
            _info.origen === 'referral_referrer' ? 'Por invitar a un amigo' :
            _info.origen === 'referral_referred' ? 'Por usar un código al registrarte' : '';
          var u = firebase.auth().currentUser;
          el('pvWho').textContent = u ? ('Sesión: ' + (u.email || u.uid)) : '';
          if (_info.status === 'approved') { el('errMsg').textContent = 'Este premio YA fue canjeado.'; show('error'); return; }
          if (_info.vencido)               { el('errMsg').textContent = 'Este premio expiró.'; show('error'); return; }
          show('preview');
        })
        .catch(function (e) { mostrarError(e); });
    }

    function mostrarError(e) {
      var msg = (e && e.message) ? e.message : 'No pudimos cargar el premio.';
      // Cuenta que no es staff: ofrecer cambiar de cuenta.
      if (e && e.code === 'functions/permission-denied') {
        msg = 'Esta cuenta no es del equipo del local. Inicia sesión con tu cuenta de barbero o admin.';
      }
      el('errMsg').textContent = msg;
      show('error');
    }

    // ── Login ──
    el('loginBtn').addEventListener('click', function () {
      var email = el('email').value.trim();
      var pass  = el('pass').value;
      if (!email || !pass) { el('loginErr').textContent = 'Ingresa correo y contraseña.'; el('loginErr').classList.remove('hidden'); return; }
      el('loginErr').classList.add('hidden');
      el('loginBtn').disabled = true; el('loginBtn').textContent = 'Entrando…';
      firebase.auth().signInWithEmailAndPassword(email, pass)
        .catch(function (e) {
          el('loginErr').textContent = /password|credential|user-not-found|invalid/i.test(e.code || '')
            ? 'Correo o contraseña incorrectos.' : (e.message || 'No se pudo iniciar sesión.');
          el('loginErr').classList.remove('hidden');
        })
        .finally(function () { el('loginBtn').disabled = false; el('loginBtn').textContent = 'Entrar'; });
    });
    el('pass').addEventListener('keydown', function (e) { if (e.key === 'Enter') el('loginBtn').click(); });

    // ── Confirmar entrega ──
    el('confirmBtn').addEventListener('click', function () {
      el('confirmBtn').disabled = true; el('confirmBtn').textContent = 'Confirmando…';
      fnCanje({ tenant: TENANT, rid: RID, token: TOKEN, confirm: true })
        .then(function (res) {
          var d = res.data || _info || {};
          el('okName').textContent   = d.prizeName || _info.prizeName || '';
          el('okInstru').textContent = d.instruccion || _info.instruccion || '';
          show('success');
        })
        .catch(function (e) {
          el('confirmBtn').disabled = false; el('confirmBtn').textContent = '✓ Confirmar entrega';
          mostrarError(e);
        });
    });

    // ── Cambiar de cuenta ──
    el('switchBtn').addEventListener('click', function () { firebase.auth().signOut(); });
    el('retryBtn').addEventListener('click', function () {
      if (firebase.auth().currentUser) cargarPreview(); else show('login');
    });
  })();
  </script>
</body>
</html>
