<!doctype html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Panel Admin | Barbería SaaS</title>

  <!-- Anti-FOUC. Debe ir inline y antes del CSS: aplica el tema guardado en el
       mismo tick en que el parser llega acá, o sea antes del primer paint. Si
       esto lo hiciera React (al montar el Sidebar), el usuario en modo claro
       vería el panel oscuro un instante en cada carga. Duplica a propósito la
       key de ThemeContext.jsx — no se puede importar sin volverse asíncrono. -->
  <script>
    try {
      if (localStorage.getItem('gestion-theme') === 'light') {
        document.documentElement.classList.add('light');
      }
    } catch (_) {}
  </script>

  <!-- PWA -->
