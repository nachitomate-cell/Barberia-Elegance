    // ── Auth ────────────────────────────────────────────────────────────
    firebase.auth().onAuthStateChanged(user => {
      const el = document.getElementById('auth-status');
      if (user) { el.textContent = `✓ ${user.email}`; el.style.color = '#6EE77A'; }
      else       { el.textContent = 'Sin sesión';      el.style.color = '#544A32'; }
    });

    async function doLogin() {
      const email = document.getElementById('inp-email').value.trim();
      const pass  = document.getElementById('inp-pass').value;
      if (!email || !pass) return;
      document.getElementById('btn-login').disabled = true;
      try {
        await firebase.auth().signInWithEmailAndPassword(email, pass);
      } catch(e) {
        document.getElementById('auth-status').textContent = e.message;
        document.getElementById('auth-status').style.color = '#F87171';
      }
      document.getElementById('btn-login').disabled = false;
    }

    document.getElementById('inp-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function setDoc(path, data) {
      const parts = path.split('/');
      let ref = db;
      for (let i = 0; i < parts.length; i++) {
        ref = i % 2 === 0 ? ref.collection(parts[i]) : ref.doc(parts[i]);
      }
      await ref.set(data, { merge: true });
      log(`  ✓ ${path}`, 'ok');
    }

    async function addDoc(col, data) {
      const parts = col.split('/');
      let ref = db;
      for (let i = 0; i < parts.length; i++) {
        ref = i % 2 === 0 ? ref.collection(parts[i]) : ref.doc(parts[i]);
      }
      const docRef = await ref.add(data);
      log(`  ✓ ${col}/${docRef.id}  →  ${data.nombre}`, 'ok');
    }

    async function seedProducts() {

      const col = `tenants/${TENANT}/productos`;
      for (const p of PRODUCTS) {
        await addDoc(col, { ...p, creadoEn: firebase.firestore.FieldValue.serverTimestamp() });
      }
      log(`\n✔ ${PRODUCTS.length} productos cargados`, 'ok');
    }

    async function patchImages(force = false) {
      const btn = force ? document.getElementById('btn-repatch') : document.getElementById('btn-patch');
      btn.disabled = true;
      logEl.innerHTML = '';
      log(force ? '── Re-parcheando todas las imágenes… ──' : '── Parcheando imágenes faltantes… ──', 'hd');
      try {
        const snap = await db.collection(`tenants/${TENANT}/productos`).get();

        // Combina el mapa del seed + el mapa del catálogo real
        const imageMap = { ...CATALOG_IMAGES };
        PRODUCTS.forEach(p => { if (p.imagen) imageMap[p.nombre.trim().toLowerCase()] = p.imagen; });

        let updated = 0, skipped = 0, noMatch = 0;
        const batch = db.batch();
        snap.docs.forEach(d => {
          const data = d.data();
          const key = (data.nombre || '').trim().toLowerCase();
          const url = imageMap[key];
          if (!url) { log(`  — sin imagen para: ${data.nombre}`, ''); noMatch++; return; }
          if (!force && data.imagen) { skipped++; return; }
          batch.update(d.ref, { imagen: url });
          updated++;
          log(`  ✓ ${data.nombre}`, 'ok');
        });

        if (updated > 0) {
          await batch.commit();
          log(`\n✔ ${updated} actualizado${updated!==1?'s':''}. ${skipped} sin cambios. ${noMatch} sin mapeo.`, 'ok');
        } else {
          log(`\n— Nada que actualizar (${skipped} ya tenían imagen, ${noMatch} sin mapeo).`, 'ok');
        }
      } catch (e) {
        log('✘ ' + e.message, 'err');
      }
      btn.disabled = false;
    }

    async function clearProducts() {
      if (!confirm('¿Borrar todos los productos de deluxeperfumes? Esta acción no se puede deshacer.')) return;
      const btn = document.getElementById('btn-clear');
      btn.disabled = true;
      logEl.innerHTML = '';
      log('── Borrando productos… ──', 'hd');
      try {
        const snap = await db.collection(`tenants/${TENANT}/productos`).get();
        const batch = db.batch();
        snap.docs.forEach(d => batch.delete(d.ref));
        await batch.commit();
        log(`✔ ${snap.size} productos eliminados`, 'ok');
      } catch (e) {
        log('✘ ' + e.message, 'err');
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
