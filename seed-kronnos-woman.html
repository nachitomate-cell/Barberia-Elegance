    function write(msg, cls) {
      log.innerHTML += `<span class="${cls||''}">${msg}\n</span>`;

    async function setDoc(path, data) {
      const parts = path.split('/');
      let ref = db;
      for (let i = 0; i < parts.length; i++) {
        ref = i % 2 === 0 ? ref.collection(parts[i]) : ref.doc(parts[i]);
      }
      await ref.set(data, { merge: true });
      write(`  ✓ ${path}`, 'ok');
    }

      btn.disabled = true;

      try {
        write('── Equipo ──');

        });

          nombre: 'Ernesto', activo: true, disponible: true, foto: null, horario: horarioBase,
          rol: 'estilista', sedes: [SEDE_ID],
        });
        await setDoc(`tenants/${TENANT}/barberos/heydee`, {
          nombre: 'Heydee', activo: true, disponible: true, foto: null, horario: horarioBase,
          rol: 'estilista', sedes: [SEDE_ID],
        });

        write('\n── Configuración general ──');
        await setDoc(`tenants/${TENANT}/configuracion/main`, {
          horarioInicio:    '09:30',
          horarioFin:       '23:00',
          intervaloMinutos: 30,
          diasLaborales:    [0, 1, 2, 3, 4, 5, 6],
          telefonoAdmin:    '',
          diasBloqueados:   [],
          colacion:         null,
          diasConfig:       {},
          sedeId:           SEDE_ID,
        });

        write('\n── Servicios · Woman (36) ──');
        for (let i = 0; i < servicios.length; i++) {
          const s = servicios[i];
          await setDoc(`tenants/${TENANT}/servicios/${s.id}`, {
            nombre: s.nombre, categoria: s.categoria,
            duracion: s.duracion, precio: s.precio,
            disponible: true, orden: i + 1,
            descripcion: s.descripcion || '',
            sedeId: SEDE_ID,
          });
        }

        write('\n── Anuncio ──');
        await setDoc(`tenants/${TENANT}/config/anuncio`, {
          titulo: 'Belleza y estética en Limache',
          descripcion: 'Espacio de belleza con más de 12 años de experiencia. Manicura, cabello, masajes y más.',
          imagen: '', ctaTexto: 'Reservar ahora', ctaUrl: '/', activo: true,
          versionId: Date.now().toString(),
        });

        write('\n✅ Seed Woman completado.', 'ok');
        write('   Prueba: https://kronnoswoman.synaptechspa.cl', 'info');
      } catch (e) {
        write(`\n❌ Error: ${e.message}`, 'err');
      }
      btn.disabled = false;
    }
  </script>

</html>
