<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Seed · Kronnos Studio Limache</title>
  <style>
    body { font-family: monospace; background: #0a0a0a; color: #94a3b8; padding: 2rem; }
    h1   { color: #f97316; }
    code { color: #f0a; }
    button { padding: .75rem 1.5rem; background: #f97316; color: #fff; border: none;
             border-radius: .5rem; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    pre  { background: #1a1a1a; padding: 1rem; border-radius: .5rem; white-space: pre-wrap; margin-top: 1rem; }
    .ok  { color: #34d399; }
    .err { color: #f87171; }
    .warn{ color: #fbbf24; }
    .info{ color: #60a5fa; }
  </style>
</head>
<body>
  <h1>Seed — Kronnos Studio Limache</h1>
  <p>Popula <code>tenants/kronnos_limache/</code> con: barberos, servicios (9 del Excel), configuración y anuncio.</p>
  <p class="info">Camino 1.5: premios/rangos/descuentos NO se cargan aquí — viven en pool marca. Ejecuta primero <code>/seed-kronnos-marca.html</code>.</p>
  <button id="btn" onclick="run()">▶ Ejecutar Seed Limache</button>
  <pre id="log">Listo para ejecutar…</pre>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js?v=1.3"></script>
  <script>
    const TENANT = 'kronnos_limache';
    const SEDE_ID = 'limache';
    const log = document.getElementById('log');
    const btn = document.getElementById('btn');

    function write(msg, cls) {
      log.innerHTML += `<span class="${cls||''}">${msg}\n</span>`;
    }

    async function setDoc(path, data) {
      const parts = path.split('/');
      let ref = db;
      for (let i = 0; i < parts.length; i++) {
        ref = i % 2 === 0 ? ref.collection(parts[i]) : ref.doc(parts[i]);
      }
      await ref.set(data, { merge: true });
      write(`  ✓ ${path}`, 'ok');
    }

    const horarioBase = {
      '1': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '2': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '3': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '4': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '5': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '6': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '0': { activo: false, inicio: '10:30', fin: '19:00', descansos: [] },
    };

    // Servicios reales del Excel kronnos-configuracion (2).xlsx — Limache (9)
    const servicios = [
      { id: 'pack-toallas-calientes', nombre: 'Pack Toallas Calientes',    categoria: 'PACKS KRONNOS',        duracion: 60, precio: 24990, descripcion: 'Incluye corte de cabello y perfilado de barba con productos premium Viking, toallas caliente y fría, lavado de cabello y asesoramiento' },
      { id: 'corte-masculino',        nombre: 'Corte Masculino',            categoria: 'Servicios Masculinos', duracion: 45, precio: 14990, descripcion: 'Incluye asesoría antes y después del corte, lavado de cabello y styling.' },
      { id: 'corte-barba',            nombre: 'Corte y Barba',              categoria: 'Servicios Masculinos', duracion: 60, precio: 20990, descripcion: 'Corte + perfilado de barba' },
      { id: 'precision-masculino',    nombre: 'Precisión Masculino',        categoria: 'Servicios Masculinos', duracion: 50, precio: 16990, descripcion: 'Corte masculino con técnicas de precisión.' },
      { id: 'corte-bebe',             nombre: 'Corte Bebé',                 categoria: 'Servicios Masculinos', duracion: 20, precio: 8990,  descripcion: 'Niños menores de 4 años.' },
      { id: 'corte-escolar',          nombre: 'Corte Escolar',              categoria: 'Servicios Masculinos', duracion: 30, precio: 12990, descripcion: 'Corte clásico sin degradado.' },
      { id: 'barba-simple',           nombre: 'Barba Simple',               categoria: 'Servicios Masculinos', duracion: 30, precio: 12990, descripcion: 'Perfilado de barba con definición de contornos.' },
      { id: 'barba-premium',          nombre: 'Barba Premium',              categoria: 'Servicios Masculinos', duracion: 35, precio: 15990, descripcion: 'Perfilado y afeitado con toallas calientes.' },
      { id: 'perfilado-ceja',         nombre: 'Perfilado Ceja',             categoria: 'Servicios Masculinos', duracion: 10, precio: 3000,  descripcion: 'Perfilado de cejas para definir su forma.' },
    ];

    async function run() {
      btn.disabled = true;
      log.innerHTML = '';
      try {
        write('── Equipo ──');
        await setDoc(`tenants/${TENANT}/barberos/evelyn-contreras`, {
          nombre: 'Evelyn Contreras', activo: true, disponible: true, foto: null, horario: horarioBase,
          sedes: ['penablanca', 'limache'], // cruza 2 sedes
        });
        await setDoc(`tenants/${TENANT}/barberos/claudio`, {
          nombre: 'Claudio', activo: true, disponible: true, foto: null, horario: horarioBase,
          sedes: [SEDE_ID],
        });
        await setDoc(`tenants/${TENANT}/barberos/cristian-orostica`, {
          nombre: 'Cristian Orostica', activo: true, disponible: true, foto: null, horario: horarioBase,
          sedes: [SEDE_ID],
        });
        await setDoc(`tenants/${TENANT}/barberos/orlando-palacios`, {
          nombre: 'Orlando Palacios', activo: true, disponible: true, foto: null, horario: horarioBase,
          sedes: [SEDE_ID],
        });
        await setDoc(`tenants/${TENANT}/barberos/victor`, {
          nombre: 'Víctor', activo: true, disponible: true, foto: null, horario: horarioBase,
          sedes: [SEDE_ID],
        });

        write('\n── Configuración general ──');
        await setDoc(`tenants/${TENANT}/configuracion/main`, {
          horarioInicio:    '10:30',
          horarioFin:       '19:00',
          intervaloMinutos: 30,
          diasLaborales:    [1, 2, 3, 4, 5, 6],
          telefonoAdmin:    '',
          diasBloqueados:   [],
          colacion:         null,
          diasConfig:       {},
          sedeId:           SEDE_ID,
        });

        write('\n── Servicios · Limache (9) ──');
        for (let i = 0; i < servicios.length; i++) {
          const s = servicios[i];
          await setDoc(`tenants/${TENANT}/servicios/${s.id}`, {
            nombre: s.nombre, categoria: s.categoria,
            duracion: s.duracion, precio: s.precio,
            disponible: true, orden: i + 1,
            descripcion: s.descripcion,
            sedeId: SEDE_ID,
          });
        }

        write('\n── Anuncio ──');
        await setDoc(`tenants/${TENANT}/config/anuncio`, {
          titulo: 'Espacio unisex en Limache',
          descripcion: 'Barbería y estilismo profesional con más de 12 años de experiencia. Agenda tu hora online.',
          imagen: '', ctaTexto: 'Reservar ahora', ctaUrl: '/', activo: true,
          versionId: Date.now().toString(),
        });

        write('\n✅ Seed Limache completado.', 'ok');
        write('   Prueba: https://kronnoslimache.synaptechspa.cl', 'info');
      } catch (e) {
        write(`\n❌ Error: ${e.message}`, 'err');
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
