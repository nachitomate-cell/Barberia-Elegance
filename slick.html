<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Slick Gorilla · Aura Salon</title>
  <meta name="theme-color" content="#f8fafc">
  <meta name="description" content="Slick Gorilla — cera, polvo texturizante y styling profesional para hombres. Disponible en Aura Salon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --bg:        #f6f7f9;
      --surface:   #ffffff;
      --surface-2: #eef1f4;
      --border:    #e5e7eb;  /* gray-200 */
      --border-2:  #d1d5db;  /* gray-300 */
      --ink:       #0b0f14;  /* casi negro */
      --ink-2:     #1f2937;
      --ink-muted: #6b7280;  /* gray-500 */
      --ink-soft:  #9ca3af;
      --accent:    #0b0f14;
      --accent-2:  #1f2937;
      --ok:        #059669;
      --ok-bg:     #ecfdf5;
      --sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --display: 'Bebas Neue', 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    /* ───────────────────────── HERO (compact horizontal) ───────────────────────── */
    .hero {
      position: relative;
      padding: 10px 16px 14px;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(11,15,20,0.04) 1px, transparent 0);
      background-size: 18px 18px;
      opacity: 0.65;
      pointer-events: none;
    }
    .hero-inner { position: relative; z-index: 1; max-width: 60rem; margin: 0 auto; }

    /* Fila superior: back button + serie chip */
    .hero-topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin-bottom: 10px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--ink-muted);
      font-size: 12.5px; font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      transition: color .2s ease, background .2s ease, border-color .2s ease;
      cursor: pointer;
    }
    .back-btn:hover { color: var(--ink); background: var(--surface); border-color: var(--border-2); }
    .back-btn i { font-size: 15px; }
    .back-btn.done {
      background: var(--ok-bg);
      border-color: rgba(5,150,105,0.35);
      color: var(--ok);
    }
    .back-btn.done:hover { background: #d1fae5; border-color: var(--ok); }

    .hero-serie {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--display);
      font-size: 11.5px; font-weight: 400;
      letter-spacing: 0.22em;
      color: var(--ink);
      padding: 4px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    /* Fila principal: logo + copy horizontal */
    .hero-row {
      display: flex; align-items: center; gap: 14px;
      text-align: left;
    }
    .hero-logo-wrap {
      position: relative;
      flex-shrink: 0;
      width: 72px; height: 72px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px;
    }
    .hero-logo {
      width: 100%; height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(11,15,20,0.10));
    }
    .hero-copy { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .hero-tagline {
      font-size: 13px; font-weight: 500; line-height: 1.4;
      color: var(--ink-2);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .hero-partner {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.10em;
      color: var(--ink-muted);
    }
    .hero-partner-name { color: var(--ink); font-weight: 800; letter-spacing: 0.05em; }

    @media (min-width: 640px) {
      .hero { padding: 12px 20px 16px; }
      .hero-logo-wrap { width: 88px; height: 88px; }
      .hero-tagline { font-size: 14px; }
    }

    /* ───────────────────────── CATÁLOGO ───────────────────────── */
    .catalog {
      max-width: 64rem; margin: 0 auto;
      padding: 20px 16px 96px;
    }
    /* Título unificado: "Catálogo (6)" en una sola línea */
    .section-label {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--display);
      font-size: 16px; font-weight: 400;
      letter-spacing: 0.20em;
      color: var(--ink);
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .section-label-count {
      font-family: var(--sans);
      font-size: 13px; font-weight: 600;
      color: var(--ink-muted);
      letter-spacing: 0.02em;
      text-transform: none;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
      margin-left: 4px;
    }
    .grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }
    @media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } }
    @media (min-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 18px; } }

    /* Card */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color .25s ease, transform .25s ease, box-shadow .25s ease;
    }
    .card:hover {
      border-color: var(--ink);
      transform: translateY(-3px);
      box-shadow: 0 18px 40px -22px rgba(11,15,20,0.30);
    }
    .card-img-wrap {
      position: relative;
      aspect-ratio: 4 / 5;
      background: var(--surface-2);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: opacity .3s ease, transform .5s cubic-bezier(0.16,1,0.3,1);
    }
    .card:hover .card-img-wrap img { transform: scale(1.04); }
    .img-loading { opacity: 0; }
    .card-img-ph {
      font-size: 44px; color: var(--border-2);
    }

    /* Overlay del bottom con gradiente para leer el precio flotante */
    .card-img-wrap::after {
      content: '';
      position: absolute; inset: auto 0 0 0; height: 55%;
      background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.90) 75%, #ffffff 100%);
      pointer-events: none;
    }

    /* Precio flotante */
    .card-price-float {
      position: absolute; left: 12px; right: 12px; bottom: 10px;
      z-index: 1;
      display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
    }
    .price {
      font-family: var(--display);
      font-size: 26px; letter-spacing: 0.02em;
      color: var(--ink);
      line-height: 1;
    }
    .price-orig {
      font-size: 12px; color: var(--ink-soft); text-decoration: line-through;
      letter-spacing: 0.02em;
    }
    .price-consult {
      font-size: 12px; font-weight: 600; color: var(--ink-muted);
      font-style: italic;
    }

    .stock-badge {
      position: absolute; top: 10px; left: 10px;
      z-index: 2;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.10em;
      padding: 4px 9px; border-radius: 999px;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
    }
    .stock-out { color: #991b1b; border-color: rgba(153,27,27,0.28); }
    .stock-low { color: #92400e; border-color: rgba(146,64,14,0.28); }
    .stock-in  { color: var(--ok); border-color: rgba(5,150,105,0.28); }

    /* Content dentro de la card */
    .card-body {
      padding: 12px 14px 14px;
      display: flex; flex-direction: column; gap: 6px;
      flex: 1;
    }
    .card-brand {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      color: var(--ink-soft);
      text-transform: uppercase;
    }
    .card-name {
      font-size: 14px; font-weight: 700; color: var(--ink);
      line-height: 1.28;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* Píldoras de atributos: reemplazan la descripción larga. Rápidas
       de escanear, máx 3 por card. Auto-extraídas de la descripción o del
       campo `tags` si el producto lo define explícitamente. */
    .card-tags {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-top: 2px;
    }
    .tag {
      display: inline-flex; align-items: center;
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.01em;
      color: var(--ink-2);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 6px;
      white-space: nowrap;
    }
    .cross-pill {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 2px;
      font-size: 10px; font-weight: 600;
      color: var(--ink-2);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 6px;
      align-self: flex-start;
    }
    .card-foot {
      margin-top: auto;
      padding-top: 10px;
    }

    .add-btn, .buy-btn {
      width: 100%;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      border: 1px solid var(--accent);
      color: #ffffff;
      background: var(--accent);
      padding: 10px 12px; border-radius: 12px;
      letter-spacing: 0.02em;
      transition: background .2s ease, color .2s ease, border-color .2s ease, box-shadow .2s ease, transform .12s ease;
    }
    .add-btn:hover, .buy-btn:hover { background: var(--accent-2); border-color: var(--accent-2); box-shadow: 0 6px 14px -6px rgba(11,15,20,0.40); }
    .add-btn:active, .buy-btn:active { transform: scale(0.97); }
    .add-btn.active {
      background: var(--ok-bg);
      border-color: var(--ok);
      color: var(--ok);
      box-shadow: 0 0 0 3px rgba(5,150,105,0.10);
    }
    .add-btn.active:hover { background: #d1fae5; box-shadow: 0 0 0 3px rgba(5,150,105,0.15); }
    .add-btn i, .buy-btn i { font-size: 15px; }
    /* Pulso al activar/desactivar — feedback rápido de que el click funcionó. */
    @keyframes addPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    .add-btn.pulse { animation: addPulse .35s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* Skeletons */
    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      height: 320px;
      overflow: hidden;
      position: relative;
    }
    .skeleton-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(11,15,20,0.06), transparent);
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    /* Empty state */
    .empty {
      text-align: center;
      max-width: 28rem; margin: 32px auto;
      padding: 40px 20px;
      background: var(--surface);
      border: 1px dashed var(--border-2);
      border-radius: 18px;
    }
    .empty-ic {
      width: 64px; height: 64px; margin: 0 auto 16px;
      border-radius: 50%;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-muted);
      font-size: 28px;
    }
    .empty h3 { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .empty p { font-size: 13px; color: var(--ink-muted); line-height: 1.55; }
    .empty-cta {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 20px;
      font-size: 13px; font-weight: 700;
      color: #ffffff; background: var(--accent);
      padding: 10px 20px; border-radius: 12px;
      transition: background .2s ease, transform .12s ease;
    }
    .empty-cta:hover { background: var(--accent-2); }
    .empty-cta:active { transform: scale(0.97); }

    /* Foot note */
    .foot-note {
      text-align: center; font-size: 12px; color: var(--ink-muted);
      max-width: 30rem; margin: 8px auto 32px;
      padding: 0 16px;
    }
    .foot-note a { color: var(--ink); font-weight: 700; text-decoration: underline; text-underline-offset: 3px; }

    /* ── Barra flotante ── */
    .sticky-bar {
      position: fixed; left: 12px; right: 12px; bottom: 12px;
      max-width: 42rem; margin: 0 auto;
      background: var(--ink);
      color: #ffffff;
      border: 1px solid var(--ink);
      border-radius: 18px; padding: 14px 16px;
      box-shadow: 0 20px 40px -12px rgba(11,15,20,0.35);
      z-index: 50;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      transform: translateY(160%); opacity: 0;
      transition: transform .4s cubic-bezier(0.16,1,0.3,1), opacity .4s ease;
    }
    .sticky-bar.visible { transform: translateY(0); opacity: 1; }
    .sticky-info { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
    .sticky-count { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.60); text-transform: uppercase; letter-spacing: 0.10em; }
    .sticky-total { font-family: var(--display); font-size: 24px; letter-spacing: 0.02em; color: #ffffff; }
    .sticky-cta {
      display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
      font-size: 13px; font-weight: 700; color: var(--ink);
      background: #ffffff;
      padding: 10px 18px; border-radius: 12px; cursor: pointer; border: none;
      transition: background .2s ease, transform .12s ease;
    }
    .sticky-cta:hover { background: #f1f5f9; }
    .sticky-cta:active { transform: scale(0.96); }
    body.has-cart { padding-bottom: 100px; }
  </style>
</head>
<body>
  <!-- ─────────────── HERO (compact horizontal) ─────────────── -->
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-topbar">
        <a id="backBtn" class="back-btn" data-label-empty="Volver" data-label-done="Listo">
          <i id="backBtnIcon" class="ph-bold ph-arrow-left"></i>
          <span id="backBtnText">Volver</span>
        </a>
        <span class="hero-serie">Grooming</span>
      </div>
      <div class="hero-row">
        <div class="hero-logo-wrap">
          <img class="hero-logo" src="/aura/slick.webp" alt="Slick Gorilla">
        </div>
        <div class="hero-copy">
          <p class="hero-tagline">Cera, polvo texturizante y styling profesional. La línea que usamos en cada corte.</p>
          <div class="hero-partner">
            <span>Disponible en</span>
            <span class="hero-partner-name" id="sedeName">Aura Salon</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ─────────────── CATÁLOGO ─────────────── -->
  <main class="catalog">
    <h2 class="section-label">
      Catálogo <span id="sectionCount" class="section-label-count"></span>
    </h2>
    <div id="grid" class="grid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </main>

  <p class="foot-note">
    Productos disponibles en el local · <a id="waFoot" href="#" target="_blank" rel="noopener">Escríbenos por WhatsApp</a>
  </p>

  <div id="stickyBar" class="sticky-bar" role="region" aria-label="Resumen de productos">
    <div class="sticky-info">
      <span id="stickyCount" class="sticky-count"></span>
      <span id="stickyTotal" class="sticky-total"></span>
    </div>
    <button id="stickyCta" class="sticky-cta" type="button">Continuar con la reserva <i class="ph-bold ph-arrow-right"></i></button>
  </div>

  <!-- Firebase (compat) + config del tenant -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="/config.js"></script>
  <script src="/firebase-config.js?v=1.3"></script>

  <script>
    (function () {
      'use strict';

      // ── Resolución de tenant ──────────────────────────────────
      // Módulo exclusivo de Aura Salon. Cualquier otro tenant se redirige
      // a su propia reserva en vez de mostrar catálogo ajeno.
      var TENANT_ID = new URLSearchParams(location.search).get('local')
                   || window.CURRENT_TENANT_ID
                   || 'aura';
      if (TENANT_ID !== 'aura') {
        location.replace('/?local=' + encodeURIComponent(TENANT_ID));
        return;
      }

      // ── Carrito compartido con la agenda ──────────────────────
      var CART_KEY = 'reservaProductos_' + TENANT_ID;
      var Cart = {
        load:  function () { try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; } catch (_) { return []; } },
        save:  function (a) { try { localStorage.setItem(CART_KEY, JSON.stringify(a || [])); } catch (_) {} },
        toggle: function (prod) {
          var a = this.load();
          var i = a.findIndex(function (p) { return p.id === prod.id; });
          if (i === -1) a.push(prod); else a.splice(i, 1);
          this.save(a);
          return i === -1;
        },
        total: function () { return this.load().reduce(function (s, p) { return s + (Number(p.precio) || 0); }, 0); },
        count: function () { return this.load().length; },
      };

      var SHOP = window.SHOP || {};
      var sedeName = SHOP.nombreCorto || SHOP.nombre || 'Aura Salon';
      document.getElementById('sedeName').textContent = sedeName;

      // WhatsApp de la sede (fallback: Instagram Slick Gorilla).
      var SLICK_IG = 'https://www.instagram.com/slickgorilla/';
      var waDigits = String(SHOP.telefono || '').replace(/\D/g, '');
      function waLink(msg) {
        if (!waDigits) return SLICK_IG;
        return 'https://wa.me/' + waDigits + '?text=' + encodeURIComponent(msg);
      }
      var footWa = document.getElementById('waFoot');
      footWa.href = waLink('Hola ' + sedeName + '! Quiero consultar por los productos Slick Gorilla.');

      // ── Volver a la reserva ───────────────────────────────────
      // El label cambia según el estado del carrito:
      //   · Vacío  → "Volver"   (icono flecha, tono neutro)
      //   · Con productos → "Listo" (icono check, tono verde)
      // Así el cliente que ya agregó algo no siente que está cancelando.
      var back      = document.getElementById('backBtn');
      var backText  = document.getElementById('backBtnText');
      var backIcon  = document.getElementById('backBtnIcon');
      var agendaHref = '/?local=' + encodeURIComponent(TENANT_ID);
      back.href = agendaHref;
      function refreshBackBtn() {
        var hasItems = Cart.count() > 0;
        if (hasItems) {
          back.classList.add('done');
          backText.textContent = back.dataset.labelDone || 'Listo';
          backIcon.className = 'ph-bold ph-check';
        } else {
          back.classList.remove('done');
          backText.textContent = back.dataset.labelEmpty || 'Volver';
          backIcon.className = 'ph-bold ph-arrow-left';
        }
      }
      back.addEventListener('click', function (e) {
        e.preventDefault();
        if (history.length > 1) history.back();
        else location.href = agendaHref;
      });

      // ── Helpers ───────────────────────────────────────────────
      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
      function fmtPrice(n) { return '$' + Number(n).toLocaleString('es-CL'); }
      // Match flexible: aparece cualquier producto cuyo nombre, marca o
      // descripción contenga "slick" o "gorilla" (case-insensitive).
      function isSlick(p) {
        var haystack = ((p.marca || '') + ' ' + (p.nombre || '') + ' ' + (p.descripcion || '')).toLowerCase();
        return haystack.indexOf('slick') !== -1 || haystack.indexOf('gorilla') !== -1;
      }
      function stockBadge(p) {
        // Solo escasez / agotado — el badge "Disponible" es ruido visual
        // cuando la mayoría del catálogo lo está. Reserva el badge para
        // señales de urgencia real.
        if (p.stock == null || p.stock === '') return '';
        var s = Number(p.stock);
        if (s <= 0) return '<span class="stock-badge stock-out">Agotado</span>';
        if (s <= 3) return '<span class="stock-badge stock-low">Últimas ' + s + '</span>';
        return '';
      }
      function crossPill(p) {
        var u = p.usadoEn || p.servicioRelacionado;
        if (!u) return '';
        return '<span class="cross-pill">✨ Usado en ' + esc(u) + '</span>';
      }
      // Extracción de atributos rápidos ("píldoras") desde la descripción y
      // el nombre. Reemplaza el bloque de texto que se truncaba con "...".
      // Prioridad: si el producto trae `tags:[]` explícito, se usa eso.
      // Si no, mapeo por keywords comunes en grooming. Máx 3 pills por card.
      var TAG_RULES = [
        // fijación
        [/\b(fijaci[oó]n\s+fuerte|strong\s*hold|hold\s+fuerte|firm\s*hold)\b/i, 'Fijación Fuerte'],
        [/\b(fijaci[oó]n\s+media|medium\s*hold|hold\s+medio)\b/i,                'Fijación Media'],
        [/\b(fijaci[oó]n\s+ligera|light\s*hold|ligero|ligera|soft\s*hold)\b/i,   'Ligero'],
        // acabado
        [/\b(mate|matte)\b/i,           'Efecto Mate'],
        [/\b(brillo|brillante|shine|glossy)\b/i, 'Brillo'],
        [/\b(natural|satinad[oa])\b/i,  'Acabado Natural'],
        [/\b(seco|dry)\b/i,             'Efecto Seco'],
        // formato / textura
        [/\b(texturizante|textur|volumen|volumizing)\b/i, 'Texturizante'],
        [/\b(polvo|powder)\b/i,          'Polvo'],
        [/\b(pomada|pomade)\b/i,         'Pomada'],
        [/\b(cera|wax)\b/i,              'Cera'],
        [/\b(gel)\b/i,                   'Gel'],
        [/\b(spray)\b/i,                 'Spray'],
        [/\b(barba|beard)\b/i,           'Barba'],
        // reformable / flexible
        [/\b(flexible|reformable|restyle)\b/i, 'Flexible'],
      ];
      function extractTags(p) {
        // Explícito primero: array de strings en el doc del producto.
        if (Array.isArray(p.tags) && p.tags.length) {
          return p.tags
            .filter(function (t) { return typeof t === 'string' && t.trim().length; })
            .slice(0, 3)
            .map(function (t) { return t.trim(); });
        }
        var haystack = ((p.nombre || '') + ' ' + (p.descripcion || '')).toLowerCase();
        var out = [];
        var seen = {};
        TAG_RULES.forEach(function (rule) {
          if (out.length >= 3) return;
          if (rule[0].test(haystack) && !seen[rule[1]]) {
            out.push(rule[1]);
            seen[rule[1]] = true;
          }
        });
        // Fallback: si nada matcheó, extrae el "Xml" si aparece.
        if (!out.length) {
          var mlMatch = /(\d{1,4})\s?ml\b/i.exec((p.nombre || '') + ' ' + (p.descripcion || ''));
          if (mlMatch) out.push(mlMatch[1] + 'ml');
        }
        return out;
      }
      function tagsHtml(p) {
        var tags = extractTags(p);
        if (!tags.length) return '';
        return '<div class="card-tags">' +
          tags.map(function (t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('') +
        '</div>';
      }

      function renderCards(prods) {
        var grid = document.getElementById('grid');
        var countEl = document.getElementById('sectionCount');
        if (!prods.length) { renderEmpty(); return; }
        // Título unificado: "Catálogo (6)" en una sola línea.
        countEl.textContent = '(' + prods.length + ')';
        grid.innerHTML = prods.map(function (p) {
          var out = p.stock != null && Number(p.stock) <= 0;
          var hasOffer = p.precioOriginal && p.precio && Number(p.precioOriginal) > Number(p.precio);
          var hasPrice = (p.precio != null && p.precio !== '');
          var priceFloat = hasPrice
            ? '<div class="card-price-float">' +
                '<span class="price">' + fmtPrice(p.precio) + '</span>' +
                (hasOffer ? '<span class="price-orig">' + fmtPrice(p.precioOriginal) + '</span>' : '') +
              '</div>'
            : '<div class="card-price-float"><span class="price-consult">Consultar precio</span></div>';
          var msg = 'Hola ' + sedeName + '! Me interesa el producto Slick Gorilla "' + (p.nombre || '') + '"'
                  + (out ? '. ¿Cuándo tendrán stock?' : '. ¿Está disponible?');
          var actionHtml = (!out && hasPrice)
            ? '<button class="add-btn" data-id="' + esc(p.id) + '" data-nombre="' + esc(p.nombre || 'Producto Slick Gorilla') +
                '" data-precio="' + (Number(p.precio) || 0) + '" data-imagen="' + esc(p.imagen || '') + '"><i class="ph-bold ph-plus"></i> Agregar a cita</button>'
            : '<a class="buy-btn" href="' + waLink(msg) + '" target="_blank" rel="noopener">' +
                '<i class="ph-fill ph-whatsapp-logo"></i>' + (out ? 'Avísame cuando llegue' : 'Consultar por WhatsApp') + '</a>';
          var imgHtml = p.imagen
            ? '<img src="' + esc(p.imagen) + '" alt="' + esc(p.nombre) + '" loading="lazy" decoding="async" class="img-loading" onload="this.classList.remove(\'img-loading\')" onerror="this.parentNode.innerHTML=\'<i class=&quot;ph-fill ph-drop-half card-img-ph&quot;></i>\'">'
            : '<i class="ph-fill ph-drop-half card-img-ph"></i>';
          var brandLabel = (p.marca && String(p.marca).trim()) ? esc(p.marca) : 'Slick Gorilla';
          return (
            '<article class="card">' +
              '<div class="card-img-wrap">' +
                stockBadge(p) +
                imgHtml +
                priceFloat +
              '</div>' +
              '<div class="card-body">' +
                '<span class="card-brand">' + brandLabel + '</span>' +
                '<h3 class="card-name">' + esc(p.nombre || 'Producto Slick Gorilla') + '</h3>' +
                tagsHtml(p) +
                crossPill(p) +
                '<div class="card-foot">' + actionHtml + '</div>' +
              '</div>' +
            '</article>'
          );
        }).join('');
        syncCartButtons();
        renderStickyBar();
      }

      // ── Selector productos ↔ barra flotante ──
      function productFromBtn(btn) {
        return { id: btn.dataset.id, nombre: btn.dataset.nombre, precio: Number(btn.dataset.precio) || 0, imagen: btn.dataset.imagen || '' };
      }
      function setBtnState(btn, added, animate) {
        btn.classList.toggle('active', added);
        btn.innerHTML = added
          ? '<i class="ph-bold ph-check"></i> Agregado'
          : '<i class="ph-bold ph-plus"></i> Agregar a cita';
        if (animate) {
          btn.classList.remove('pulse');
          // reflow para reiniciar la animación al pulsar dos veces seguidas.
          // eslint-disable-next-line no-unused-expressions
          void btn.offsetWidth;
          btn.classList.add('pulse');
        }
      }
      function syncCartButtons() {
        var ids = {};
        Cart.load().forEach(function (p) { ids[p.id] = true; });
        document.querySelectorAll('.add-btn').forEach(function (btn) { setBtnState(btn, !!ids[btn.dataset.id], false); });
      }
      function renderStickyBar() {
        var bar = document.getElementById('stickyBar');
        var n = Cart.count();
        if (!n) { bar.classList.remove('visible'); document.body.classList.remove('has-cart'); refreshBackBtn(); return; }
        document.getElementById('stickyCount').textContent = n + (n === 1 ? ' producto seleccionado' : ' productos seleccionados');
        document.getElementById('stickyTotal').textContent = '+ ' + fmtPrice(Cart.total());
        bar.classList.add('visible');
        document.body.classList.add('has-cart');
        refreshBackBtn();
      }
      document.addEventListener('click', function (e) {
        var btn = e.target.closest && e.target.closest('.add-btn');
        if (!btn) return;
        setBtnState(btn, Cart.toggle(productFromBtn(btn)), true);
        renderStickyBar();
      });
      document.getElementById('stickyCta').addEventListener('click', function () {
        location.href = '/?local=' + encodeURIComponent(TENANT_ID);
      });
      renderStickyBar();
      refreshBackBtn();

      function renderEmpty() {
        document.getElementById('grid').outerHTML =
          '<div class="empty">' +
            '<div class="empty-ic"><i class="ph-fill ph-drop-half"></i></div>' +
            '<h3>Catálogo en preparación</h3>' +
            '<p>Muy pronto encontrarás aquí la línea completa de productos Slick Gorilla. ' +
               'Mientras tanto, consúltalos directamente con nosotros.</p>' +
            '<a class="empty-cta" href="' + waLink('Hola ' + sedeName + '! Quiero información de los productos Slick Gorilla.') + '" target="_blank" rel="noopener">' +
              '<i class="ph-fill ph-whatsapp-logo"></i> Consultar productos' +
            '</a>' +
          '</div>';
      }

      // ── Carga desde Firestore ─────────────────────────────────
      function prodCol() {
        return db.collection('tenants').doc(TENANT_ID).collection('productos');
      }
      prodCol().get()
        .then(function (snap) {
          var prods = snap.docs
            .map(function (d) { return Object.assign({ id: d.id }, d.data()); })
            .filter(function (p) { return p.activo !== false && isSlick(p); })
            .sort(function (a, b) {
              var ao = (a.stock != null && Number(a.stock) <= 0) ? 1 : 0;
              var bo = (b.stock != null && Number(b.stock) <= 0) ? 1 : 0;
              if (ao !== bo) return ao - bo;
              return (Number(a.precio) || 0) - (Number(b.precio) || 0);
            });
          renderCards(prods);
        })
        .catch(function (err) {
          console.error('slick catalog load error:', err);
          renderEmpty();
        });
    })();
  </script>
</body>
</html>
