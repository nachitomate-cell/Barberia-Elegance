<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FAFAFA">
  <meta name="author" content="SynapTech SpA">
  <title>Lookbook | Barbería Premium</title>

  
  <!-- Tipografía -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Iconos -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Firebase SDKs (para cargar fotos del lookbook) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="config.js"></script>
  <script src="firebase-config.js?v=1.3"></script>
  <script src="/js/utils/error-logger.js?v=1.2"></script>
  <script src="/js/guards/tenant-status-guard.js?v=1.0"></script>
  <script src="/js/guards/version-manager.js?v=1.1"></script>

  <!-- Tailwind -->
  <link href="/output-lookbook.css" rel="stylesheet">
  

  <style>
    body {
      background-color: #FAFAFA;
      color: #111827;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Navegación inferior con Glassmorphism */
    .glass-nav {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    /* Utilidades de espera para animaciones secuenciales */
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
    
    /* Para transiciones del Bottom Sheet */
    .ease-spring { transition-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.15); }

    /* Filter bar */
    .filter-bar{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.75rem;margin-bottom:1rem;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-left:-1.5rem;margin-right:-1.5rem;padding-left:1.5rem;padding-right:1.5rem;}
    .filter-bar::-webkit-scrollbar{display:none;}
    .filter-pill{flex-shrink:0;padding:.375rem 1rem;border-radius:999px;font-size:.8125rem;font-weight:600;border:1.5px solid #e5e7eb;background:white;color:#6b7280;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;min-height:34px;display:flex;align-items:center;}
    .filter-pill.active{background:#111827;border-color:#111827;color:white;box-shadow:0 2px 8px rgba(17,24,39,.15);}
    .filter-pill:active{transform:scale(.95);}
  </style>
</head>
<body class="font-sans antialiased min-h-screen pb-32 selection:bg-brand-accent selection:text-white relative">
  
  <main class="max-w-md mx-auto pt-12 px-6">
    <!-- Header del Lookbook -->
    <header class="flex items-center justify-between mb-8 opacity-0 animate-[fadeSlideUp_0.6s_cubic-bezier(0.16,1,0.3,1)_forwards]">
      <div>
        <h1 class="text-3xl font-bold tracking-tight text-brand-text mb-1">Lookbook</h1>
        <p class="text-sm text-gray-500 font-medium">Inspiración para tu próximo estilo</p>
      </div>
      <div id="photo-count" class="text-xs font-semibold text-gray-400 tabular-nums"></div>
    </header>

    <!-- Filter bar -->
    <div id="filterBar" class="filter-bar opacity-0 animate-[fadeSlideUp_0.6s_cubic-bezier(0.16,1,0.3,1)_forwards] delay-100"></div>

    <!-- Masonry Layout Grid -->
    <div id="lookbookGrid" class="columns-2 gap-4 space-y-4 opacity-0 animate-[fadeSlideUp_0.6s_cubic-bezier(0.16,1,0.3,1)_forwards] delay-200 pb-10">
      <!-- Skeletons mientras carga Firestore -->
      <div class="break-inside-avoid rounded-2xl aspect-[3/4] bg-gray-100 animate-pulse mb-4"></div>
      <div class="break-inside-avoid rounded-2xl aspect-[4/5] bg-gray-100 animate-pulse mb-4"></div>
      <div class="break-inside-avoid rounded-2xl aspect-square bg-gray-100 animate-pulse mb-4"></div>
      <div class="break-inside-avoid rounded-2xl aspect-[3/4] bg-gray-100 animate-pulse mb-4"></div>
    </div>
  </main>

  <!-- Bottom Navigation Bar idéntica a la vista index.html (Lookbook Activo) -->
  <div class="fixed bottom-6 left-0 right-0 px-6 max-w-md mx-auto z-30 opacity-0 animate-[fadeSlideUp_0.6s_cubic-bezier(0.16,1,0.3,1)_forwards] delay-200">
    <nav class="glass-nav rounded-[2rem] px-6 py-4 flex justify-between items-center shadow-xl shadow-gray-200/40">
      
      <!-- Inicio (Inactivo) -->
      <a href="index.html" class="flex flex-col items-center gap-1.5 text-gray-400 hover:text-brand-text transition-colors group">
        <i class="ph ph-house text-2xl group-active:scale-95 transition-transform"></i>
        <span class="text-[10px] font-semibold">Inicio</span>
      </a>
      
      <!-- Reservar (Inactivo) -->
      <a href="index.html" class="flex flex-col items-center gap-1.5 text-gray-400 hover:text-brand-text transition-colors group">
        <i class="ph ph-calendar-plus text-2xl group-hover:scale-105 group-active:scale-95 transition-transform"></i>
        <span class="text-[10px] font-semibold">Reservar</span>
      </a>
      
      <!-- Lookbook (Activo) -->
      <a href="#" class="flex flex-col items-center gap-1.5 text-brand-accent group">
        <div class="relative">
          <i class="ph-fill ph-images text-2xl group-active:scale-95 transition-transform"></i>
          <!-- Indicador activo de sección -->
          <span class="absolute -bottom-3 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-brand-accent rounded-full"></span>
        </div>
        <span class="text-[10px] font-bold mt-0.5">Lookbook</span>
      </a>
      
      <!-- Historial (Inactivo) -->
      <a href="historial.html" class="flex flex-col items-center gap-1.5 text-gray-400 hover:text-brand-text transition-colors group">
        <i class="ph ph-clock-counter-clockwise text-2xl group-hover:scale-105 group-active:scale-95 transition-transform"></i>
        <span class="text-[10px] font-semibold">Historial</span>
      </a>
    </nav>
  </div>


  <!-- ================= BOTTOM SHEET COMPONENT ================= -->
  
  <!-- Backdrop Background -->
  <div id="backdrop" class="fixed inset-0 bg-[#111827]/40 backdrop-blur-[2px] z-40 opacity-0 pointer-events-none transition-opacity duration-300 ease-out" onclick="closeStyleCard()"></div>
  
  <!-- Sheet Panel -->
  <div id="bottomSheet" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-[2.5rem] pt-3 px-6 pb-10 z-50 transform translate-y-full transition-transform duration-500 ease-spring shadow-[0_-15px_40px_rgba(0,0,0,0.12)]">
    
    <!-- Drag Handle / Indicador para deslizar -->
    <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8 cursor-pointer" onclick="closeStyleCard()"></div>
    
    <!-- Info del Estilo Seleccionado -->
    <div class="flex gap-5 mb-8 items-center">
      
      <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-accent/10 to-brand-accent/5 border border-brand-accent/20 flex flex-col items-center justify-center shrink-0 shadow-inner">
         <i class="ph-fill ph-sparkle text-3xl text-brand-accent"></i>
      </div>
      
      <div>
        <span class="text-[10px] font-bold text-brand-accent tracking-widest uppercase mb-1 block">Estilo Seleccionado</span>
        <h3 id="sheetTitle" class="text-2xl font-bold text-brand-text mb-1 tracking-tight">Nombre del Estilo</h3>
        <p class="text-[13px] text-gray-500 font-medium leading-relaxed">Considera este look si buscas algo de bajo mantenimiento pero con gran impacto visual y mucha limpieza.</p>
      </div>

    </div>
    
    <!-- Panel Actions -->
    <div class="flex gap-4">
        <!-- Botón Guardar favorito -->
        <button id="likeBtn" onclick="toggleLike(this)" class="w-14 h-14 rounded-[1.25rem] border-2 border-gray-100 flex flex-col items-center justify-center text-gray-400 active:scale-95 transition-all outline-none shrink-0 group">
          <i class="ph-fill ph-heart text-2xl transition-colors pointer-events-none"></i>
          <span id="likeCount" class="text-[9px] font-bold leading-none mt-0.5 pointer-events-none"></span>
        </button>
        
        <!-- Botón Principal: Agendar este estilo -->
        <a href="index.html" class="flex-1 bg-brand-text text-white text-[15px] font-bold py-4 rounded-full shadow-xl shadow-brand-text/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 outline-none hover:bg-black">
          Agendar este estilo <i class="ph-bold ph-arrow-right text-xl text-white/70"></i>
        </a>
    </div>

  </div>

  <script>
    const RATIOS = ['aspect-[3/4]', 'aspect-[4/5]', 'aspect-square', 'aspect-[2/3]', 'aspect-[3/4]', 'aspect-[4/5]'];
    const FALLBACK_CATS = ['Fade', 'Clásico', 'Barba', 'Degradado', 'Diseño'];

    let _lbDocs = [];
    let _activeFilter = 'todos';
    let currentActiveCard = null;
    let currentPhotoDoc   = null;

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ── Likes — localStorage ───────────────────────────────────────
    const _lbTid = window.CURRENT_TENANT_ID || 'elegance';
    const _likesKey = 'lb_likes_' + _lbTid;

    function getLikedIds() {
      try { return JSON.parse(localStorage.getItem(_likesKey) || '[]'); }
      catch { return []; }
    }
    function saveLikedIds(ids) {
      localStorage.setItem(_likesKey, JSON.stringify(ids));
    }

    function setHeartState(btn, liked) {
      const heart = btn.querySelector('i');
      const countEl = btn.querySelector('#likeCount');
      if (liked) {
        heart.classList.add('text-red-500');
        btn.classList.add('border-red-100', 'bg-red-50');
        btn.classList.remove('text-gray-400');
        btn.classList.add('text-red-500');
      } else {
        heart.classList.remove('text-red-500');
        btn.classList.remove('border-red-100', 'bg-red-50', 'text-red-500');
        btn.classList.add('text-gray-400');
      }
      // Actualizar contador en el sheet
      const count = currentPhotoDoc?.likes || 0;
      if (countEl) countEl.textContent = count > 0 ? count : '';
    }

    // ── Filtros ────────────────────────────────────────────────────
    function buildFilters(docs) {
      const cats = [...new Set(docs.map(d => d.categoria).filter(Boolean))].sort();
      const all  = cats.length ? ['Todos', ...cats] : ['Todos', ...FALLBACK_CATS];
      const bar  = document.getElementById('filterBar');
      bar.innerHTML = all.map((cat, i) => {
        const key = i === 0 ? 'todos' : cat;
        return `<button class="filter-pill${i === 0 ? ' active' : ''}" data-cat="${esc(key)}"
          onclick="setFilter('${esc(key)}',this)">${esc(cat)}</button>`;
      }).join('');
    }

    function setFilter(cat, el) {
      _activeFilter = cat;
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderGrid();
    }

    // ── Render grid ────────────────────────────────────────────────
    function renderGrid() {
      const grid = document.getElementById('lookbookGrid');
      if (!grid) return;

      const visible = _activeFilter === 'todos'
        ? _lbDocs
        : _lbDocs.filter(d => (d.categoria || '') === _activeFilter);

      const countEl = document.getElementById('photo-count');
      if (countEl) {
        if (_lbDocs.length === 0) countEl.textContent = '';
        else if (visible.length < _lbDocs.length)
          countEl.textContent = `${visible.length}/${_lbDocs.length} fotos`;
        else
          countEl.textContent = `${_lbDocs.length} foto${_lbDocs.length !== 1 ? 's' : ''}`;
      }

      if (_lbDocs.length === 0) {
        grid.innerHTML = `
          <div class="break-inside-avoid relative rounded-2xl overflow-hidden shadow-sm border border-gray-100 mb-4">
            <div class="w-full aspect-[3/4] bg-gradient-to-br from-gray-100 to-gray-200 flex flex-col items-center justify-center text-gray-300">
              <i class="ph-fill ph-camera text-4xl mb-2 opacity-50"></i>
              <span class="text-xs text-gray-400 font-medium">Pronto habrá fotos</span>
            </div>
          </div>
          <div class="break-inside-avoid relative rounded-2xl overflow-hidden shadow-sm border border-gray-100 mb-4">
            <div class="w-full aspect-[4/5] bg-gradient-to-tr from-gray-50 to-gray-200 flex flex-col items-center justify-center text-gray-300">
              <i class="ph-fill ph-scissors text-4xl mb-2 opacity-40"></i>
            </div>
          </div>`;
        return;
      }

      if (visible.length === 0) {
        grid.innerHTML = `
          <div class="break-inside-avoid col-span-2 flex flex-col items-center py-16 text-gray-400">
            <i class="ph ph-image text-4xl mb-3 opacity-30"></i>
            <p class="text-sm font-medium">Sin fotos en esta categoría</p>
          </div>`;
        return;
      }

      const likedIds = getLikedIds();
      grid.innerHTML = visible.map((d, i) => {
        const { url, titulo, categoria } = d;
        const ratio   = RATIOS[i % RATIOS.length];
        const label   = titulo || categoria || 'Elegance';
        const likes   = d.likes || 0;
        const isLiked = likedIds.includes(d.id);
        const likeBadge = likes > 0
          ? `<div class="absolute top-2.5 right-2.5 z-20 flex items-center gap-1 bg-black/50 backdrop-blur-sm text-white text-[10px] font-bold px-2 py-1 rounded-xl pointer-events-none">
               <i class="ph-fill ph-heart ${isLiked ? 'text-red-400' : 'text-white/70'} leading-none" style="font-size:10px"></i>
               <span class="like-badge-count">${likes}</span>
             </div>`
          : '';
        return `
          <div class="break-inside-avoid relative rounded-2xl overflow-hidden group active:scale-[0.97] transition-transform cursor-pointer shadow-sm border border-gray-100 mb-4"
               data-photo-id="${esc(d.id)}"
               onclick="openStyleCard(this,'${esc(label)}','${esc(d.id)}')">
            <div class="w-full ${ratio} bg-gray-100 overflow-hidden">
              <img src="${esc(url)}" loading="lazy"
                   class="w-full h-full object-cover"
                   style="object-position: ${d.focalX !== undefined ? d.focalX : 50}% ${d.focalY !== undefined ? d.focalY : 50}%;"
                   onerror="this.parentElement.parentElement.remove()">
            </div>
            <div class="style-overlay absolute inset-0 bg-black/60 opacity-0 transition-opacity duration-300 z-10"></div>
            ${likeBadge}
            <div class="absolute bottom-3 left-3 bg-white/95 backdrop-blur text-brand-text text-[10px] font-bold px-3 py-1.5 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.1)] border border-white z-20">
              <span class="tracking-wide uppercase">${esc(label)}</span>
            </div>
          </div>`;
      }).join('');
    }

    // ── Cargar desde Firestore ─────────────────────────────────────
    const _lbCol = _lbTid === 'elegance'
      ? db.collection('lookbook')
      : db.collection('tenants').doc(_lbTid).collection('lookbook');

    _lbCol.orderBy('order', 'asc').onSnapshot(snap => {
      _lbDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // Sincronizar el doc activo si el sheet está abierto
      if (currentPhotoDoc) {
        const updated = _lbDocs.find(d => d.id === currentPhotoDoc.id);
        if (updated) currentPhotoDoc = updated;
        const countEl = document.getElementById('likeCount');
        if (countEl) countEl.textContent = (currentPhotoDoc.likes || 0) > 0 ? currentPhotoDoc.likes : '';
      }
      buildFilters(_lbDocs);
      renderGrid();
    });

    // ── Bottom Sheet ───────────────────────────────────────────────
    function openStyleCard(cardElement, styleName, photoId) {
      document.querySelectorAll('.style-overlay').forEach(el => el.classList.remove('opacity-100'));
      currentActiveCard = cardElement;
      currentPhotoDoc   = _lbDocs.find(d => d.id === photoId) || null;
      cardElement.querySelector('.style-overlay')?.classList.add('opacity-100');
      document.getElementById('sheetTitle').innerText = styleName;

      // Inicializar estado del corazón
      const likeBtn = document.getElementById('likeBtn');
      const countEl = document.getElementById('likeCount');
      if (likeBtn) {
        const liked = getLikedIds().includes(photoId);
        setHeartState(likeBtn, liked);
        if (countEl) {
          const n = currentPhotoDoc?.likes || 0;
          countEl.textContent = n > 0 ? n : '';
        }
      }

      document.getElementById('backdrop').classList.remove('opacity-0', 'pointer-events-none');
      document.getElementById('bottomSheet').classList.remove('translate-y-full');
    }

    function closeStyleCard() {
      document.getElementById('backdrop').classList.add('opacity-0', 'pointer-events-none');
      document.getElementById('bottomSheet').classList.add('translate-y-full');
      if (currentActiveCard) {
        currentActiveCard.querySelector('.style-overlay')?.classList.remove('opacity-100');
        currentActiveCard = null;
      }
      currentPhotoDoc = null;
    }

    async function toggleLike(btn) {
      if (!currentPhotoDoc) return;
      const id      = currentPhotoDoc.id;
      const liked   = getLikedIds();
      const wasLiked = liked.includes(id);

      // Actualizar localStorage y UI de forma optimista
      if (wasLiked) {
        saveLikedIds(liked.filter(x => x !== id));
        currentPhotoDoc = { ...currentPhotoDoc, likes: Math.max(0, (currentPhotoDoc.likes || 0) - 1) };
      } else {
        saveLikedIds([...liked, id]);
        currentPhotoDoc = { ...currentPhotoDoc, likes: (currentPhotoDoc.likes || 0) + 1 };
      }
      setHeartState(btn, !wasLiked);

      // Persistir en Firestore (requiere estar autenticado)
      try {
        await _lbCol.doc(id).update({
          likes: firebase.firestore.FieldValue.increment(wasLiked ? -1 : 1)
        });
      } catch (_) {
        // Si falla (no auth o sin conexión), el like local queda igual
      }
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(r => console.log('[SW] Registrado:', r.scope))
          .catch(e => console.warn('[SW] Error:', e));
      });
    }
  </script>
</body>
</html>
