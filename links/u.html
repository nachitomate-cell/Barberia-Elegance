<style>
  :root{ --green:#92c83a; --green-d:#2c5a17; --ink:#15240b; --soft:#3f5230; --white:#ffffff; --line:#cfe0a8; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--green);color:var(--ink);}
  body{min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:56px 20px 30px;}
  .wrap{position:relative;z-index:1;width:100%;max-width:560px;display:flex;flex-direction:column;align-items:center;}
  /* Fondo foto: difuminado a pantalla completa (lados en PC) + foto nítida en un marco centrado */
  .bg-photo-blur{position:fixed;inset:0;z-index:-2;background-size:cover;background-position:center;filter:blur(34px) brightness(.7);transform:scale(1.12);pointer-events:none;}
  .bg-photo-frame{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;z-index:-1;background-size:cover;background-position:center;pointer-events:none;box-shadow:0 0 90px rgba(0,0,0,.4);}
  .cover{width:100%;height:132px;border-radius:18px;background-size:cover;background-position:center;box-shadow:0 3px 14px rgba(21,36,11,.16);}
  .avatar.over{margin-top:-46px;position:relative;z-index:1;}
  .avatar{width:96px;height:96px;border-radius:50%;overflow:hidden;background:var(--white);border:3px solid rgba(255,255,255,.7);display:grid;place-items:center;box-shadow:0 4px 18px rgba(21,36,11,.15);}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  h1{font-size:21px;font-weight:800;letter-spacing:-.3px;margin-top:16px;text-align:center;}
  .sub{font-size:14px;color:var(--soft);margin-top:6px;text-align:center;max-width:34ch;line-height:1.45;}
  .blocks{width:100%;display:flex;flex-direction:column;gap:13px;margin-top:28px;}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--white);border:0;
    border-radius:14px;padding:17px 18px;font-size:15.5px;font-weight:700;color:var(--ink);text-decoration:none;transition:.13s;position:relative;box-shadow:0 2px 10px rgba(21,36,11,.10);}
  .btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(21,36,11,.16);}
  .btn-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:27px;height:27px;object-fit:contain;}
  .btn-thumb{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:8px;object-fit:cover;}
  @keyframes bFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes bPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  @keyframes bGlow{0%,100%{box-shadow:0 2px 10px rgba(21,36,11,.15)}50%{box-shadow:0 6px 24px rgba(146,200,58,.6)}}
  /* Cada regla incluye la entrada `fade` primero para no anular el opacity:0→1
     de .fade (el shorthand `animation` no se acumula); la animación idle va
     después y gana en `transform`. Sin esto, los botones animados quedan invisibles. */
  .btn.anim-float{animation:fade .45s ease forwards, bFloat 3s ease-in-out infinite;}
  .btn.anim-pulse{animation:fade .45s ease forwards, bPulse 2.4s ease-in-out infinite;}
  .btn.anim-grow{transition:transform .15s ease;}
  .btn.anim-grow:hover{transform:scale(1.04);}
  .btn.feat{animation:fade .45s ease forwards, bGlow 2s ease-in-out infinite;font-weight:800;}
  .u-text{text-align:center;font-size:15px;font-weight:600;line-height:1.45;width:100%;word-break:break-word;}
  .u-sep{width:55%;border:0;border-top:2px solid rgba(128,128,128,.35);margin:6px auto;}
  .u-imgwrap{display:block;width:100%;}
  .u-img{width:100%;border-radius:14px;display:block;box-shadow:0 2px 12px rgba(21,36,11,.14);}
  .emb-yt{position:relative;width:100%;padding-top:56.25%;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(21,36,11,.14);}
  .emb-yt iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  .emb{width:100%;border:0;border-radius:12px;display:block;}
  .u-soc{display:flex;justify-content:center;flex-wrap:wrap;gap:16px;width:100%;}
  .u-soc-i img{width:34px;height:34px;object-fit:contain;display:block;transition:transform .15s;}
  .u-soc-i:hover img{transform:translateY(-2px) scale(1.08);}
  @keyframes bgshift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .btn:active{transform:translateY(0);}
  .empty{margin-top:22vh;text-align:center;color:var(--soft);}
  .empty h2{font-size:18px;color:var(--ink);margin-bottom:8px;}
  .empty a{color:var(--green-d);font-weight:800;text-decoration:underline;}
  .loading{margin-top:30vh;}
  .spin{width:30px;height:30px;border:3px solid rgba(255,255,255,.5);border-top-color:var(--green-d);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .foot{position:relative;z-index:1;margin-top:auto;padding-top:34px;}
  .foot a{display:inline-flex;align-items:center;gap:7px;text-decoration:none;color:var(--ink);font-size:12px;font-weight:700;
    background:var(--white);padding:7px 14px;border-radius:100px;box-shadow:0 2px 10px rgba(21,36,11,.10);}
  .foot img{width:15px;height:15px;border-radius:4px;object-fit:contain;}
  .fade{opacity:0;transform:translateY(8px);animation:fade .45s ease forwards;}
  @keyframes fade{to{opacity:1;transform:none;}}

  /* ── Topbar: logo (izq) + compartir (der) ── */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:6;display:flex;justify-content:space-between;padding:14px;pointer-events:none;}
  .chip-btn{pointer-events:auto;width:44px;height:44px;border-radius:13px;background:var(--white);border:0;display:grid;place-items:center;cursor:pointer;box-shadow:0 2px 12px rgba(21,36,11,.14);transition:.13s;text-decoration:none;}
  .chip-btn:active{transform:scale(.93);}
  .chip-btn img{width:24px;height:24px;border-radius:6px;object-fit:contain;}
  .chip-btn svg{width:22px;height:22px;color:var(--ink);}

  /* ── Modal compartir ── */
  .share-modal{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(21,36,11,.45);backdrop-filter:blur(4px);}
  .share-sheet{width:100%;max-width:430px;background:#fff;border-radius:22px;overflow:hidden;animation:sheetIn .25s ease;max-height:92dvh;overflow-y:auto;}
  @keyframes sheetIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  .share-head{display:flex;align-items:center;justify-content:center;position:relative;padding:18px;font-size:17px;font-weight:800;color:var(--ink);}
  .share-head button{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:transparent;border:0;font-size:22px;line-height:1;color:#6f7c63;cursor:pointer;padding:4px;}
  .share-card{margin:0 18px 22px;border-radius:18px;background:var(--ink);padding:26px 20px 22px;text-align:center;color:#fff;}
  .share-card .av{width:96px;height:96px;border-radius:50%;margin:0 auto 12px;overflow:hidden;background:#fff;display:grid;place-items:center;border:3px solid rgba(255,255,255,.18);}
  .share-card .av img{width:100%;height:100%;object-fit:cover;}
  .share-card .un{font-size:21px;font-weight:800;letter-spacing:-.3px;}
  .share-card .hd{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:rgba(255,255,255,.72);margin-top:4px;}
  .share-card .hd img{width:14px;height:14px;border-radius:4px;background:#fff;padding:1px;}

  .share-targets{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 6px;padding:6px 18px 20px;}
  .share-targets a,.share-targets button{background:transparent;border:0;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:7px;font-size:10.5px;font-weight:600;color:#41513e;}
  .share-targets .ic{width:50px;height:50px;border-radius:50%;display:grid;place-items:center;}
  .share-targets .ic svg{width:23px;height:23px;}
  .ic-copy{background:#e7ebde;color:var(--ink);} .ic-x{background:#000;color:#fff;} .ic-fb{background:#1877F2;color:#fff;}
  .ic-wa{background:#25D366;color:#fff;} .ic-in{background:#0A66C2;color:#fff;} .ic-tg{background:#26A5E4;color:#fff;}
  .ic-ig{background:radial-gradient(circle at 30% 107%,#fdf497 0%,#fdf497 5%,#fd5949 45%,#d6249f 60%,#285AEB 90%);color:#fff;}
  .ic-mail{background:#5b6a4e;color:#fff;}

  .a2hs-wrap{padding:0 18px 18px;}
  .a2hs{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:var(--field);border:1px solid var(--line);color:var(--ink);border-radius:14px;padding:14px;font-size:14px;font-weight:800;cursor:pointer;}
  .a2hs:hover{border-color:var(--green);}
  .a2hs svg{width:19px;height:19px;}
  .a2hs-tip{background:rgba(146,200,58,.12);border:1px solid var(--green);border-radius:12px;padding:13px 15px;margin-top:10px;font-size:12.5px;line-height:1.5;color:var(--ink);display:none;}
  .a2hs-tip.show{display:block;}
  .a2hs-tip b{font-weight:800;}
  .a2hs-tip .ios-share{display:inline-block;vertical-align:-3px;}

  .share-foot{border-top:1px solid #eceee6;padding:20px 22px 24px;}
  .share-foot h3{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:6px;letter-spacing:-.3px;}
  .share-foot p{font-size:13px;color:var(--soft);line-height:1.5;margin-bottom:16px;}
  .share-cta-btns{display:flex;gap:10px;}
  .share-cta-btns a{flex:1;text-align:center;padding:14px;border-radius:100px;font-size:14px;font-weight:800;text-decoration:none;}
  .cta-fill{background:var(--green-d);color:#fff;}
  .cta-out{background:#fff;color:var(--ink);border:1.5px solid #d7ddc9;}
  .copied{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:#fff;font-weight:700;font-size:13px;padding:10px 18px;border-radius:100px;z-index:40;opacity:0;transition:.2s;pointer-events:none;}
  .copied.show{opacity:1;}
</style>
</head>

  (function(){

    // ── Temas (debe coincidir con editor.html) ──
    var THEMES = {
      lime:   { bg:'#92c83a', text:'#15240b', sub:'#3f5230', btnBg:'#ffffff', btnText:'#15240b', btnBorder:'transparent' },
      forest: { bg:'#15240b', text:'#eef6e3', sub:'#aac08e', btnBg:'rgba(255,255,255,.12)', btnText:'#ffffff', btnBorder:'rgba(255,255,255,.28)' },

      ocean:  { bg:'linear-gradient(165deg,#1f6feb,#0b3d91)', text:'#ffffff', sub:'rgba(255,255,255,.82)', btnBg:'#ffffff', btnText:'#0b3d91', btnBorder:'transparent' },
      sunset: { bg:'linear-gradient(165deg,#ff8a3d,#d6249f)', text:'#ffffff', sub:'rgba(255,255,255,.88)', btnBg:'rgba(255,255,255,.96)', btnText:'#b3208a', btnBorder:'transparent' },

      rose:   { bg:'#dd19bb', text:'#ffffff', sub:'rgba(255,255,255,.88)', btnBg:'#ffffff', btnText:'#a3148a', btnBorder:'transparent' },
      night:  { bg:'#0e0e10', text:'#ffffff', sub:'#9aa3ad', btnBg:'rgba(255,255,255,.10)', btnText:'#ffffff', btnBorder:'rgba(255,255,255,.22)' }
    };
    var SHAPES = { rounded:'14px', pill:'100px', sharp:'4px' };
    var FONTS = {
      system:    '-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif',
      poppins:   '"Poppins",sans-serif', montserrat:'"Montserrat",sans-serif', nunito:'"Nunito",sans-serif',
      playfair:  '"Playfair Display",serif', oswald:'"Oswald",sans-serif', lobster:'"Lobster",cursive', pacifico:'"Pacifico",cursive'
    };
    var GFONTS = { poppins:'Poppins:wght@400;600;800', montserrat:'Montserrat:wght@400;600;800', nunito:'Nunito:wght@400;700;800', playfair:'Playfair+Display:wght@500;700;800', oswald:'Oswald:wght@400;600;700', lobster:'Lobster', pacifico:'Pacifico' };
    var TSIZE = { s:'17px', m:'21px', l:'26px' };
    var SSIZE = { s:'12px', m:'14px', l:'16px' };
    function loadFont(key){
      var g = GFONTS[key]; if (!g) return;
      var id='gf-'+key; if (document.getElementById(id)) return;
      var l=document.createElement('link'); l.id=id; l.rel='stylesheet';
      l.href='https://fonts.googleapis.com/css2?family='+g+'&display=swap';
      document.head.appendChild(l);
    }
    function bgNorm(b){ b=b||{}; return { mode:(['preset','color','gradient','animated','pattern','image'].indexOf(b.mode)>=0?b.mode:'preset'), color:b.color||'#92c83a', c1:b.c1||'#92c83a', c2:b.c2||'#2c5a17', angle:b.angle||'165', pattern:(['dots','grid','diag','cross'].indexOf(b.pattern)>=0?b.pattern:'dots'), image:b.image||'' }; }
    function patternCss(name, base){
      base = base || '#92c83a';
      if(name==='grid')  return 'linear-gradient(rgba(255,255,255,.16) 1px,transparent 1px) 0 0/26px 26px, linear-gradient(90deg,rgba(255,255,255,.16) 1px,transparent 1px) 0 0/26px 26px, '+base;
      if(name==='diag')  return 'repeating-linear-gradient(45deg,rgba(255,255,255,.10) 0 10px,transparent 10px 20px), '+base;
      if(name==='cross') return 'linear-gradient(rgba(255,255,255,.14) 2px,transparent 2px) 0 0/28px 28px, linear-gradient(90deg,rgba(255,255,255,.14) 2px,transparent 2px) 0 0/28px 28px, '+base;
      return 'radial-gradient(rgba(255,255,255,.28) 1.6px,transparent 1.7px) 0 0/22px 22px, '+base;
    }
    function bgCss(t){
      var b=t.bg||{};
      if(b.mode==='color')   return b.color;
      if(b.mode==='gradient')return 'linear-gradient('+b.angle+'deg, '+b.c1+', '+b.c2+')';
      if(b.mode==='animated')return 'linear-gradient('+b.angle+'deg, '+b.c1+', '+b.c2+', '+b.c1+')';
      if(b.mode==='pattern') return patternCss(b.pattern, b.color);
      if(b.mode==='image'&&b.image) return 'url("'+b.image+'") center/cover no-repeat fixed';
      return THEMES[t.preset].bg;
    }
    function normalizeTheme(raw){
      var b = (raw && typeof raw === 'object') ? raw : { preset:(typeof raw==='string' && THEMES[raw])?raw:'lime' };
      var x = b.text || {};
      return {
        preset: THEMES[b.preset]?b.preset:'lime',
        shape: SHAPES[b.shape]?b.shape:'rounded',
        fill: (b.fill==='outline')?'outline':'solid',
        btnAnim: (['none','float','pulse','grow'].indexOf(b.btnAnim)>=0?b.btnAnim:'none'),
        iconStyle: b.iconStyle==='original'?'original':'green',
        avatarShape: b.avatarShape==='rounded'?'rounded':'circle',
        avatarRing: b.avatarRing||'',
        bg: bgNorm(b.bg),
        text: {
          font: FONTS[x.font]?x.font:'system',
          titleSize: TSIZE[x.titleSize]?x.titleSize:'m',
          subSize: SSIZE[x.subSize]?x.subSize:'m',
          titleColor: x.titleColor||'', subColor: x.subColor||'', btnColor: x.btnColor||''
        }
      };
    }
    function themeCss(t){
      var p = THEMES[t.preset], radius = SHAPES[t.shape], btn;
      if (t.fill === 'outline') btn = 'background:transparent;color:'+p.text+';border:1.5px solid '+p.text+';';
      else btn = 'background:'+p.btnBg+';color:'+p.btnText+';border:1.5px solid '+p.btnBorder+';';
      btn += 'border-radius:'+radius+';';
      return { p:p, btn:btn };
    }
    var bioRef = null;

    // Genera un manifest al vuelo para que la app instalada use el nombre y la URL del usuario.
    function setManifest(uname, titulo){
      try {
        var m = {
          name: titulo || ('@'+uname), short_name: (titulo || uname).slice(0,12),
          start_url: 'https://bioo.cl/' + uname, scope: '/',
          display: 'standalone', background_color: '#92c83a', theme_color: '#92c83a',
          icons: [
            { src: 'https://bioo.cl/bioo-iso.png', sizes:'192x192', type:'image/png' },
            { src: 'https://bioo.cl/bioo-iso.png', sizes:'512x512', type:'image/png', purpose:'any maskable' }
          ]
        };
        var blob = new Blob([JSON.stringify(m)], { type:'application/manifest+json' });
        var link = document.getElementById('manifestLink');
        if (link) link.href = URL.createObjectURL(blob);
      } catch(e){}
    }

    // Usuario: del path (/usuario en prod) o de ?u= (local).
    function getUser(){
      var q = new URLSearchParams(location.search).get('u');
      if (q) return q.toLowerCase().replace(/[^a-z0-9._-]/g,'');
      var seg = location.pathname.replace(/^\/+|\/+$/g,'').split('/');
      var last = seg[seg.length-1] || '';
      if (last === 'u.html' || last === '') return '';
      return last.toLowerCase().replace(/[^a-z0-9._-]/g,'');
    }

    // Normaliza una URL de botón: http(s), wa.me, mailto, tel.
    function resolveUrl(raw){
      var u = String(raw||'').trim();
      if (!u) return null;
      if (/^(https?:|mailto:|tel:)/i.test(u)) return u;
      if (/^wa\.me\//i.test(u) || /^\+?\d[\d\s-]{7,}$/.test(u)) {
        var digits = u.replace(/\D/g,'');
        if (digits.length >= 8) return 'https://wa.me/' + digits;
      }
      if (/^[\w.-]+\.[a-z]{2,}(\/|$)/i.test(u)) return 'https://' + u;
      return u;
    }
    function embedSrc(raw){
      var u=String(raw||'').trim();
      var yt=u.match(/(?:youtu\.be\/|[?&]v=|embed\/|shorts\/)([\w-]{11})/);
      if(yt) return {yt:1, src:'https://www.youtube.com/embed/'+yt[1]};
      var sp=u.match(/open\.spotify\.com\/(?:intl-[a-z]+\/)?(track|album|playlist|episode|show|artist)\/([A-Za-z0-9]+)/);
      if(sp) return {src:'https://open.spotify.com/embed/'+sp[1]+'/'+sp[2], h:(sp[1]==='track'||sp[1]==='episode')?152:352};
      return null;
    }
    function embedHtml(url){
      var e=embedSrc(url); if(!e) return '';
      if(e.yt) return '<div class="emb-yt"><iframe src="'+e.src+'" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;picture-in-picture" allowfullscreen loading="lazy"></iframe></div>';
      return '<iframe class="emb" style="height:'+e.h+'px;" src="'+e.src+'" frameborder="0" allow="encrypted-media" loading="lazy"></iframe>';
    }
    var SOCRED = { instagram:1, tiktok:1, facebook:1, youtube:1, whatsapp:1, email:1, telefono:1, enlace:1 };
    function socUrl(s){
      var v=String(s.valor||'').trim(); if(!v) return ''; var r=s.red, h=/^https?:\/\//i.test(v), u=v.replace(/^@/,'');
      if(r==='instagram') return h?v:'https://instagram.com/'+u;
      if(r==='tiktok')    return h?v:'https://tiktok.com/@'+u;
      if(r==='facebook')  return h?v:'https://facebook.com/'+u;
      if(r==='youtube')   return h?v:'https://youtube.com/@'+u;
      if(r==='whatsapp'){ var d=v.replace(/\D/g,''); return d.length>=8?'https://wa.me/'+d:''; }
      if(r==='email')     return /^mailto:/i.test(v)?v:'mailto:'+v;
      if(r==='telefono'){ var d2=v.replace(/[^\d+]/g,''); return d2?'tel:'+d2:''; }
      return h?v:'https://'+v;
    }

    var user = getUser();
    var wrap = document.getElementById('wrap');

    function showEmpty(title, sub, cta){
      document.getElementById('loading').style.display='none';
      wrap.innerHTML = '<div class="empty fade"><h2>'+esc(title)+'</h2><p>'+esc(sub)+'</p>'+(cta||'')+'</div>';
      document.getElementById('foot').style.display='block';
    }

    // Modo demo: previsualiza la página y el botón compartir sin Firestore (?demo=1).
    if (new URLSearchParams(location.search).get('demo') === '1'){
      user = user || 'demo';
      render({ perfil:{ titulo:'@'+user, subtitulo:'Mi página de enlaces ✦ ejemplo', avatar:'' },
        bloques:[
          { tipo:'link', label:'Sígueme en Instagram', url:'https://instagram.com', activo:true },
          { tipo:'link', label:'Escríbeme por WhatsApp', url:'wa.me/56912345678', activo:true },
          { tipo:'link', label:'Mi sitio web', url:'https://bioo.cl', activo:true }
        ] });
      return;
    }

    if (!user){ showEmpty('Página no encontrada', 'No se indicó un usuario.', '<p style="margin-top:14px;"><a href="https://bioo.cl">Crea tu bioo</a></p>'); return; }

    bioRef = db.collection('bios').doc(user);
    bioRef.get().then(function(doc){
      if (!doc.exists){
        showEmpty('Este nombre está libre', 'bioo.cl/'+user+' aún no existe.',
          '<p style="margin-top:14px;"><a href="https://bioo.cl/registro?u='+encodeURIComponent(user)+'">Reclámalo ahora →</a></p>');
        return;
      }
      render(doc.data());
      // Vista (best-effort; si las reglas no lo permiten, falla en silencio).
      bioRef.update({ views: firebase.firestore.FieldValue.increment(1) }).catch(function(){});
    }).catch(function(e){
      console.error(e);
      showEmpty('No se pudo cargar', 'Intenta de nuevo en unos segundos.', '');
    });

    function render(data){
      var perfil = data.perfil || {};
      var bloques = (data.bloques||[]).filter(function(b){ if(b.activo===false) return false; if(b.tipo==='separador') return true; if(b.tipo==='texto') return (b.texto||'').trim(); if(b.tipo==='imagen') return (b.img||'').trim(); if(b.tipo==='social') return (b.socials||[]).some(function(s){return (s.valor||'').trim();}); return (b.url||'').trim(); });
      document.title = (perfil.titulo || ('@'+user)) + ' · bioo';
      document.getElementById('loading').style.display='none';

      // Tema
      var t = normalizeTheme(data.theme), css = themeCss(t), p = css.p, tx = t.text;
      var fontStack = FONTS[tx.font]; loadFont(tx.font);
      var titleColor = tx.titleColor || p.text, subColor = tx.subColor || p.sub;
      var _bg = t.bg || {};
      var _blur = document.getElementById('bgPhotoBlur'), _frame = document.getElementById('bgPhotoFrame');
      if (_bg.mode==='image' && _bg.image){
        // Foto: nítida en un marco centrado (tipo teléfono) + difuminada de fondo en PC.
        var _u = "url('"+_bg.image+"')";
        _blur.style.backgroundImage=_u; _frame.style.backgroundImage=_u;
        _blur.style.display='block'; _frame.style.display='block';
        document.body.style.background='#111';
        document.body.style.backgroundSize=''; document.body.style.animation='';
      } else {
        _blur.style.display='none'; _frame.style.display='none';
        document.body.style.background = bgCss(t);
        if (_bg.mode==='animated'){ document.body.style.backgroundSize='220% 220%'; document.body.style.animation='bgshift 14s ease infinite'; }
        else { document.body.style.backgroundSize=''; document.body.style.animation=''; }
      }
      document.body.style.fontFamily = fontStack;
      var mt = document.querySelector('meta[name="theme-color"]'); if (mt && p.bg.indexOf('gradient')<0) mt.setAttribute('content', p.bg);

      var html = '';
      var cover = (perfil.cover||'').trim();
      if (cover) html += '<div class="cover fade" style="background-image:url(\''+cover+'\');"></div>';
      var avR = t.avatarShape==='rounded' ? '22%' : '50%';
      var avRing = t.avatarRing || '';
      html += '<div class="avatar fade'+(cover?' over':'')+'" style="border-radius:'+avR+';'+(avRing?('border-color:'+avRing+';'):'')+'">' + (perfil.avatar
        ? '<img src="'+esc(perfil.avatar)+'" alt="'+esc(perfil.titulo)+'">'
        : '<span style="font-size:38px;font-weight:800;color:#6b7768;">'+esc((perfil.titulo||user).charAt(0).toUpperCase())+'</span>') + '</div>';
      var vrf = data.perfil && data.perfil.verified ? ' <img src="/ic-verified.png" alt="✓" style="height:0.85em;width:auto;vertical-align:-1px;margin-left:5px;">' : '';
      html += '<h1 class="fade" style="animation-delay:.04s;color:'+titleColor+';font-size:'+TSIZE[tx.titleSize]+';">'+esc(perfil.titulo || ('@'+user))+vrf+'</h1>';
      if (perfil.subtitulo) html += '<p class="sub fade" style="animation-delay:.08s;color:'+subColor+';font-size:'+SSIZE[tx.subSize]+';">'+esc(perfil.subtitulo)+'</p>';

      if (bloques.length){
        html += '<div class="blocks">';
        bloques.forEach(function(b, i){
          if (b.tipo==='separador'){ html += '<hr class="u-sep">'; return; }
          if (b.tipo==='texto'){ html += '<div class="u-text fade" style="animation-delay:'+(0.1+i*0.04)+'s;color:'+subColor+';">'+esc((b.texto||'').trim())+'</div>'; return; }
          if (b.tipo==='imagen'){ var im='<img class="u-img" src="'+esc(b.img)+'" alt="">'; var iu=resolveUrl(b.url); html += '<'+(iu?'a':'div')+' class="fade u-imgwrap" style="animation-delay:'+(0.1+i*0.04)+'s;"'+(iu?(' href="'+esc(iu)+'" target="_blank" rel="noopener"'):'')+'>'+im+'</'+(iu?'a':'div')+'>'; return; }
          if (b.tipo==='embed'){ var eh=embedHtml(b.url); if(eh) html += '<div class="fade" style="animation-delay:'+(0.1+i*0.04)+'s;width:100%;">'+eh+'</div>'; return; }
          if (b.tipo==='social'){ var icS=t.iconStyle==='original'?'-orig':''; var sr=(b.socials||[]).map(function(s){ var su=socUrl(s); return su?'<a class="u-soc-i" href="'+esc(su)+'" target="_blank" rel="noopener"><img src="/ic-'+(SOCRED[s.red]?s.red:'enlace')+icS+'.png" alt=""></a>':''; }).join(''); if(sr) html += '<div class="u-soc fade" style="animation-delay:'+(0.1+i*0.04)+'s;">'+sr+'</div>'; return; }
          var url = resolveUrl(b.url); if (!url) return;
          var icSuf = t.iconStyle==='original' ? '-orig' : '';
          var icH = (b.tipo && {whatsapp:1,instagram:1,tiktok:1,facebook:1,youtube:1,email:1,telefono:1,enlace:1}[b.tipo]) ? '<img class="btn-ic" src="/ic-'+b.tipo+icSuf+'.png" alt="">' : '';
          if (b.tipo==='enlace' && b.thumb) icH='<img class="btn-thumb" src="'+esc(b.thumb)+'" alt="">';
          var cls = b.featured ? ' feat' : ((t.btnAnim && t.btnAnim!=='none') ? (' anim-'+t.btnAnim) : '');
          html += '<a class="btn fade'+cls+'" data-id="'+esc(b.id||'')+'" style="animation-delay:'+(0.1 + i*0.04)+'s;'+css.btn+(tx.btnColor?('color:'+tx.btnColor+';'):'')+'" href="'+esc(url)+'" target="_blank" rel="noopener">'+icH+esc(b.label||url)+'</a>';
        });
        html += '</div>';
      } else {
        html += '<img src="/bioo-empty.png" alt="" class="fade" style="width:120px;height:auto;display:block;margin:34px auto 0;animation-delay:.1s;">';
        html += '<p class="sub fade" style="margin-top:10px;animation-delay:.14s;color:'+p.sub+';">Aún no hay enlaces aquí.</p>';
      }
      wrap.innerHTML = html;
      document.getElementById('foot').style.display='block';

      // Conteo de clics por enlace (best-effort; las reglas permiten incrementar `clicks`).
      Array.prototype.forEach.call(wrap.querySelectorAll('a.btn[data-id]'), function(a){
        a.addEventListener('click', function(){
          var id = a.getAttribute('data-id'); if (!id || !bioRef) return;
          var upd = {}; upd['clicks.'+id] = firebase.firestore.FieldValue.increment(1);
          bioRef.update(upd).catch(function(){});
        });
      });

      setupShare(perfil);
    }

    function setupShare(perfil){
      var pageUrl = 'https://bioo.cl/' + user;
      var topbar = document.getElementById('topbar');
      var modal  = document.getElementById('shareModal');
      topbar.style.display = 'flex';
      setManifest(user, perfil.titulo);

      // Tarjeta del modal
      var avBox = document.getElementById('shAv');
      avBox.innerHTML = perfil.avatar
        ? '<img src="'+esc(perfil.avatar)+'" alt="">'
        : '<span style="font-size:38px;font-weight:800;color:#6b7768;">'+esc((perfil.titulo||user).charAt(0).toUpperCase())+'</span>';
      document.getElementById('shUser').textContent = perfil.titulo || ('@'+user);
      document.getElementById('shHandle').textContent = user;
      document.getElementById('shCta').textContent = 'Únete a @' + user + ' en bioo';
      document.getElementById('shReg').href = 'https://bioo.cl/registro';

      // Targets
      var enc = encodeURIComponent(pageUrl);
      var txt = encodeURIComponent((perfil.titulo || ('@'+user)) + ' · Mira mi página de enlaces');
      var urls = {
        x:   'https://twitter.com/intent/tweet?url=' + enc + '&text=' + txt,
        fb:  'https://www.facebook.com/sharer/sharer.php?u=' + enc,
        wa:  'https://wa.me/?text=' + txt + '%20' + enc,
        in:  'https://www.linkedin.com/sharing/share-offsite/?url=' + enc,
        tg:  'https://t.me/share/url?url=' + enc + '&text=' + txt,
        mail:'mailto:?subject=' + txt + '&body=' + enc
      };
      Array.prototype.forEach.call(modal.querySelectorAll('a[data-share]'), function(a){
        a.href = urls[a.getAttribute('data-share')] || pageUrl;
      });

      // Instagram no tiene URL de compartir web: copiamos el link para pegar en historia/DM.
      modal.querySelector('[data-share="ig"]').onclick = function(){
        copyLink(); showCopiedMsg('Link copiado — pégalo en tu historia o bio de Instagram');
      };

      function open(){ modal.style.display = 'flex'; }
      function close(){ modal.style.display = 'none'; }
      document.getElementById('shareBtn').onclick = open;
      document.getElementById('shareClose').onclick = close;
      modal.addEventListener('click', function(e){ if (e.target === modal) close(); });

      // Copiar
      function copyLink(){
        if (navigator.clipboard) navigator.clipboard.writeText(pageUrl).catch(function(){});
        else { var t=document.createElement('textarea'); t.value=pageUrl; document.body.appendChild(t); t.select(); try{document.execCommand('copy');}catch(e){} t.remove(); }
      }
      function showCopiedMsg(t){ var c=document.getElementById('copied'); c.textContent=t||'¡Link copiado!'; c.classList.add('show'); setTimeout(function(){c.classList.remove('show');},2200); }
      modal.querySelector('[data-share="copy"]').onclick = function(){ copyLink(); showCopiedMsg('¡Link copiado!'); };

      // Añadir a pantalla de inicio
      var tip = document.getElementById('a2hsTip');
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      document.getElementById('a2hsBtn').onclick = function(){
        if (standalone){ showCopiedMsg('Ya tienes la app instalada 🎉'); return; }
        if (window._deferredA2HS){
          window._deferredA2HS.prompt();
          window._deferredA2HS.userChoice.finally(function(){ window._deferredA2HS = null; });
          return;
        }
        if (isIOS){
          tip.innerHTML = 'En iPhone/iPad: toca <b>Compartir</b> <span class="ios-share"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M12 3v13"/><path d="m8 7 4-4 4 4"/></svg></span> en la barra de Safari y luego <b>“Añadir a pantalla de inicio”</b>.';
        } else {
          tip.innerHTML = 'Abre el <b>menú del navegador</b> (⋮) y elige <b>“Instalar app”</b> o <b>“Añadir a pantalla de inicio”</b>.';
        }
        tip.classList.add('show');
      };
    }
  })();
  </script>
