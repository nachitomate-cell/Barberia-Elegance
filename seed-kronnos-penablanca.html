<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Seed · Kronnos Studio Peñablanca</title>
  <style>
    body { font-family: monospace; background: #0a0a0a; color: #94a3b8; padding: 2rem; }
    h1   { color: #e11d2a; }
    code { color: #f0a; }
    button { padding: .75rem 1.5rem; background: #e11d2a; color: #fff; border: none;
             border-radius: .5rem; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    pre  { background: #1a1a1a; padding: 1rem; border-radius: .5rem; white-space: pre-wrap; margin-top: 1rem; }
    .ok  { color: #34d399; }
    .err { color: #f87171; }
    .warn{ color: #fbbf24; }
  </style>
</head>
<body>
  <h1>Seed — Kronnos Studio Peñablanca</h1>
  <p>Popula <code>tenants/kronnos_penablanca/</code> con barberos, servicios, premios y anuncio.</p>
  <p class="warn">⚠ Catálogo parcial: solo 3 servicios reales confirmados desde las capturas. El resto debe cargarlo el cliente desde el panel.</p>
  <button id="btn" onclick="run()">▶ Ejecutar Seed</button>
  <pre id="log">Listo para ejecutar…</pre>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js?v=1.3"></script>
  <script>
    const TENANT = 'kronnos_penablanca';
    const log = document.getElementById('log');
    const btn = document.getElementById('btn');

    function write(msg, cls) {
      log.innerHTML += `<span class="${cls||''}">${msg}\n</span>`;
    }

    async function set(path, data) {
      const parts = path.split('/');
      let ref = db;
      for (let i = 0; i < parts.length; i++) {
        ref = i % 2 === 0 ? ref.collection(parts[i]) : ref.doc(parts[i]);
      }
      await ref.set(data, { merge: true });
      write(`  ✓ ${path}`, 'ok');
    }

    // Horario base Kronnos: Lun a Sáb 10:30–19:00, Dom cerrado.
    const horarioBase = {
      '1': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '2': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '3': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '4': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '5': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '6': { activo: true,  inicio: '10:30', fin: '19:00', descansos: [] },
      '0': { activo: false, inicio: '10:30', fin: '19:00', descansos: [] },
    };

    async function run() {
      btn.disabled = true;
      log.innerHTML = '';
      try {
        /* ── Barberos / equipo ── */
        write('── Equipo ──');
        await set(`tenants/${TENANT}/barberos/martin`, {
          nombre: 'Martin', activo: true, disponible: true, foto: null, horario: horarioBase,
        });
        await set(`tenants/${TENANT}/barberos/evelyn-contreras`, {
          nombre: 'Evelyn Contreras', activo: true, disponible: true, foto: null, horario: horarioBase,
        });
        await set(`tenants/${TENANT}/barberos/araceli`, {
          nombre: 'Araceli', activo: true, disponible: true, foto: null, horario: horarioBase,
        });

        /* ── Configuración general (misma estructura que elegance) ── */
        write('\n── Configuración general ──');
        await set(`tenants/${TENANT}/configuracion/main`, {
          horarioInicio:    '10:30',
          horarioFin:       '19:00',
          intervaloMinutos: 30,
          diasLaborales:    [1, 2, 3, 4, 5, 6],
          telefonoAdmin:    '',
          diasBloqueados:   [],
          colacion:         null,
          diasConfig:       {},
        });

        /* ── Servicios (reales confirmados) ── */
        write('\n── Servicios · PACKS KRONNOS ──');
        await set(`tenants/${TENANT}/servicios/pack-toallas-calientes`, {
          nombre: 'Pack Kronnos Toallas Calientes', categoria: 'PACKS KRONNOS',
          duracion: 60, precio: 24990, disponible: true, orden: 1,
          descripcion: 'Incluye corte de cabello y perfilado de barba con productos premium Viking, finalizando con el ritual de toallas calientes.',
        });

        write('\n── Servicios · Servicios Masculinos ──');
        await set(`tenants/${TENANT}/servicios/corte-barba-basico`, {
          nombre: 'Corte y Barba básico', categoria: 'Servicios Masculinos',
          duracion: 60, precio: 18990, disponible: true, orden: 2,
          descripcion: 'Servicio "Corte y Barba Básico" diseñado para el hombre: corte de cabello y perfilado de barba.',
        });
        await set(`tenants/${TENANT}/servicios/corte-masculino`, {
          nombre: 'Corte Masculino', categoria: 'Servicios Masculinos',
          duracion: 45, precio: 12990, disponible: true, orden: 3,
          descripcion: 'Incluye asesoría antes y después del corte, lavado de cabello y styling.',
        });

        write('\n  (Catálogo parcial — faltan ~20 servicios por cargar)', 'warn');

        /* ── Premios / Club Kronnos ── */
        write('\n── Premios (Club Kronnos) ──');
        const premSnap = await db.collection(`tenants/${TENANT}/premios`).get();
        for (const d of premSnap.docs) await d.ref.delete();
        if (premSnap.size) write(`  ✓ Premios anteriores eliminados (${premSnap.size})`, 'ok');
        await db.collection(`tenants/${TENANT}/premios`).add({
          nombre: 'Descuento 30%', descripcion: '30% de descuento en tu próximo corte. Válido 30 días.',
          costoSellos: 5, icono: 'ph-tag', activo: true,
        });
        write('  ✓ Premio → "Descuento 30%" (5 sellos)', 'ok');
        await db.collection(`tenants/${TENANT}/premios`).add({
          nombre: 'Corte gratis', descripcion: 'Un Corte Masculino completamente gratis. Elige al profesional de tu preferencia.',
          costoSellos: 10, icono: 'ph-scissors', activo: true,
        });
        write('  ✓ Premio → "Corte gratis" (10 sellos)', 'ok');

        /* ── Anuncio de Marketing ── */
        write('\n── Anuncio ──');
        await set(`tenants/${TENANT}/config/anuncio`, {
          titulo: 'Espacio unisex en Villa Alemana',
          descripcion: 'Barbería y estilismo profesional con más de 12 años de experiencia. Agenda tu hora online.',
          imagen: '', ctaTexto: 'Reservar ahora', ctaUrl: '/', activo: true,
          versionId: Date.now().toString(),
        });

        write('\n✅ Seed completado. Prueba: /?local=kronnos_penablanca', 'ok');
      } catch (e) {
        write(`\n❌ Error: ${e.message}`, 'err');
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
