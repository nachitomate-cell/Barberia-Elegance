<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Catálogo · Deluxe Perfumes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    /* ── Design tokens ──────────────────────────────────────────────── */
    :root {
      --gold:         #C9A84C;
      --gold-rgb:     201, 168, 76;
      --gold-light:   #E8D5A3;
      --gold-dim:     rgba(201,168,76,0.1);
      --gold-border:  rgba(201,168,76,0.18);
      --bg:           #070500;
      --surface:      #0C0904;
      --card:         #121008;
      --border:       rgba(201,168,76,0.1);
      --text:         #F0E6CC;
      --text-sec:     #9A8A5C;
      --text-muted:   #544A32;
      --red:          #D94F4F;
      --serif:        'Cormorant Garamond', Georgia, serif;
      --sans:         'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --r-card:       14px;
      --r-pill:       999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 40;
      background: rgba(7,5,0,0.94);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1.25rem 0;
    }
    .header-top {
      display: flex; align-items: center; gap: 0.875rem; margin-bottom: 0.875rem;
    }
    .header-logo {
      width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
      object-fit: cover; border: 1px solid var(--gold-border);
    }
    .header-logo-fallback {
      width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      display: none; align-items: center; justify-content: center;
    }
    .header-name {
      font-family: var(--serif);
      font-size: 1.1875rem; font-weight: 700;
      color: var(--gold-light); letter-spacing: 0.025em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-tagline {
      font-size: 0.625rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px;
    }

    /* ── Search ──────────────────────────────────────────────────────── */
    .search-row { position: relative; padding-bottom: 0.875rem; }
    .search-icon {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 1rem; pointer-events: none;
    }
    .search-clear {
      position: absolute; right: 0.875rem; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 1rem; cursor: pointer;
      background: none; border: none; padding: 0.25rem;
      display: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-pill);
      padding: 0.75rem 2.5rem 0.75rem 2.75rem;
      font-family: var(--sans); font-size: 0.875rem; color: var(--text);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none; appearance: none;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: rgba(var(--gold-rgb), 0.35);
      box-shadow: 0 0 0 3px rgba(var(--gold-rgb), 0.06);
    }

    /* ── Filter chips ────────────────────────────────────────────────── */
    .filters-scroll {
      display: flex; gap: 0.5rem;
      padding: 0 1.25rem 0.875rem;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filters-scroll::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 0.4375rem 1rem; border-radius: var(--r-pill);
      font-family: var(--sans); font-size: 0.8125rem; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-sec);
      transition: all 0.16s; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      min-height: 36px; line-height: 1;
    }
    .filter-chip:active { transform: scale(0.95); }
    .filter-chip.active {
      background: rgba(var(--gold-rgb), 0.13);
      border-color: rgba(var(--gold-rgb), 0.38);
      color: var(--gold);
    }

    /* ── Grid ────────────────────────────────────────────────────────── */
    .grid-section { padding: 0 1rem 7rem; }
    .results-count {
      font-size: 0.75rem; color: var(--text-muted);
      padding: 0 0.25rem 0.75rem; letter-spacing: 0.03em;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.875rem;
    }
    @media (min-width: 480px) {
      .product-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 768px) {
      .product-grid { gap: 1.125rem; }
      .grid-section { padding: 0 1.5rem 7rem; }
    }
    @media (min-width: 1024px) {
      .product-grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* ── Product card ────────────────────────────────────────────────── */
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      overflow: hidden; cursor: pointer;
      display: flex; flex-direction: column;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                  border-color 0.2s, box-shadow 0.22s;
      -webkit-tap-highlight-color: transparent;
      animation: fadeUp 0.38s ease both;
      will-change: transform;
    }
    .product-card:hover {
      transform: translateY(-4px);
      border-color: rgba(var(--gold-rgb), 0.3);
      box-shadow: 0 18px 44px rgba(0,0,0,0.55),
                  0 0 0 1px rgba(var(--gold-rgb), 0.07);
    }
    .product-card:active { transform: scale(0.97); transition-duration: 0.1s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .product-img-wrap {
      aspect-ratio: 3 / 4;
      background: linear-gradient(160deg, #0D0A04, #181308);
      overflow: hidden; position: relative;
    }
    .product-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease;
    }
    .product-card:hover .product-img { transform: scale(1.06); }
    .product-img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 55%, rgba(7,5,0,0.5) 100%);
      pointer-events: none; z-index: 1;
    }

    .product-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: rgba(var(--gold-rgb), 0.15); font-size: 2.5rem;
    }

    .badge-cat {
      position: absolute; top: 0.5rem; left: 0.5rem; z-index: 2;
      padding: 0.2rem 0.5rem; border-radius: var(--r-pill);
      font-size: 0.5rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(7,5,0,0.72); backdrop-filter: blur(6px);
      border: 1px solid var(--gold-border); color: var(--gold);
    }
    .badge-off {
      position: absolute; top: 0.5rem; right: 0.5rem; z-index: 2;
      padding: 0.2rem 0.5rem; border-radius: var(--r-pill);
      font-size: 0.5rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--red); color: #fff;
    }

    .product-info {
      padding: 0.75rem;
      flex: 1; display: flex; flex-direction: column;
    }
    .product-brand {
      font-size: 0.5625rem; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 0.2rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .product-name {
      font-size: 0.875rem; font-weight: 700; color: var(--text);
      line-height: 1.3; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-prices {
      display: flex; align-items: baseline; gap: 0.375rem;
      flex-wrap: wrap; margin-top: 0.5rem;
    }
    .product-price {
      font-family: var(--serif);
      font-size: 1.0625rem; font-weight: 700;
      color: var(--gold); letter-spacing: -0.01em;
    }
    .product-price-orig {
      font-size: 0.6875rem; color: var(--text-muted);
      text-decoration: line-through;
    }

    /* ── Member pricing ──────────────────────────────────────────────── */
    .badge-member-price {
      display: block; width: fit-content;
      font-size: 0.5rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; padding: 0.15rem 0.45rem;
      border-radius: var(--r-pill);
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      color: var(--gold); margin-top: 0.25rem;
    }
    .member-incentive {
      font-size: 0.5625rem; color: var(--text-muted);
      font-weight: 600; margin-top: 0.25rem; letter-spacing: 0.02em;
    }
    .detail-member-price {
      font-size: 0.75rem; color: var(--text-sec); margin-top: 0.375rem;
      display: flex; align-items: center; gap: 0.375rem;
    }
    .detail-member-badge {
      font-size: 0.5625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; padding: 0.15rem 0.5rem;
      border-radius: var(--r-pill);
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      color: var(--gold);
    }

    /* ── Skeleton ────────────────────────────────────────────────────── */
    .skel-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-card); overflow: hidden;
    }
    .skel {
      background: linear-gradient(90deg,
        rgba(var(--gold-rgb),0.04) 25%,
        rgba(var(--gold-rgb),0.08) 50%,
        rgba(var(--gold-rgb),0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Empty / error state ─────────────────────────────────────────── */
    .state-wrap {
      grid-column: 1 / -1;
      display: flex; flex-direction: column; align-items: center;
      padding: 4.5rem 2rem; text-align: center; gap: 0.625rem;
    }
    .state-icon {
      width: 66px; height: 66px; border-radius: 50%;
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.75rem; margin-bottom: 0.625rem;
    }
    .state-title {
      font-family: var(--serif);
      font-size: 1.3125rem; font-weight: 600; color: var(--text);
    }
    .state-sub {
      font-size: 0.875rem; color: var(--text-sec);
      line-height: 1.65; max-width: 280px;
    }

    /* ── Bottom sheet ────────────────────────────────────────────────── */
    #detail-overlay {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.82); backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.28s;
    }
    #detail-overlay.open { opacity: 1; pointer-events: auto; }

    #detail-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 61;
      background: #0D0A04;
      border-top: 1px solid var(--gold-border);
      border-radius: 22px 22px 0 0;
      max-height: 90vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.36s cubic-bezier(0.32,0,0.15,1);
      overscroll-behavior: contain;
    }
    #detail-panel.open { transform: translateY(0); }

    .detail-handle {
      width: 44px; height: 4px;
      background: rgba(var(--gold-rgb),0.2); border-radius: 2px;
      margin: 1rem auto 0;
    }

    .detail-img {
      width: 100%; aspect-ratio: 3/2; object-fit: contain;
      background: linear-gradient(150deg, #0D0A04 0%, #171209 100%);
      padding: 2rem 3rem; margin-top: 0.75rem;
    }
    .detail-img-placeholder {
      width: 100%; aspect-ratio: 3/2;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface); margin-top: 0.75rem;
      color: rgba(var(--gold-rgb),0.15); font-size: 5rem;
    }

    .detail-body { padding: 1.25rem 1.5rem 3rem; }

    .detail-head {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 0.75rem; margin-bottom: 0.875rem;
    }
    .detail-badges { display: flex; gap: 0.375rem; flex-wrap: wrap; }
    .detail-badge {
      padding: 0.25rem 0.75rem; border-radius: var(--r-pill);
      font-size: 0.5625rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      color: var(--gold);
    }
    .detail-close {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-sec); cursor: pointer; font-size: 0.875rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.16s; -webkit-tap-highlight-color: transparent;
    }
    .detail-close:hover { background: rgba(255,255,255,0.1); }

    .detail-brand {
      font-size: 0.6875rem; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 0.25rem;
    }
    .detail-name {
      font-family: var(--serif);
      font-size: 1.625rem; font-weight: 700; color: var(--text);
      letter-spacing: 0.01em; line-height: 1.2; margin-bottom: 1rem;
    }
    .detail-price-row {
      display: flex; align-items: baseline; gap: 0.75rem;
      flex-wrap: wrap; margin-bottom: 1.125rem;
    }
    .detail-price {
      font-family: var(--serif);
      font-size: 2.125rem; font-weight: 700; color: var(--gold);
      letter-spacing: -0.02em;
    }
    .detail-price-orig {
      font-size: 1rem; color: var(--text-muted); text-decoration: line-through;
    }
    .detail-badge-off {
      padding: 0.25rem 0.625rem; border-radius: var(--r-pill);
      font-size: 0.75rem; font-weight: 800;
      background: var(--red); color: #fff;
    }
    .detail-desc {
      font-size: 0.9rem; color: var(--text-sec);
      line-height: 1.75; margin-bottom: 1.25rem;
    }
    .detail-divider { height: 1px; background: var(--border); margin-bottom: 1.25rem; }

    .btn-wa {
      display: flex; align-items: center; justify-content: center; gap: 0.625rem;
      width: 100%; padding: 1rem 1.5rem; border-radius: var(--r-pill);
      background: linear-gradient(135deg, #27D36B 0%, #1DB954 100%);
      color: #fff; font-family: var(--sans); font-size: 0.9375rem; font-weight: 700;
      border: none; cursor: pointer; text-decoration: none;
      transition: transform 0.16s, opacity 0.16s;
      -webkit-tap-highlight-color: transparent; min-height: 52px;
      margin-bottom: 0.75rem;
    }
    .btn-wa:active { transform: scale(0.97); opacity: 0.9; }

    .btn-share {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%; padding: 0.875rem 1.5rem; border-radius: var(--r-pill);
      background: transparent; border: 1px solid var(--gold-border);
      color: var(--gold); font-family: var(--sans); font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.16s;
      -webkit-tap-highlight-color: transparent; min-height: 48px;
    }
    .btn-share:hover { background: var(--gold-dim); }
    .btn-share:active { transform: scale(0.97); }

    /* ── Bottom nav ─────────────────────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      display: flex;
      background: rgba(7,5,0,0.97);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.3rem; padding: 0.75rem 0.5rem;
      text-decoration: none;
      color: var(--text-muted);
      font-family: var(--sans); font-size: 0.625rem; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      transition: color 0.18s;
      -webkit-tap-highlight-color: transparent;
      position: relative; min-height: 56px;
    }
    .nav-tab i { font-size: 1.375rem; line-height: 1; }
    .nav-tab.active { color: var(--gold); }
    .nav-tab.active::after {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 2.25rem; height: 2px; border-radius: 0 0 3px 3px;
      background: linear-gradient(90deg, rgba(201,168,76,0.4), var(--gold), rgba(201,168,76,0.4));
    }
    .nav-tab:not(.active):active { color: var(--text-sec); }

    /* ── Retry button ────────────────────────────────────────────────── */
    .btn-retry {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem; border-radius: var(--r-pill);
      border: 1px solid var(--gold-border); background: transparent;
      color: var(--gold); font-family: var(--sans); font-size: 0.875rem; font-weight: 600;
      cursor: pointer; margin-top: 0.75rem;
      transition: background 0.16s; -webkit-tap-highlight-color: transparent;
    }
    .btn-retry:hover { background: var(--gold-dim); }
  </style>
</head>
<body>

  <!-- ── Header ────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-top">
      <img id="store-logo" src="/deluxeperfumes.jpg" alt="Deluxe Perfumes" class="header-logo"
        onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'">
      <div id="logo-fallback" class="header-logo-fallback">
        <i class="ph-fill ph-drop" style="font-size:1.375rem;color:var(--gold)"></i>
      </div>
      <div style="min-width:0;flex:1">
        <p id="store-name" class="header-name">Deluxe Perfumes</p>
        <p class="header-tagline">Fragancias · Viña del Mar</p>
      </div>
    </div>

    <div class="search-row">
      <i class="ph ph-magnifying-glass search-icon"></i>
      <input id="search-input" class="search-input" type="search"
        placeholder="Busca tu fragancia…" oninput="onSearch(this.value)" autocomplete="off">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">
        <i class="ph-bold ph-x"></i>
      </button>
    </div>
  </header>

  <!-- ── Filter chips ──────────────────────────────────────────────────── -->
  <div class="filters-scroll" id="filters-bar">
    <button class="filter-chip active" data-cat="all" onclick="selectCat('all',this)">Todos</button>
  </div>

  <!-- ── Product grid ──────────────────────────────────────────────────── -->
  <div class="grid-section">
    <p class="results-count" id="results-count" style="display:none"></p>
    <div class="product-grid" id="product-grid"></div>
  </div>

  <!-- ── Bottom sheet ──────────────────────────────────────────────────── -->
  <div id="detail-overlay" onclick="closeDetail()"></div>
  <div id="detail-panel">
    <div class="detail-handle"></div>
    <div id="detail-img-wrap"></div>
    <div class="detail-body">
      <div class="detail-head">
        <div class="detail-badges" id="detail-badges"></div>
        <button class="detail-close" onclick="closeDetail()">
          <i class="ph-bold ph-x"></i>
        </button>
      </div>
      <p id="detail-brand" class="detail-brand"></p>
      <h2 id="detail-name" class="detail-name"></h2>
      <div id="detail-price-row" class="detail-price-row"></div>
      <div id="detail-member-note" class="detail-member-price" style="display:none"></div>
      <p id="detail-desc" class="detail-desc"></p>
      <div class="detail-divider"></div>
      <div id="detail-actions"></div>
    </div>
  </div>

  <!-- ── Bottom nav ──────────────────────────────────────────────────── -->
  <nav class="bottom-nav">
    <a id="nav-catalogo" href="/catalogo" class="nav-tab active">
      <i class="ph-fill ph-drop"></i>
      Catálogo
    </a>
    <a id="nav-club" href="/registro.html" class="nav-tab">
      <i class="ph ph-crown"></i>
      Club
    </a>
  </nav>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="/config.js"></script>
  <script src="/firebase-config.js?v=1.1"></script>

  <script>
    const TENANT_ID = new URLSearchParams(location.search).get('local') || 'deluxeperfumes';

    let _all            = [];
    let _cat            = 'all';
    let _q              = '';
    let _waPhone        = '';
    let _isMember       = false;
    let _memberDiscount = 0;   // 10 para basico, 15 para premium
    let _memberPlan     = null;

    // ── Membership check ──────────────────────────────────────────────
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) return;
      try {
        const snap = await db.collection('tenants').doc(TENANT_ID)
          .collection('users').doc(user.uid).get();
        if (!snap.exists) return;
        const d = snap.data();
        const vence = d.fechaVencimientoMembresia?.toDate();
        if (d.esMiembro && vence && vence > new Date()) {
          _isMember       = true;
          _memberPlan     = d.planMembresia;
          _memberDiscount = d.planMembresia === 'premium' ? 15 : 10;
          renderProducts(); // Re-renderiza con precios de miembro
        }
      } catch (_) {}
    });

    function col() {
      return db.collection('tenants').doc(TENANT_ID).collection('productos');
    }

    function fmtPrice(n) {
      return '$' + Number(n).toLocaleString('es-CL');
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function offPct(precio, orig) {
      if (!orig || !precio || orig <= precio) return 0;
      return Math.round((1 - precio / orig) * 100);
    }

    // ── Skeleton ──────────────────────────────────────────────────────
    function renderSkeleton() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = Array(6).fill(0).map(() => `
        <div class="skel-card">
          <div class="skel" style="aspect-ratio:3/4"></div>
          <div style="padding:.75rem;display:flex;flex-direction:column;gap:.5rem">
            <div class="skel" style="height:9px;width:45%;border-radius:4px"></div>
            <div class="skel" style="height:13px;width:80%;border-radius:4px"></div>
            <div class="skel" style="height:12px;width:65%;border-radius:4px"></div>
            <div class="skel" style="height:17px;width:40%;border-radius:4px;margin-top:4px"></div>
          </div>
        </div>`).join('');
    }

    // ── Filters ───────────────────────────────────────────────────────
    function buildFilters(products) {
      const cats = [...new Set(products.map(p => p.categoria).filter(Boolean))].sort();
      const hasOffers = products.some(p => p.precioOriginal > p.precio);
      const bar = document.getElementById('filters-bar');
      bar.querySelectorAll('[data-cat]:not([data-cat="all"])').forEach(el => el.remove());
      cats.forEach(cat => {
        const b = document.createElement('button');
        b.className = 'filter-chip';
        b.dataset.cat = cat;
        b.textContent = cat;
        b.onclick = () => selectCat(cat, b);
        bar.appendChild(b);
      });
      if (hasOffers) {
        const b = document.createElement('button');
        b.className = 'filter-chip';
        b.dataset.cat = '__offers__';
        b.textContent = 'Ofertas';
        b.onclick = () => selectCat('__offers__', b);
        bar.appendChild(b);
      }
    }

    function selectCat(cat, el) {
      _cat = cat;
      document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderProducts();
    }

    function onSearch(val) {
      _q = val.trim().toLowerCase();
      const clearBtn = document.getElementById('search-clear');
      clearBtn.style.display = _q ? 'block' : 'none';
      renderProducts();
    }

    function clearSearch() {
      const input = document.getElementById('search-input');
      input.value = '';
      onSearch('');
      input.focus();
    }

    // ── Render grid ───────────────────────────────────────────────────
    function renderProducts() {
      const filtered = _all.filter(p => {
        if (_cat === '__offers__') {
          if (!(p.precioOriginal > p.precio)) return false;
        } else if (_cat !== 'all') {
          if (p.categoria !== _cat) return false;
        }
        if (_q) {
          const haystack = [p.nombre, p.marca, p.descripcion, p.categoria]
            .filter(Boolean).join(' ').toLowerCase();
          if (!haystack.includes(_q)) return false;
        }
        return true;
      });

      const countEl = document.getElementById('results-count');
      if (_q || _cat !== 'all') {
        countEl.style.display = '';
        countEl.textContent = `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}`;
      } else {
        countEl.style.display = 'none';
      }

      const grid = document.getElementById('product-grid');

      if (filtered.length === 0) {
        const term = esc(_q || _cat);
        grid.innerHTML = `
          <div class="state-wrap">
            <div class="state-icon"><i class="ph ph-magnifying-glass"></i></div>
            <p class="state-title">Sin resultados</p>
            <p class="state-sub">No encontramos fragancias que coincidan con "${term}".<br>Prueba con otro término o explora las categorías.</p>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map((p, i) => {
        const off         = offPct(p.precio, p.precioOriginal);
        const delay       = Math.min(i, 8) * 55;
        const memberPrice = (_isMember && p.precio != null)
          ? Math.round(p.precio * (1 - _memberDiscount / 100))
          : null;
        // Para no-miembros: mostrar incentivo en ~1 de cada 3 productos con precio alto
        const showIncentive = !_isMember && p.precio > 15000 && i % 3 === 0;
        const savedAmt      = showIncentive ? Math.round(p.precio * 0.10) : 0;

        return `
          <div class="product-card" onclick="openDetail('${esc(p.id)}')" style="animation-delay:${delay}ms">
            <div class="product-img-wrap">
              ${p.imagen
                ? `<img class="product-img" src="${esc(p.imagen)}" alt="${esc(p.nombre||'')}" loading="lazy"
                     onerror="this.closest('.product-img-wrap').innerHTML='<div class=\\"product-img-placeholder\\"><i class=\\"ph-fill ph-drop\\"></i></div>'">`
                : `<div class="product-img-placeholder"><i class="ph-fill ph-drop"></i></div>`}
              ${p.categoria ? `<span class="badge-cat">${esc(p.categoria)}</span>` : ''}
              ${off > 0 ? `<span class="badge-off">-${off}%</span>` : ''}
            </div>
            <div class="product-info">
              ${p.marca ? `<p class="product-brand">${esc(p.marca)}</p>` : ''}
              <p class="product-name">${esc(p.nombre || 'Producto')}</p>
              <div class="product-prices">
                ${memberPrice != null
                  ? `<span class="product-price">${fmtPrice(memberPrice)}</span>
                     <span class="product-price-orig">${fmtPrice(p.precio)}</span>
                     <span class="badge-member-price">Precio miembro</span>`
                  : `${p.precio != null ? `<span class="product-price">${fmtPrice(p.precio)}</span>` : ''}
                     ${off > 0 ? `<span class="product-price-orig">${fmtPrice(p.precioOriginal)}</span>` : ''}`}
              </div>
              ${showIncentive ? `<p class="member-incentive">Miembros ahorran ${fmtPrice(savedAmt)}</p>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    // ── Detail bottom sheet ───────────────────────────────────────────
    function openDetail(id) {
      const p = _all.find(x => x.id === id);
      if (!p) return;

      const off = offPct(p.precio, p.precioOriginal);

      // Image
      document.getElementById('detail-img-wrap').innerHTML = p.imagen
        ? `<img class="detail-img" src="${esc(p.imagen)}" alt="${esc(p.nombre||'')}">`
        : `<div class="detail-img-placeholder"><i class="ph-fill ph-drop"></i></div>`;

      // Badges
      const badges = document.getElementById('detail-badges');
      badges.innerHTML = p.categoria
        ? `<span class="detail-badge">${esc(p.categoria)}</span>` : '';

      // Brand + name
      const brandEl = document.getElementById('detail-brand');
      brandEl.textContent = p.marca || '';
      brandEl.style.display = p.marca ? '' : 'none';
      document.getElementById('detail-name').textContent = p.nombre || 'Producto';

      // Prices
      const priceRow  = document.getElementById('detail-price-row');
      const memberPriceDetail = (_isMember && p.precio != null)
        ? Math.round(p.precio * (1 - _memberDiscount / 100))
        : null;
      let priceHtml = '';
      if (memberPriceDetail != null) {
        priceHtml = `<span class="detail-price">${fmtPrice(memberPriceDetail)}</span>
          <span class="detail-price-orig">${fmtPrice(p.precio)}</span>`;
      } else {
        if (p.precio != null) priceHtml += `<span class="detail-price">${fmtPrice(p.precio)}</span>`;
        if (off > 0) {
          priceHtml += `<span class="detail-price-orig">${fmtPrice(p.precioOriginal)}</span>`;
          priceHtml += `<span class="detail-badge-off">-${off}%</span>`;
        }
      }
      priceRow.innerHTML = priceHtml;

      // Member price note
      const priceNoteEl = document.getElementById('detail-member-note');
      if (priceNoteEl) {
        if (memberPriceDetail != null) {
          priceNoteEl.innerHTML = `<span class="detail-member-badge">Precio miembro ${_memberDiscount}%</span>
            <span>vs. precio público ${fmtPrice(p.precio)}</span>`;
          priceNoteEl.style.display = 'flex';
        } else if (p.precio != null) {
          const saving = Math.round(p.precio * 0.10);
          priceNoteEl.innerHTML = `<i class="ph ph-crown"></i> Miembros pagan ${fmtPrice(p.precio - saving)} · <a href="/membresia" style="color:var(--gold)">Únete al Club</a>`;
          priceNoteEl.style.display = 'flex';
        } else {
          priceNoteEl.style.display = 'none';
        }
      }

      // Description
      const descEl = document.getElementById('detail-desc');
      descEl.textContent = p.descripcion || '';
      descEl.style.display = p.descripcion ? '' : 'none';

      // Actions
      const actions = document.getElementById('detail-actions');
      actions.innerHTML = '';
      if (_waPhone) {
        const msg = encodeURIComponent(
          `Hola! Me interesa este perfume:\n*${p.nombre}*${p.precio != null ? `\nPrecio: ${fmtPrice(p.precio)}` : ''}`
        );
        const a = document.createElement('a');
        a.className = 'btn-wa';
        a.href = `https://wa.me/${_waPhone}?text=${msg}`;
        a.target = '_blank'; a.rel = 'noopener noreferrer';
        a.innerHTML = '<i class="ph-fill ph-whatsapp-logo"></i> Consultar por WhatsApp';
        actions.appendChild(a);
      }
      const shareBtn = document.createElement('button');
      shareBtn.className = 'btn-share';
      shareBtn.innerHTML = '<i class="ph ph-share-network"></i> Compartir fragancia';
      shareBtn.onclick = () => {
        const shareData = { title: p.nombre, text: `${p.nombre}${p.precio != null ? ' — ' + fmtPrice(p.precio) : ''}`, url: location.href };
        if (navigator.share) navigator.share(shareData);
        else navigator.clipboard?.writeText(location.href);
      };
      actions.appendChild(shareBtn);

      document.getElementById('detail-overlay').classList.add('open');
      document.getElementById('detail-panel').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
      document.getElementById('detail-overlay').classList.remove('open');
      document.getElementById('detail-panel').classList.remove('open');
      document.body.style.overflow = '';
    }

    // Swipe down to close
    let _ty0 = 0;
    const panel = document.getElementById('detail-panel');
    panel.addEventListener('touchstart', e => { _ty0 = e.touches[0].clientY; }, { passive: true });
    panel.addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - _ty0 > 72) closeDetail(); }, { passive: true });

    // Escape key
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    // ── Load tenant settings ──────────────────────────────────────────
    async function loadSettings() {
      try {
        const snap = await db.collection('tenants').doc(TENANT_ID).collection('settings').doc('main').get();
        if (!snap.exists) return;
        const d = snap.data();
        if (d.nombre) {
          document.getElementById('store-name').textContent = d.nombre;
          document.title = 'Catálogo · ' + d.nombre;
        }
        if (d.logo) document.getElementById('store-logo').src = d.logo;
        if (d.whatsapp) _waPhone = d.whatsapp.replace(/\D/g, '');
        if (d.accentColor) {
          const hex = d.accentColor.replace('#', '');
          if (hex.length === 6) {
            const r = parseInt(hex.slice(0,2), 16);
            const g = parseInt(hex.slice(2,4), 16);
            const b = parseInt(hex.slice(4,6), 16);
            document.documentElement.style.setProperty('--gold', d.accentColor);
            document.documentElement.style.setProperty('--gold-rgb', `${r}, ${g}, ${b}`);
          }
        }
      } catch (_) {}
    }

    // ── Load products ─────────────────────────────────────────────────
    async function loadProducts() {
      renderSkeleton();
      try {
        const snap = await col().where('activo', '==', true).get();
        _all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        _all.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || '', 'es'));
        buildFilters(_all);
        if (_all.length === 0) {
          document.getElementById('product-grid').innerHTML = `
            <div class="state-wrap">
              <div class="state-icon"><i class="ph-fill ph-drop"></i></div>
              <p class="state-title">Catálogo vacío</p>
              <p class="state-sub">Estamos preparando nuestras fragancias.<br>Vuelve pronto.</p>
            </div>`;
          return;
        }
        renderProducts();
      } catch (_) {
        document.getElementById('product-grid').innerHTML = `
          <div class="state-wrap">
            <div class="state-icon"><i class="ph ph-wifi-slash"></i></div>
            <p class="state-title">No pudimos cargar el catálogo</p>
            <p class="state-sub">Verifica tu conexión a internet e intenta nuevamente.</p>
            <button class="btn-retry" onclick="loadProducts()">
              <i class="ph ph-arrow-clockwise"></i> Reintentar
            </button>
          </div>`;
      }
    }

    loadSettings();
    loadProducts();

    // Nav links — preservar ?local= si se accede como tenant secundario
    (function () {
      const q = TENANT_ID !== 'deluxeperfumes' ? '?local=' + TENANT_ID : '';
      document.getElementById('nav-catalogo').href = '/catalogo' + q;
      document.getElementById('nav-club').href     = '/registro.html' + q;
    })();
  </script>
</body>
</html>
