<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Catálogo</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:     #a78bfa;
      --accent-rgb: 167,139,250;
      --bg:         #080610;
      --surface:    #0f0c1a;
      --card:       #130f20;
      --border:     rgba(255,255,255,0.07);
      --text:       #ede9fe;
      --muted:      #6b7280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(8,6,16,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 0.875rem;
    }
    .header-logo {
      width: 40px; height: 40px; border-radius: 0.75rem;
      object-fit: cover;
      border: 1px solid rgba(var(--accent-rgb),0.25);
      flex-shrink: 0;
    }
    .header-logo-fallback {
      width: 40px; height: 40px; border-radius: 0.75rem; flex-shrink: 0;
      background: rgba(var(--accent-rgb),0.08);
      border: 1px solid rgba(var(--accent-rgb),0.2);
      display: flex; align-items: center; justify-content: center;
    }
    .header-name {
      font-size: 1rem; font-weight: 700; color: #fff;
      letter-spacing: -0.02em;
    }
    .header-tagline {
      font-size: 0.6875rem; color: var(--muted); margin-top: 0.125rem;
    }
    .header-right { margin-left: auto; }
    .cart-btn {
      position: relative;
      width: 38px; height: 38px; border-radius: 0.75rem;
      background: rgba(var(--accent-rgb),0.08);
      border: 1px solid rgba(var(--accent-rgb),0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--accent); transition: background 0.2s;
    }
    .cart-btn:hover { background: rgba(var(--accent-rgb),0.15); }

    /* ── Search ── */
    .search-wrap {
      padding: 0.875rem 1.25rem 0;
    }
    .search-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.875rem;
      padding: 0.625rem 1rem 0.625rem 2.75rem;
      font-size: 0.875rem; color: var(--text);
      outline: none; transition: border-color 0.2s;
      position: relative;
    }
    .search-box:focus { border-color: rgba(var(--accent-rgb),0.4); }
    .search-box::placeholder { color: #374151; }
    .search-wrap-inner { position: relative; }
    .search-icon {
      position: absolute; left: 0.875rem; top: 50%;
      transform: translateY(-50%);
      color: #374151; font-size: 1rem; pointer-events: none;
    }

    /* ── Categorías ── */
    .cats-scroll {
      padding: 0.875rem 1.25rem;
      display: flex; gap: 0.5rem;
      overflow-x: auto; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .cats-scroll::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0; scroll-snap-align: start;
      padding: 0.375rem 0.875rem; border-radius: 999px;
      font-size: 0.8125rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--muted);
      transition: all 0.2s; white-space: nowrap;
    }
    .cat-pill.active {
      background: rgba(var(--accent-rgb),0.15);
      border-color: rgba(var(--accent-rgb),0.4);
      color: var(--accent);
    }

    /* ── Grid ── */
    .grid-wrap { padding: 0 1rem 6rem; }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.875rem;
    }
    @media (min-width: 480px) {
      .product-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 768px) {
      .product-grid { grid-template-columns: repeat(4, 1fr); gap: 1.125rem; }
      .grid-wrap { padding: 0 1.5rem 6rem; }
    }

    /* ── Product Card ── */
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.125rem;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-3px);
      border-color: rgba(var(--accent-rgb),0.25);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4), 0 0 20px rgba(var(--accent-rgb),0.06);
    }
    .product-img-wrap {
      aspect-ratio: 1 / 1;
      background: var(--surface);
      overflow: hidden; position: relative;
    }
    .product-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.35s;
    }
    .product-card:hover .product-img { transform: scale(1.05); }
    .product-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: rgba(var(--accent-rgb),0.3); font-size: 2.5rem;
    }
    .product-cat-badge {
      position: absolute; top: 0.5rem; left: 0.5rem;
      padding: 0.125rem 0.5rem; border-radius: 999px;
      font-size: 0.5625rem; font-weight: 700; text-transform: uppercase;
      background: rgba(var(--accent-rgb),0.15);
      border: 1px solid rgba(var(--accent-rgb),0.3);
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    .product-info {
      padding: 0.75rem;
      flex: 1; display: flex; flex-direction: column; gap: 0.25rem;
    }
    .product-name {
      font-size: 0.875rem; font-weight: 700; color: #fff;
      line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-desc {
      font-size: 0.6875rem; color: var(--muted); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; flex: 1;
    }
    .product-price {
      font-size: 0.9375rem; font-weight: 800;
      color: var(--accent); margin-top: 0.375rem;
      letter-spacing: -0.02em;
    }

    /* ── States ── */
    .state-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 4rem 1.5rem; text-align: center;
    }
    .state-icon { font-size: 3rem; color: #1f1a30; margin-bottom: 1rem; }
    .state-title { font-size: 1rem; font-weight: 700; color: #4b4568; margin-bottom: 0.375rem; }
    .state-sub { font-size: 0.8125rem; color: #2d2840; }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.07) 50%,
        rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 0.75rem;
    }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

    /* ── Modal detalle ── */
    #detail-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    #detail-overlay.open { opacity: 1; pointer-events: auto; }
    #detail-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 51;
      background: #100d1f;
      border-top: 1px solid rgba(var(--accent-rgb),0.15);
      border-radius: 1.5rem 1.5rem 0 0;
      max-height: 88vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32,0,0.15,1);
    }
    #detail-panel.open { transform: translateY(0); }
    .detail-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.1); border-radius: 999px;
      margin: 1rem auto;
    }
    .detail-img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      background: var(--surface);
    }
    .detail-img-placeholder {
      width: 100%; aspect-ratio: 4/3;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      color: rgba(var(--accent-rgb),0.25); font-size: 4rem;
    }
    .detail-body { padding: 1.25rem 1.25rem 2.5rem; }
    .detail-cat {
      display: inline-flex; align-items: center;
      padding: 0.2rem 0.625rem; border-radius: 999px;
      font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
      background: rgba(var(--accent-rgb),0.12);
      border: 1px solid rgba(var(--accent-rgb),0.3);
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }
    .detail-name {
      font-size: 1.25rem; font-weight: 800; color: #fff;
      letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.5rem;
    }
    .detail-price {
      font-size: 1.5rem; font-weight: 800; color: var(--accent);
      letter-spacing: -0.03em; margin-bottom: 1rem;
    }
    .detail-desc {
      font-size: 0.875rem; color: #9d96b8; line-height: 1.7;
    }
    .detail-close {
      position: absolute; top: 1rem; right: 1rem; z-index: 52;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: #94a3b8; cursor: pointer; font-size: 0.875rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .detail-close:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <img id="store-logo" src="/deluxeperfumes.jpg" alt="Deluxe Perfumes" class="header-logo"
      onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'">
    <div id="logo-fallback" class="header-logo-fallback" style="display:none;">
      <i class="ph-fill ph-drop" style="font-size:1.25rem;color:var(--accent);"></i>
    </div>
    <div>
      <p id="store-name" class="header-name">Deluxe Perfumes</p>
      <p class="header-tagline">Catálogo de productos</p>
    </div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-wrap-inner">
      <i class="ph ph-magnifying-glass search-icon"></i>
      <input id="search-input" class="search-box" type="search"
        placeholder="Buscar producto…" oninput="filterProducts()">
    </div>
  </div>

  <!-- Category pills -->
  <div class="cats-scroll" id="cats-bar">
    <button class="cat-pill active" data-cat="all" onclick="selectCat('all',this)">Todos</button>
  </div>

  <!-- Product grid -->
  <div class="grid-wrap">
    <div class="product-grid" id="product-grid">
      <!-- Skeleton while loading -->
      ${Array(6).fill('<div class="product-card"><div class="product-img-wrap skeleton" style="aspect-ratio:1;"></div><div class="product-info"><div class="skeleton" style="height:14px;width:70%;margin-bottom:6px;"></div><div class="skeleton" style="height:10px;width:90%;"></div><div class="skeleton" style="height:18px;width:40%;margin-top:8px;"></div></div></div>').join('')}
    </div>
  </div>

  <!-- Detail modal -->
  <div id="detail-overlay" onclick="closeDetail()"></div>
  <div id="detail-panel">
    <div class="detail-handle"></div>
    <button class="detail-close" onclick="closeDetail()">
      <i class="ph-bold ph-x"></i>
    </button>
    <div id="detail-img-wrap"></div>
    <div class="detail-body">
      <div id="detail-cat" class="detail-cat"></div>
      <h2 id="detail-name" class="detail-name"></h2>
      <p id="detail-price" class="detail-price"></p>
      <p id="detail-desc" class="detail-desc"></p>
    </div>
  </div>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="/config.js"></script>
  <script src="/firebase-config.js?v=1.1"></script>

  <script>
    const TENANT_ID = new URLSearchParams(location.search).get('local') || 'deluxeperfumes';

    function productosCol() {
      return db.collection('tenants').doc(TENANT_ID).collection('productos');
    }

    let _allProducts = [];
    let _activeCat   = 'all';
    let _search      = '';

    // ── Format price ──────────────────────────────────────────────
    function fmtPrice(p) {
      if (!p && p !== 0) return '';
      return '$' + Number(p).toLocaleString('es-CL');
    }

    // ── Render skeleton while loading ─────────────────────────────
    function renderSkeleton() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = Array(6).fill(`
        <div class="product-card">
          <div class="product-img-wrap skeleton" style="aspect-ratio:1;border-radius:0;"></div>
          <div class="product-info">
            <div class="skeleton" style="height:14px;width:70%;margin-bottom:6px;border-radius:6px;"></div>
            <div class="skeleton" style="height:10px;width:90%;border-radius:6px;"></div>
            <div class="skeleton" style="height:18px;width:40%;margin-top:8px;border-radius:6px;"></div>
          </div>
        </div>`).join('');
    }

    // ── Build category pills ───────────────────────────────────────
    function buildCats(products) {
      const cats = [...new Set(products.map(p => p.categoria).filter(Boolean))].sort();
      const bar  = document.getElementById('cats-bar');
      const existing = bar.querySelectorAll('[data-cat]:not([data-cat="all"])');
      existing.forEach(el => el.remove());
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className  = 'cat-pill';
        btn.dataset.cat = cat;
        btn.textContent = cat;
        btn.onclick = () => selectCat(cat, btn);
        bar.appendChild(btn);
      });
    }

    function selectCat(cat, el) {
      _activeCat = cat;
      document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderProducts();
    }

    // ── Filter & render ───────────────────────────────────────────
    function filterProducts() {
      _search = document.getElementById('search-input').value.trim().toLowerCase();
      renderProducts();
    }

    function renderProducts() {
      const filtered = _allProducts.filter(p => {
        const catOk  = _activeCat === 'all' || p.categoria === _activeCat;
        const termOk = !_search
          || (p.nombre      || '').toLowerCase().includes(_search)
          || (p.descripcion || '').toLowerCase().includes(_search)
          || (p.categoria   || '').toLowerCase().includes(_search);
        return catOk && termOk;
      });

      const grid = document.getElementById('product-grid');

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="state-wrap" style="grid-column:1/-1;">
            <i class="ph ph-magnifying-glass state-icon"></i>
            <p class="state-title">Sin resultados</p>
            <p class="state-sub">Intenta con otra búsqueda o categoría</p>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="product-card" onclick="openDetail('${p.id}')">
          <div class="product-img-wrap">
            ${p.imagen
              ? `<img class="product-img" src="${p.imagen}" alt="${escHtml(p.nombre || '')}" loading="lazy"
                      onerror="this.parentElement.innerHTML='<div class=\\"product-img-placeholder\\"><i class=\\"ph-fill ph-drop\\"></i></div>'">`
              : `<div class="product-img-placeholder"><i class="ph-fill ph-drop"></i></div>`
            }
            ${p.categoria ? `<span class="product-cat-badge">${escHtml(p.categoria)}</span>` : ''}
          </div>
          <div class="product-info">
            <p class="product-name">${escHtml(p.nombre || 'Producto')}</p>
            ${p.descripcion ? `<p class="product-desc">${escHtml(p.descripcion)}</p>` : ''}
            ${p.precio != null ? `<p class="product-price">${fmtPrice(p.precio)}</p>` : ''}
          </div>
        </div>`).join('');
    }

    // ── Detail modal ──────────────────────────────────────────────
    function openDetail(id) {
      const p = _allProducts.find(x => x.id === id);
      if (!p) return;
      const imgWrap = document.getElementById('detail-img-wrap');
      imgWrap.innerHTML = p.imagen
        ? `<img class="detail-img" src="${p.imagen}" alt="${escHtml(p.nombre || '')}">`
        : `<div class="detail-img-placeholder"><i class="ph-fill ph-drop"></i></div>`;
      document.getElementById('detail-cat').textContent   = p.categoria || '';
      document.getElementById('detail-name').textContent  = p.nombre    || 'Producto';
      document.getElementById('detail-price').textContent = p.precio != null ? fmtPrice(p.precio) : '';
      document.getElementById('detail-desc').textContent  = p.descripcion || '';
      document.getElementById('detail-overlay').classList.add('open');
      document.getElementById('detail-panel').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
      document.getElementById('detail-overlay').classList.remove('open');
      document.getElementById('detail-panel').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ── Escape HTML ───────────────────────────────────────────────
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Load products ─────────────────────────────────────────────
    async function loadProducts() {
      renderSkeleton();
      try {
        const snap = await productosCol().where('activo', '==', true).get();
        _allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        _allProducts.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || '', 'es'));
        buildCats(_allProducts);
        if (_allProducts.length === 0) {
          document.getElementById('product-grid').innerHTML = `
            <div class="state-wrap" style="grid-column:1/-1;">
              <i class="ph-fill ph-drop state-icon"></i>
              <p class="state-title">Catálogo vacío</p>
              <p class="state-sub">Aún no hay productos disponibles</p>
            </div>`;
          return;
        }
        renderProducts();
      } catch(e) {
        document.getElementById('product-grid').innerHTML = `
          <div class="state-wrap" style="grid-column:1/-1;">
            <i class="ph ph-warning state-icon"></i>
            <p class="state-title">Error al cargar</p>
            <p class="state-sub">${escHtml(e.message)}</p>
          </div>`;
      }
    }

    // ── Load tenant settings (nombre, logo) ───────────────────────
    async function loadTenantSettings() {
      try {
        const snap = await db.collection('tenants').doc(TENANT_ID).collection('settings').doc('main').get();
        if (!snap.exists) return;
        const d = snap.data();
        if (d.nombre) {
          document.getElementById('store-name').textContent = d.nombre;
          document.title = 'Catálogo · ' + d.nombre;
        }
        if (d.logo) document.getElementById('store-logo').src = d.logo;
        if (d.accentColor) {
          document.documentElement.style.setProperty('--accent', d.accentColor);
          const hex = d.accentColor.replace('#','');
          if (hex.length === 6) {
            const r = parseInt(hex.slice(0,2),16);
            const g = parseInt(hex.slice(2,4),16);
            const b = parseInt(hex.slice(4,6),16);
            document.documentElement.style.setProperty('--accent-rgb', `${r},${g},${b}`);
          }
        }
      } catch(_) {}
    }

    loadTenantSettings();
    loadProducts();
  </script>
</body>
</html>
