<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#050505">
  <title>Únete al Club | Elegance Barbershop</title>
  <meta name="description" content="Crea tu cuenta en el Club Elegance. Acumula sellos, canjea premios y lleva un registro de tus visitas.">
  <meta property="og:title" content="Únete al Club | Elegance Barbershop">
  <meta property="og:description" content="Regístrate en Elegance Barbershop, acumula sellos y disfruta de beneficios exclusivos.">
  <meta property="og:type" content="website">
  <meta name="robots" content="noindex, nofollow">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Elegance">
  <link rel="apple-touch-icon" href="/logo.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="/output.css" rel="stylesheet">

  <!-- Firebase SDKs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="config.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebaseUtils.js"></script>

  <style>
    :root { --gold: #c9a84c; --gold-dim: rgba(201,168,76,0.18); }

    @keyframes fadeSlideUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    body {
      background-color: #050505;
      color: #f8fafc;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Ambient glow */
    .ambient-glow {
      position: fixed;
      top: -180px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.065) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .gold-ring {
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 1px rgba(201,168,76,0.12), 0 0 28px rgba(201,168,76,0.18), 0 0 50px rgba(201,168,76,0.06);
    }

    .gold-divider {
      width: 36px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 2px;
    }

    /* Tabs */
    .tab-btn {
      transition: all 0.25s;
      color: #6b7280;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: var(--gold);
      border-color: var(--gold);
    }

    /* Inputs */
    .field {
      width: 100%;
      background: #0d0d10;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 18px;
      color: #f8fafc;
      font-size: 15px;
      font-weight: 500;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field::placeholder { color: #4b5563; }
    .field:focus {
      border-color: rgba(201,168,76,0.5);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.07);
    }
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 100px #0d0d10 inset !important;
      -webkit-text-fill-color: #f8fafc !important;
    }

    /* Primary CTA */
    .btn-primary {
      width: 100%;
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 15px 24px;
      border-radius: 100px;
      box-shadow: 0 0 20px rgba(201,168,76,0.12);
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: rgba(201,168,76,0.08);
      box-shadow: 0 0 28px rgba(201,168,76,0.22);
    }
    .btn-primary:active { transform: scale(0.97); }

    /* Google button */
    .btn-google {
      width: 100%;
      background: #0d0d10;
      border: 1px solid rgba(255,255,255,0.1);
      color: #d1d5db;
      font-weight: 600;
      font-size: 14px;
      padding: 14px 24px;
      border-radius: 100px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
    }
    .btn-google:hover {
      border-color: rgba(255,255,255,0.2);
      background: #111115;
    }
    .btn-google:active { transform: scale(0.97); }

    /* Eye toggle */
    .eye-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #4b5563;
      transition: color 0.2s;
      background: none;
      border: none;
      cursor: pointer;
    }
    .eye-toggle:hover { color: #9ca3af; }
  </style>
</head>

<body class="font-sans antialiased min-h-screen flex flex-col items-center justify-center px-6 py-10">

  <div class="ambient-glow"></div>

  <div class="w-full max-w-sm relative z-10 animate-[fadeSlideUp_0.5s_cubic-bezier(0.16,1,0.3,1)_forwards]">

    <!-- Logo & Hero -->
    <div class="flex flex-col items-center mb-9">
      <img id="shopLogo" src="" alt=""
        class="w-[76px] h-[76px] rounded-full object-cover gold-ring mb-5">
      <div class="gold-divider mb-4"></div>
      <h1 class="text-2xl font-bold tracking-tight text-white text-center leading-tight">Club Elegance</h1>
      <p class="text-[11px] font-semibold text-gray-500 mt-1.5 text-center uppercase tracking-[0.2em]">
        Acumula sellos · Gana premios
      </p>
    </div>

    <!-- Tabs -->
    <div class="flex mb-7 border-b border-white/[0.07]">
      <button id="tabLogin"
        class="tab-btn active flex-1 pb-3 text-xs font-bold text-center border-b-2 uppercase tracking-widest"
        onclick="switchTab('login')">Ingresar</button>
      <button id="tabRegister"
        class="tab-btn flex-1 pb-3 text-xs font-bold text-center border-b-2 border-transparent uppercase tracking-widest"
        onclick="switchTab('register')">Crear cuenta</button>
    </div>

    <!-- Alert banner -->
    <div id="alertBanner" class="hidden mb-5 px-4 py-3 rounded-2xl border text-sm font-medium text-center"></div>

    <!-- PANEL LOGIN -->
    <div id="panelLogin">
      <div class="space-y-3">
        <input type="email" id="loginEmail" placeholder="Correo electrónico" autocomplete="email" class="field">
        <div class="relative">
          <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password"
            class="field" style="padding-right:48px;">
          <button onclick="togglePwd('loginPassword',this)" class="eye-toggle">
            <i class="ph ph-eye text-xl"></i>
          </button>
        </div>
      </div>
      <button onclick="loginWithEmail()" class="btn-primary mt-5">
        <i class="ph-bold ph-sign-in"></i> Ingresar
      </button>
    </div>

    <!-- PANEL REGISTRO -->
    <div id="panelRegister" class="hidden">
      <div class="space-y-3">
        <input type="text" id="regNombre" placeholder="Nombre completo" autocomplete="name" class="field">
        <input type="email" id="regEmail" placeholder="Correo electrónico" autocomplete="email" class="field">
        <input type="tel" id="regTelefono" placeholder="+56 9 XXXX XXXX" autocomplete="tel"
          inputmode="numeric" class="field">
        <div class="relative">
          <input type="password" id="regPassword" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password"
            class="field" style="padding-right:48px;">
          <button onclick="togglePwd('regPassword',this)" class="eye-toggle">
            <i class="ph ph-eye text-xl"></i>
          </button>
        </div>
      </div>
      <button onclick="registerWithEmail()" class="btn-primary mt-5">
        <i class="ph-bold ph-user-plus"></i> Crear cuenta
      </button>
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-4 my-6">
      <div class="flex-1 h-px bg-white/[0.06]"></div>
      <span class="text-[10px] font-bold text-gray-600 uppercase tracking-widest">o</span>
      <div class="flex-1 h-px bg-white/[0.06]"></div>
    </div>

    <!-- Google Auth -->
    <button onclick="loginWithGoogle()" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.3 30.2 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.8 6C12.3 13.2 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
        <path fill="#FBBC05" d="M10.5 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.8-6z"/>
        <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.3-13.5-10l-7.8 6C6.7 42.6 14.7 48 24 48z"/>
      </svg>
      Continuar con Google
    </button>

    <!-- Back link -->
    <p class="text-center mt-7">
      <a href="index.html"
        class="inline-flex items-center gap-1.5 text-[11px] font-semibold text-gray-600 hover:text-gray-400 transition-colors uppercase tracking-widest">
        <i class="ph ph-arrow-left"></i> Volver a agendar
      </a>
    </p>

  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="hidden fixed inset-0 bg-[#050505]/85 flex items-center justify-center z-50 backdrop-blur-sm">
    <div class="flex flex-col items-center gap-4">
      <div class="w-10 h-10 border border-[var(--gold)]/30 border-t-[var(--gold)] rounded-full animate-spin"></div>
      <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Ingresando...</span>
    </div>
  </div>

<script>
  // ── Helpers UI ────────────────────────────────────────────────
  function showLoading(msg = 'Ingresando...') {
    document.querySelector('#loadingOverlay span').textContent = msg;
    document.getElementById('loadingOverlay').classList.remove('hidden');
    document.getElementById('loadingOverlay').classList.add('flex');
  }
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('loadingOverlay').classList.remove('flex');
  }
  function showAlert(msg, isError = true) {
    const el = document.getElementById('alertBanner');
    el.textContent = msg;
    el.className = `mb-5 px-4 py-3 rounded-2xl border text-sm font-medium text-center ${
      isError
        ? 'bg-red-950/50 border-red-500/40 text-red-300'
        : 'bg-emerald-950/50 border-emerald-500/40 text-emerald-300'
    }`;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 4000);
  }
  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.innerHTML = `<i class="ph ph-${isText ? 'eye' : 'eye-slash'} text-xl"></i>`;
  }
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('panelLogin').classList.toggle('hidden', !isLogin);
    document.getElementById('panelRegister').classList.toggle('hidden', isLogin);

    document.getElementById('tabLogin').className   = `tab-btn ${isLogin ? 'active' : 'text-gray-500'} flex-1 pb-3 text-xs font-bold text-center border-b-2 ${isLogin ? 'border-[#c9a84c]' : 'border-transparent'} uppercase tracking-widest`;
    document.getElementById('tabRegister').className = `tab-btn ${!isLogin ? 'active' : 'text-gray-500'} flex-1 pb-3 text-xs font-bold text-center border-b-2 ${!isLogin ? 'border-[#c9a84c]' : 'border-transparent'} uppercase tracking-widest`;
  }

  // ── Firestore: crear/actualizar perfil ────────────────────────
  async function ensureUserDoc(user, extra = {}) {
    const ref = FDB.usersCol().doc(user.uid);
    const snap = await ref.get();
    if (!snap.exists) {
      await ref.set({
        nombre:    extra.nombre    || user.displayName || '',
        email:     user.email      || '',
        telefono:  extra.telefono  || '',
        photoURL:  user.photoURL   || null,
        stamps:    0,
        rol:       'cliente',
        creadoEn:  firebase.firestore.FieldValue.serverTimestamp()
      });
    } else if (user.photoURL && snap.data().photoURL !== user.photoURL) {
      await ref.update({ photoURL: user.photoURL });
    }
  }

  // ── Redirección post-auth ─────────────────────────────────────
  function goToDashboard() {
    window.location.href = 'dashboard.html';
  }

  // ── Auth: Comprobar sesión activa ─────────────────────────────
  // _registering evita que onAuthStateChanged redirija antes de
  // que ensureUserDoc termine de guardar el nombre y teléfono.
  let _registering = false;
  auth.onAuthStateChanged(user => {
    if (user && !_registering) goToDashboard();
  });

  // ── Google Login ──────────────────────────────────────────────
  async function loginWithGoogle() {
    showLoading('Conectando con Google...');
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const result   = await auth.signInWithPopup(provider);
      await ensureUserDoc(result.user);
      goToDashboard();
    } catch (err) {
      hideLoading();
      showAlert(friendlyError(err.code));
    }
  }

  // ── Email Login ───────────────────────────────────────────────
  async function loginWithEmail() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showAlert('Completa todos los campos.');
    showLoading();
    try {
      const cred = await auth.signInWithEmailAndPassword(email, password);
      // Garantizar que el documento exista (puede faltar si fue creado antes)
      await ensureUserDoc(cred.user);
      goToDashboard();
    } catch (err) {
      hideLoading();
      showAlert(friendlyError(err.code));
    }
  }

  // ── Email Register ────────────────────────────────────────────
  async function registerWithEmail() {
    const nombre   = document.getElementById('regNombre').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const telefono = document.getElementById('regTelefono').value.trim();
    const password = document.getElementById('regPassword').value;

    if (!nombre || !email || !telefono || !password)
      return showAlert('Completa todos los campos.');
    if (!validatePhone(telefono))
      return showAlert('Ingresa un teléfono válido. Debe comenzar con +56 9 seguido de 8 dígitos.');
    if (password.length < 6)
      return showAlert('La contraseña debe tener al menos 6 caracteres.');

    showLoading('Creando cuenta...');
    _registering = true;  // bloquear redirección automática
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await cred.user.updateProfile({ displayName: nombre });
      await ensureUserDoc(cred.user, { nombre, telefono });
      goToDashboard();
    } catch (err) {
      hideLoading();
      showAlert(friendlyError(err.code));
    } finally {
      _registering = false;
    }
  }

  // ── Error messages en español ─────────────────────────────────
  function friendlyError(code) {
    const map = {
      'auth/email-already-in-use':    'Ese correo ya está registrado.',
      'auth/invalid-email':           'El correo no es válido.',
      'auth/weak-password':           'Contraseña muy débil (mín. 6 caracteres).',
      'auth/user-not-found':          'No existe una cuenta con ese correo.',
      'auth/wrong-password':          'Contraseña incorrecta.',
      'auth/invalid-credential':      'Correo o contraseña incorrectos.',
      'auth/popup-closed-by-user':    'Cerraste la ventana de Google.',
      'auth/network-request-failed':  'Sin conexión. Revisa tu internet.',
      'auth/too-many-requests':       'Demasiados intentos. Espera un momento.',
    };
    return map[code] || 'Ocurrió un error. Intenta de nuevo.';
  }

  // ── Enter key shortcuts ───────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (!document.getElementById('panelLogin').classList.contains('hidden')) loginWithEmail();
    else registerWithEmail();
  });

  // ── Prefijo +56 automático para teléfono ─────────────────────
  function initPhonePrefix(inputId) {
    const PREFIX = '+56 9 ';
    const input = document.getElementById(inputId);
    if (!input) return;
    input.addEventListener('focus', () => {
      if (!input.value.startsWith('+56')) input.value = PREFIX;
    });
    input.addEventListener('input', () => {
      if (!input.value.startsWith('+56')) input.value = PREFIX;
    });
    input.addEventListener('keydown', e => {
      const selStart = input.selectionStart;
      if ((e.key === 'Backspace' || e.key === 'Delete') && selStart <= PREFIX.length) {
        e.preventDefault();
      }
    });
  }

  function validatePhone(value) {
    // Acepta: +56 9 XXXX XXXX o +569XXXXXXXX y variantes con espacios
    return /^\+56\s?9\s?\d{4}\s?\d{4}$/.test(value.trim());
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.title = `Únete al Club | ${SHOP.nombre}`;
    document.getElementById('shopLogo').src = SHOP.logo;
    document.getElementById('shopLogo').alt = SHOP.nombre;
    initPhonePrefix('regTelefono');
  });
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(r => console.log('[SW] Registrado:', r.scope))
        .catch(e => console.warn('[SW] Error:', e));
    });
  }
</script>
</body>
</html>
