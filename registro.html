  <style>
    :root {
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.18);
    }

    /* ── Gitana Nails & Studio — tema fuchsia ─────────────────── */
    .tenant-gitana {
      --gold: #f472b6;
      --gold-dim: rgba(244,114,182,0.18);
    }
    .tenant-gitana body { background-color: #080508; }
    .tenant-gitana .ambient-glow {
      background: radial-gradient(circle, rgba(244,114,182,0.055) 0%, transparent 65%);
    }
    .tenant-gitana .logo-ring {
      border-color: rgba(244,114,182,0.55);
      box-shadow: 0 0 0 1px rgba(244,114,182,0.08),
                  0 0 24px rgba(244,114,182,0.18),
                  0 0 56px rgba(244,114,182,0.05);
    }
    .tenant-gitana .gold-divider {
      background: linear-gradient(90deg, transparent, #f472b6, transparent);
    }
    .tenant-gitana .field:focus {
      border-color: rgba(244,114,182,0.5);
      box-shadow: 0 0 0 3px rgba(244,114,182,0.07);
    }
    .tenant-gitana .btn-primary {
      background: transparent;
      border: 1.5px solid #f472b6;
      color: #f472b6;
      box-shadow: 0 0 20px rgba(244,114,182,0.12);
    }
    .tenant-gitana .btn-primary:hover {
      background: rgba(244,114,182,0.08);
      box-shadow: 0 0 28px rgba(244,114,182,0.22);
    }
    .tenant-gitana .spinner {
      border-color: rgba(244,114,182,0.25);
      border-top-color: #f472b6;
    }
    /* ────────────────────────────────────────────────────────── */

    /* ── Utilidades globales ─────────────────────────────────── */
    .font-display { font-family: 'Playfair Display', Georgia, serif; }

    /* Separador ornamental — oculto por defecto, activo en Ferraza */
    .sep-ornamental {
      display: none; align-items: center; gap: 0.875rem; user-select: none;
    }
    .sep-ornamental::before, .sep-ornamental::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.12));
    }
    .sep-ornamental::after { background: linear-gradient(to left, transparent, rgba(255,255,255,0.12)); }
    .sep-ornamental-gem { font-size: 0.5rem; color: rgba(255,255,255,0.25); letter-spacing: 0.32em; }

    /* ── Barbería Ferraza — Premium Dark monocromático ────────── */
    .tenant-ferraza { --gold: #e2e8f0; --gold-dim: rgba(226,232,240,0.20); }
    .tenant-ferraza .ambient-glow {
      background: radial-gradient(circle, rgba(226,232,240,0.025) 0%, transparent 65%);
    }
    .tenant-ferraza .logo-ring {
      border-color: rgba(226,232,240,0.35);
      box-shadow: 0 0 0 1px rgba(226,232,240,0.05), 0 0 18px rgba(226,232,240,0.07);
    }
    .tenant-ferraza .sep-ornamental  { display: flex; }
    .tenant-ferraza .gold-divider    { display: none; }
    .tenant-ferraza .tab-btn.active  { color: #e2e8f0; border-color: rgba(226,232,240,0.55); }
    .tenant-ferraza .field {
      border-radius: 0.5rem;
      border-color: rgba(200,210,220,0.14);
    }
    .tenant-ferraza .field:focus {
      border-color: rgba(226,232,240,0.38);
      box-shadow: 0 0 0 3px rgba(226,232,240,0.05);
    }
    .tenant-ferraza .btn-primary {
      background: transparent;
      border-radius: 0.5rem;
      border: 1.5px solid rgba(226,232,240,0.4);
      color: #e2e8f0;
      box-shadow: none;
    }
    .tenant-ferraza .btn-primary:hover  { background: rgba(226,232,240,0.06); box-shadow: none; }
    .tenant-ferraza .btn-google         { border-radius: 0.5rem; }
    .tenant-ferraza .spinner {
      border-color: rgba(226,232,240,0.18);
      border-top-color: #e2e8f0;
    }
    /* ────────────────────────────────────────────────────────── */

    /* ── Mapu Barber Shop — Classic Barbershop ────────────────── */
    .tenant-mapubarbershop {
      --gold:     #BFA37E;
      --gold-dim: rgba(191,163,126,0.28);
    }

    /* Fondo burdeo oscuro */
    html.tenant-mapubarbershop body,
    .tenant-mapubarbershop body {
      background-color: #2A1E22;
      color: #F0EBE1;
    }

    /* Ambient glow — tono arena muy suave */
    .tenant-mapubarbershop .ambient-glow {
      background: radial-gradient(circle, rgba(191,163,126,0.045) 0%, transparent 65%);
    }

    /* Logo ring — latón dorado mate */
    .tenant-mapubarbershop .logo-ring {
      border: 2px solid #BFA37E !important;
      box-shadow:
        0 0 0 1px rgba(191,163,126,0.12),
        0 0 0 5px rgba(42,30,34,0.8),
        0 0 0 6px rgba(191,163,126,0.12),
        0 0 20px rgba(191,163,126,0.10) !important;
    }

    /* Club title — serif clásico */
    .tenant-mapubarbershop #heroClubTitle {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: normal;
      font-weight: 700;
      color: #F0EBE1;
      letter-spacing: 0.02em;
    }
    .tenant-mapubarbershop #heroClubSub {
      color: rgba(191,163,126,0.60);
    }

    /* Gold divider */
    .tenant-mapubarbershop .gold-divider {
      background: linear-gradient(90deg, transparent, #BFA37E, transparent);
    }

    /* Tab activo */
    .tenant-mapubarbershop .tab-btn.active {
      color: #BFA37E;
      border-color: #BFA37E;
    }
    .tenant-mapubarbershop .tab-btn {
      color: rgba(191,163,126,0.40);
    }

    /* Borde inferior de tabs */
    .tenant-mapubarbershop .border-b {
      border-color: rgba(191,163,126,0.10);
    }

    /* Campos de entrada */
    .tenant-mapubarbershop .field {
      background: #352529 !important;
      border: 1px solid rgba(191,163,126,0.18) !important;
      color: #F0EBE1 !important;
      border-radius: 10px !important;
    }
    .tenant-mapubarbershop .field::placeholder {
      color: rgba(191,163,126,0.40) !important;
    }
    .tenant-mapubarbershop .field:focus {
      border-color: rgba(191,163,126,0.55) !important;
      box-shadow: 0 0 0 2px rgba(191,163,126,0.08) !important;
    }
    .tenant-mapubarbershop input:-webkit-autofill,
    .tenant-mapubarbershop input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 100px #352529 inset !important;
      -webkit-text-fill-color: #F0EBE1 !important;
    }

    /* Botón primario — sólido dorado mate */
    .tenant-mapubarbershop .btn-primary {
      background: #BFA37E !important;
      border: none !important;
      color: #2A1E22 !important;
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: none !important;
      border-radius: 10px !important;
    }
    .tenant-mapubarbershop .btn-primary:hover {
      background: #CDB48E !important;
      box-shadow: none !important;
    }

    /* Botón Google */
    .tenant-mapubarbershop .btn-google {
      background: #352529 !important;
      border: 1px solid rgba(191,163,126,0.18) !important;
      color: #F0EBE1 !important;
      border-radius: 10px !important;
    }
    .tenant-mapubarbershop .btn-google:hover {
      background: #3D2C31 !important;
      border-color: rgba(191,163,126,0.30) !important;
    }

    /* Spinner */
    .tenant-mapubarbershop .spinner {
      border-color: rgba(191,163,126,0.20) !important;
      border-top-color: #BFA37E !important;
    }

    /* Divisor "o" */
    .tenant-mapubarbershop .flex-grow.border-t { border-color: rgba(191,163,126,0.12) !important; }
    .tenant-mapubarbershop span.mx-4.text-gray-500 { color: rgba(191,163,126,0.40) !important; }

    /* Loading overlay */
    .tenant-mapubarbershop #loadingOverlay {
      background: rgba(42,30,34,0.88) !important;
    }

    /* Link volver */
    .tenant-mapubarbershop a.text-gray-600 {
      color: rgba(191,163,126,0.45) !important;
    }
    .tenant-mapubarbershop a.text-gray-600:hover {
      color: rgba(191,163,126,0.75) !important;
    }

    /* Eye toggle */
    .tenant-mapubarbershop .eye-toggle { color: rgba(191,163,126,0.40) !important; }
    .tenant-mapubarbershop .eye-toggle:hover { color: rgba(191,163,126,0.70) !important; }

    /* Nota cumpleaños */
    .tenant-mapubarbershop .text-gray-600 { color: rgba(191,163,126,0.42) !important; }
    /* ────────────────────────────────────────────────────────── */

    @keyframes fadeSlideUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    body {
      background-color: #050505;
      color: #f8fafc;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Ambient glow */
    .ambient-glow {
      position: fixed;
      top: -180px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.065) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .logo-ring {
      border: 2px solid rgba(201,168,76,0.7);
      box-shadow: 0 0 0 1px rgba(201,168,76,0.12), 0 0 28px rgba(201,168,76,0.18), 0 0 50px rgba(201,168,76,0.06);
    }

    .gold-divider {
      width: 36px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 2px;
    }

    /* Tabs */
    .tab-btn {
      transition: all 0.25s;
      color: #6b7280;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: var(--gold);
      border-color: var(--gold);
    }

    /* Inputs */
    .field {
      width: 100%;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 14px 18px;
      color: #f8fafc;
      font-size: 15px;
      font-weight: 500;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field::placeholder { color: #6b7280; }
    .field:focus {
      border-color: #D4AF37;
      box-shadow: 0 0 0 1px #D4AF37;
    }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 100px #111827 inset !important;
      -webkit-text-fill-color: #f8fafc !important;
      caret-color: #f8fafc;
    }

    /* Primary CTA */
    .btn-primary {
      width: 100%;
      background: #D4AF37;
      border: 1.5px solid #D4AF37;
      color: #000000;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 15px 24px;
      border-radius: 100px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #c9a832;
      border-color: #c9a832;
    }
    .btn-primary:active { transform: scale(0.97); }

    /* Google button */
    .btn-google {
      width: 100%;
      background: #1f2937;
      border: 1px solid #374151;
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      padding: 14px 24px;
      border-radius: 100px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
    }
    .btn-google:hover {
      background: #374151;
      border-color: #4b5563;
    }
    .btn-google:active { transform: scale(0.97); }

    /* Eye toggle */
    .eye-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #4b5563;
      transition: color 0.2s;
      background: none;
      border: none;
      cursor: pointer;
    }
    .eye-toggle:hover { color: #9ca3af; }

    /* Loading spinner */
    .spinner {
      width: 40px; height: 40px;
      border: 1px solid rgba(201,168,76,0.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Ocultar sección social al recuperar contraseña */
    .tab-reset .social-section { display: none; }
  </style>
</head>

<body class="font-sans antialiased min-h-screen flex flex-col items-center justify-center px-6 py-10">

  <div class="ambient-glow"></div>

  <div class="w-full max-w-sm relative z-10 animate-[fadeSlideUp_0.5s_cubic-bezier(0.16,1,0.3,1)_forwards]">

    <!-- Logo & Hero -->
    <div class="flex flex-col items-center mb-9">
      <img id="shopLogo" src="" alt=""
        class="w-[76px] h-[76px] rounded-full object-cover logo-ring mb-5">
      <div class="gold-divider mb-4"></div>
      <div class="sep-ornamental mb-4"><span class="sep-ornamental-gem">✦ &nbsp; ✦ &nbsp; ✦</span></div>
      <h1 id="heroClubTitle" class="font-display text-2xl font-bold tracking-tight text-white text-center leading-tight"></h1>
      <p id="heroClubSub" class="text-[11px] font-semibold text-gray-500 mt-1.5 text-center uppercase tracking-[0.2em]"></p>
    </div>

    <!-- Tabs -->
    <div class="flex mb-7 border-b border-white/[0.07]">
      <button id="tabLogin"
        class="tab-btn active flex-1 pb-3 text-xs font-bold text-center border-b-2 uppercase tracking-widest"
        onclick="switchTab('login')">Ingresar</button>
      <button id="tabRegister"
        class="tab-btn flex-1 pb-3 text-xs font-bold text-center border-b-2 border-transparent uppercase tracking-widest"
        onclick="switchTab('register')">Crear cuenta</button>
    </div>

    <!-- Alert banner -->
    <div id="alertBanner" class="hidden mb-5 px-4 py-3 rounded-2xl border text-sm font-medium text-center"></div>

    <!-- PANEL LOGIN -->
    <div id="panelLogin">
      <div class="space-y-3">
        <input type="email" id="loginEmail" placeholder="Correo electrónico" autocomplete="email" class="field">
        <div class="relative">
          <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password"
            class="field" style="padding-right:48px;">
          <button onclick="togglePwd('loginPassword',this)" class="eye-toggle">
            <i class="ph ph-eye text-xl"></i>
          </button>
        </div>
      </div>
      <button onclick="loginWithEmail()" class="btn-primary mt-5">
        <i class="ph-bold ph-sign-in"></i> Ingresar
      </button>
      <p class="text-center mt-4">
        <button onclick="switchTab('reset')"
          class="text-[11px] font-semibold text-gray-600 hover:text-gray-400 transition-colors uppercase tracking-widest">
          ¿Olvidaste tu contraseña?
        </button>
      </p>
    </div>

    <!-- PANEL REGISTRO -->
    <div id="panelRegister" class="hidden">
      <div class="space-y-3">
        <input type="text" id="regNombre" placeholder="Nombre completo" autocomplete="name" class="field">
        <input type="email" id="regEmail" placeholder="Correo electrónico" autocomplete="email" class="field">
        <input type="tel" id="regTelefono" placeholder="+56 9 XXXX XXXX" autocomplete="tel"
          inputmode="numeric" class="field">
        <div>
          <input type="date" id="regFechaNacimiento" autocomplete="bday"
            class="field" style="color-scheme:dark;"
            title="Fecha de nacimiento (opcional)">
          <p class="text-[10px] text-gray-600 mt-1 px-1">🎂 Opcional — te regalamos un sello en tu cumpleaños</p>
        </div>
        <div class="relative">
          <input type="password" id="regPassword" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password"
            class="field" style="padding-right:48px;">
          <button onclick="togglePwd('regPassword',this)" class="eye-toggle">
            <i class="ph ph-eye text-xl"></i>
          </button>
        </div>
      </div>
      <button onclick="registerWithEmail()" class="btn-primary mt-5">
        <i class="ph-bold ph-user-plus"></i> Crear cuenta
      </button>
    </div>

    <!-- PANEL RECUPERAR CONTRASEÑA -->
    <div id="panelReset" class="hidden">
      <p class="text-sm text-gray-500 text-center mb-5 leading-relaxed">
        Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
      </p>
      <div class="space-y-3">
        <input type="email" id="resetEmail" placeholder="Correo electrónico" autocomplete="email" class="field">
      </div>
      <button onclick="sendPasswordReset()" class="btn-primary mt-5">
        <i class="ph-bold ph-paper-plane-right"></i> Enviar enlace
      </button>
      <p class="text-center mt-4">
        <button onclick="switchTab('login')"
          class="inline-flex items-center gap-1.5 text-[11px] font-semibold text-gray-600 hover:text-gray-400 transition-colors uppercase tracking-widest">
          <i class="ph ph-arrow-left"></i> Volver
        </button>
      </p>
    </div>

    <!-- Divider + Google (se ocultan en la pantalla de recuperación) -->
    <div class="social-section">

    <!-- Divider -->
    <div class="flex items-center my-6">
      <div class="flex-grow border-t border-gray-700"></div>
      <span class="flex-shrink-0 mx-4 text-gray-500 text-sm">o</span>
      <div class="flex-grow border-t border-gray-700"></div>
    </div>

    <!-- Google Auth -->
    <button onclick="loginWithGoogle()" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.3 30.2 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.8 6C12.3 13.2 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
        <path fill="#FBBC05" d="M10.5 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.8-6z"/>
        <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.3-13.5-10l-7.8 6C6.7 42.6 14.7 48 24 48z"/>
      </svg>
      Continuar con Google
    </button>

    </div><!-- /social-section -->

    <!-- Back link -->
    <p class="text-center mt-7">
      <a href="index.html"
        class="inline-flex items-center gap-1.5 text-[11px] font-semibold text-gray-600 hover:text-gray-400 transition-colors uppercase tracking-widest">
        <i class="ph ph-arrow-left"></i> Volver a agendar
      </a>
    </p>

  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="hidden fixed inset-0 bg-[#050505]/85 flex items-center justify-center z-50 backdrop-blur-sm">
    <div class="flex flex-col items-center gap-4">
      <div class="spinner"></div>
      <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Ingresando...</span>
    </div>
  </div>

<script>
  // ── Helpers UI ────────────────────────────────────────────────
  function showLoading(msg = 'Ingresando...') {
    document.querySelector('#loadingOverlay span').textContent = msg;
    document.getElementById('loadingOverlay').classList.remove('hidden');
    document.getElementById('loadingOverlay').classList.add('flex');
  }
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('loadingOverlay').classList.remove('flex');
  }
  function showAlert(msg, isError = true) {
    const el = document.getElementById('alertBanner');
    el.textContent = msg;
    el.className = `mb-5 px-4 py-3 rounded-2xl border text-sm font-medium text-center ${
      isError
        ? 'bg-red-950/50 border-red-500/40 text-red-300'
        : 'bg-emerald-950/50 border-emerald-500/40 text-emerald-300'
    }`;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 4000);
  }
  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.innerHTML = `<i class="ph ph-${isText ? 'eye' : 'eye-slash'} text-xl"></i>`;
  }
  function switchTab(tab) {
    const isLogin    = tab === 'login';
    const isRegister = tab === 'register';
    const isReset    = tab === 'reset';
    document.getElementById('panelLogin').classList.toggle('hidden', !isLogin);
    document.getElementById('panelRegister').classList.toggle('hidden', !isRegister);
    document.getElementById('panelReset').classList.toggle('hidden', !isReset);
    document.body.classList.toggle('tab-reset', isReset);
    const base = 'tab-btn flex-1 pb-3 text-xs font-bold text-center border-b-2 uppercase tracking-widest';
    document.getElementById('tabLogin').className    = base + (isLogin    ? ' active' : '');
    document.getElementById('tabRegister').className = base + (isRegister ? ' active' : '');
    document.getElementById('alertBanner').classList.add('hidden');
  }

  // ── Firestore: crear/actualizar perfil ────────────────────────
  async function ensureUserDoc(user, extra = {}) {
    const ref = FDB.usersCol().doc(user.uid);
    const snap = await ref.get();
    if (!snap.exists) {
      const data = {
        nombre:    extra.nombre    || user.displayName || '',
        email:     user.email      || '',
        telefono:  extra.telefono  || '',
        photoURL:  user.photoURL   || null,
        stamps:    0,
        creadoEn:  firebase.firestore.FieldValue.serverTimestamp(),
      };
      if (extra.fechaNacimiento) data.fechaNacimiento = extra.fechaNacimiento;
      await ref.set(data);
    } else if (user.photoURL && snap.data().photoURL !== user.photoURL) {
      await ref.update({ photoURL: user.photoURL });
    }
  }

  // ── Redirección post-auth ─────────────────────────────────────
  function goToDashboard() {
    window.location.href = 'dashboard.html';
  }

  // ── Auth: Comprobar sesión activa ─────────────────────────────
  // _registering evita que onAuthStateChanged redirija antes de
  // que ensureUserDoc termine de guardar el nombre y teléfono.
  let _registering = false;
  auth.onAuthStateChanged(user => {
    if (user && !_registering) goToDashboard();
  });

  // ── Google Login ──────────────────────────────────────────────
  async function loginWithGoogle() {
    showLoading('Conectando con Google...');
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const result   = await auth.signInWithPopup(provider);
      await ensureUserDoc(result.user);
      goToDashboard();
    } catch (err) {
      hideLoading();
      showAlert(friendlyError(err.code));
    }
  }

  // ── Email Login ───────────────────────────────────────────────
  async function loginWithEmail() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showAlert('Completa todos los campos.');
    showLoading();
    try {
      const cred = await auth.signInWithEmailAndPassword(email, password);
      // Garantizar que el documento exista (puede faltar si fue creado antes)
      await ensureUserDoc(cred.user);
      goToDashboard();
    } catch (err) {
      hideLoading();
      showAlert(friendlyError(err.code));
    }
  }

  // ── Helper: ref a clientes/{phone} respetando el tenant ─────────
  function clientesDocRef(normalizedPhone) {
    const tid = window.CURRENT_TENANT_ID || 'elegance';
    const fs  = firebase.firestore();
    return tid === 'elegance'
      ? fs.collection('clientes').doc(normalizedPhone)
      : fs.collection('tenants').doc(tid).collection('clientes').doc(normalizedPhone);
  }

  // ── Email Register ────────────────────────────────────────────
  async function registerWithEmail() {
    const nombre          = document.getElementById('regNombre').value.trim();
    const email           = document.getElementById('regEmail').value.trim();
    const telefono        = document.getElementById('regTelefono').value.trim();
    const password        = document.getElementById('regPassword').value;
    const fechaNacimiento = document.getElementById('regFechaNacimiento').value || null; // "YYYY-MM-DD" o null

    if (!nombre || !email || !telefono || !password)
      return showAlert('Completa todos los campos.');
    if (!validatePhone(telefono))
      return showAlert('Ingresa un teléfono válido. Debe comenzar con +56 9 seguido de 8 dígitos.');
    if (password.length < 6)
      return showAlert('La contraseña debe tener al menos 6 caracteres.');

    showLoading('Creando cuenta...');
    _registering = true;
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await cred.user.updateProfile({ displayName: nombre });
      await ensureUserDoc(cred.user, { nombre, telefono, fechaNacimiento });

      // Crear/actualizar clientes/{phone} con cumpleDia para el cron de cumpleaños
      const normalizedPhone = telefono.replace(/\D/g, '');
      if (normalizedPhone) {
        const clienteData = {
          nombre,
          telefono,
          uid: cred.user.uid,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        };
        if (fechaNacimiento) {
          const parts = fechaNacimiento.split('-'); // ["YYYY","MM","DD"]
          clienteData.fechaNacimiento = fechaNacimiento;
          clienteData.cumpleDia       = `${parts[1]}-${parts[2]}`;
        }
        await clientesDocRef(normalizedPhone).set(clienteData, { merge: true });
      }

      goToDashboard();
    } catch (err) {
      hideLoading();
      showAlert(friendlyError(err.code));
    } finally {
      _registering = false;
    }
  }

  // ── Recuperar contraseña ──────────────────────────────────────
  async function sendPasswordReset() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) return showAlert('Ingresa tu correo electrónico.');
    showLoading('Enviando enlace...');
    try {
      const fn = firebase.functions().httpsCallable('enviarRecuperacionPassword');
      await fn({ email, tenantId: window.CURRENT_TENANT_ID || 'elegance' });
      hideLoading();
      showAlert('¡Listo! Revisa tu correo para restablecer tu contraseña.', false);
      switchTab('login');
      document.getElementById('loginEmail').value = email;
    } catch (err) {
      hideLoading();
      showAlert('No se pudo enviar el correo. Intenta de nuevo.');
    }
  }

  // ── Error messages en español ─────────────────────────────────
  function friendlyError(code) {
    const map = {
      'auth/email-already-in-use':    'Ese correo ya está registrado.',
      'auth/invalid-email':           'El correo no es válido.',
      'auth/weak-password':           'Contraseña muy débil (mín. 6 caracteres).',
      'auth/user-not-found':          'No existe una cuenta con ese correo.',
      'auth/wrong-password':          'Contraseña incorrecta.',
      'auth/invalid-credential':      'Correo o contraseña incorrectos.',
      'auth/popup-closed-by-user':    'Cerraste la ventana de Google.',
      'auth/network-request-failed':  'Sin conexión. Revisa tu internet.',
      'auth/too-many-requests':       'Demasiados intentos. Espera un momento.',
    };
    return map[code] || 'Ocurrió un error. Intenta de nuevo.';
  }

  // ── Enter key shortcuts ───────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (!document.getElementById('panelLogin').classList.contains('hidden'))    loginWithEmail();
    else if (!document.getElementById('panelRegister').classList.contains('hidden')) registerWithEmail();
    else if (!document.getElementById('panelReset').classList.contains('hidden'))    sendPasswordReset();
  });

  // ── Prefijo +56 automático para teléfono ─────────────────────
  function initPhonePrefix(inputId) {
    const PREFIX = '+56 9 ';
    const input = document.getElementById(inputId);
    if (!input) return;
    input.addEventListener('focus', () => {
      if (!input.value.startsWith('+56')) input.value = PREFIX;
    });
    input.addEventListener('input', () => {
      if (!input.value.startsWith('+56')) input.value = PREFIX;
    });
    input.addEventListener('keydown', e => {
      const selStart = input.selectionStart;
      if ((e.key === 'Backspace' || e.key === 'Delete') && selStart <= PREFIX.length) {
        e.preventDefault();
      }
    });
  }

  function validatePhone(value) {
    // Acepta: +56 9 XXXX XXXX o +569XXXXXXXX y variantes con espacios
    return /^\+56\s?9\s?\d{4}\s?\d{4}$/.test(value.trim());
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.title = `Únete al ${SHOP.club} | ${SHOP.nombre}`;
    document.getElementById('shopLogo').src = SHOP.logo;
    document.getElementById('shopLogo').alt = SHOP.nombre;
    document.getElementById('heroClubTitle').textContent = SHOP.club;
    document.getElementById('heroClubSub').textContent   =
      window.CURRENT_TENANT_ID === 'gitana'
        ? 'Acumula sellos · Canjea servicios'
        : 'Acumula sellos · Gana premios';
    initPhonePrefix('regTelefono');
  });
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(r => console.log('[SW] Registrado:', r.scope))
        .catch(e => console.warn('[SW] Error:', e));
    });
  }
</script>
</body>
</html>
