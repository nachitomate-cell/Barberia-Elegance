<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Viking Authentic Man · Kronnos</title>
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Catálogo oficial Viking Authentic Man — el estándar de oro en cuidado para barba, cabello y afeitado. Disponible en Kronnos Studio.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --bg:          #0a0a0a;  /* neutral-950 */
      --neutral-900: #171717;
      --neutral-800: #262626;
      --neutral-700: #404040;
      --neutral-400: #a3a3a3;
      --neutral-200: #e5e5e5;
      --amber-400:   #fbbf24;
      --amber-500:   #f59e0b;
      --amber-600:   #d97706;
      --amber-700:   #b45309;
      --amber-950:   #451a03;
      --sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--neutral-200);
      font-family: var(--sans);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    /* ───────────────────────── HERO ───────────────────────── */
    .hero {
      position: relative;
      padding: 32px 16px 48px;
      text-align: center;
      background: linear-gradient(180deg, #0a0a0a 0%, #140f0c 50%, #0a0a0a 100%);
      border-bottom: 1px solid var(--neutral-900);
      overflow: hidden;
    }
    /* resplandor ambiental ámbar */
    .hero::before {
      content: "";
      position: absolute; top: -120px; left: 50%; transform: translateX(-50%);
      width: 420px; height: 320px;
      background: radial-gradient(circle, rgba(217,119,6,0.16) 0%, rgba(10,10,10,0) 70%);
      pointer-events: none;
    }
    .hero-inner { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--neutral-400);
      font-size: 14px; font-weight: 500;
      margin-bottom: 28px;
      transition: color 0.2s ease;
      cursor: pointer;
    }
    .back-btn:hover { color: #fff; }
    .back-btn i { font-size: 18px; }

    .hero-logo {
      width: 100%; max-width: 300px; height: auto; margin: 4px auto 0;
      filter: drop-shadow(0 6px 28px rgba(217,119,6,0.25));
    }
    .hero-tagline {
      font-size: 18px; font-weight: 500; line-height: 1.5;
      color: rgba(245,158,11,0.90);
      max-width: 36rem; margin: 14px auto 0;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--amber-500);
      background: rgba(69,26,3,0.55);
      border: 1px solid rgba(180,83,9,0.45);
      padding: 5px 14px; border-radius: 999px;
    }
    @media (min-width: 768px) {
      .hero-logo { max-width: 360px; }
      .hero-tagline { font-size: 20px; }
    }

    /* ───────────────────────── GRID ───────────────────────── */
    .catalog {
      max-width: 64rem; margin: 0 auto;
      padding: 32px 16px 64px;
    }
    .section-label {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em;
      color: var(--neutral-400);
      margin-bottom: 20px;
    }
    .section-label::after { content: ""; flex: 1; height: 1px; background: var(--neutral-800); }

    /* Catálogo compacto tipo "netflix": 2 columnas en móvil para ver todos los
       productos de un vistazo; escala a 3 y 4 en pantallas más anchas. */
    .grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }
    @media (min-width: 560px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
    @media (min-width: 860px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 18px; } }

    /* ─────────────────────── PRODUCT CARD ─────────────────── */
    .card {
      display: flex; flex-direction: column; justify-content: space-between;
      background: rgba(23,23,23,0.60);
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      border: 1px solid var(--neutral-800);
      border-radius: 14px;
      padding: 10px;
      transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }
    @media (min-width: 560px) { .card { padding: 14px; border-radius: 16px; } }
    .card:hover {
      border-color: rgba(217,119,6,0.50);
      transform: translateY(-4px);
      box-shadow: 0 10px 25px -10px rgba(217,119,6,0.20);
    }

    .card-img-wrap {
      position: relative;
      width: 100%; aspect-ratio: 1 / 1;
      background: #111;
      border-radius: 10px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    /* La imagen entra con un fade suave al cargar (evita el "salto" al popular
       toda la grilla de golpe). El JS quita .img-loading en el evento load. */
    .card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      opacity: 1; transition: opacity 0.35s ease;
    }
    .card-img-wrap img.img-loading { opacity: 0; }
    .card-img-ph { color: var(--neutral-700); font-size: 44px; }

    .stock-badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
      padding: 4px 9px; border-radius: 999px;
      -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    }
    .stock-in  { color: #6ee7b7; background: rgba(6,78,59,0.55);  border: 1px solid rgba(16,185,129,0.35); }
    .stock-low { color: var(--amber-400); background: rgba(69,26,3,0.60); border: 1px solid rgba(180,83,9,0.45); }
    .stock-out { color: #fca5a5; background: rgba(69,10,10,0.55);  border: 1px solid rgba(220,38,38,0.35); }

    .card-name { font-size: 13.5px; font-weight: 700; color: #fff; margin-top: 9px; line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    @media (min-width: 560px) { .card-name { font-size: 16px; margin-top: 12px; line-height: 1.3; } }
    /* Descripción oculta en móvil (densidad); reaparece en pantallas anchas. */
    .card-desc { display: none; font-size: 12.5px; color: var(--neutral-400); margin-top: 4px; line-height: 1.5;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    @media (min-width: 560px) { .card-desc { display: -webkit-box; } }

    .cross-pill {
      display: inline-flex; align-items: center; gap: 4px; width: fit-content;
      font-size: 11px; color: rgba(251,191,36,0.90);
      background: rgba(245,158,11,0.10);
      border: 1px solid rgba(245,158,11,0.20);
      border-radius: 8px; padding: 4px 8px; margin-top: 8px;
    }

    /* Footer apilado en móvil (precio arriba, acción full-width) → cabe en las
       tarjetas angostas de 2 columnas. En ≥560px vuelve a fila. */
    .card-foot {
      display: flex; flex-direction: column; align-items: stretch; gap: 8px;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid rgba(38,38,38,0.80);
    }
    @media (min-width: 560px) {
      .card-foot { flex-direction: row; align-items: center; justify-content: space-between; gap: 10px;
        margin-top: 16px; padding-top: 12px; }
    }
    .price-wrap { display: flex; flex-direction: column; line-height: 1.1; min-width: 0; }
    .price { font-size: 16px; font-weight: 900; color: var(--amber-500); }
    @media (min-width: 560px) { .price { font-size: 18px; } }
    .price-orig { font-size: 11px; color: var(--neutral-700); text-decoration: line-through; margin-top: 1px; }
    .price-consult { font-size: 13px; font-weight: 700; color: var(--neutral-400); }

    .buy-btn {
      display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
      font-size: 12px; font-weight: 600;
      color: #fff; background: var(--neutral-800);
      padding: 7px 12px; border-radius: 12px;
      border: none; cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .buy-btn:hover { background: var(--amber-600); color: #0a0a0a; }
    .buy-btn i { font-size: 14px; }

    /* En móvil los botones ocupan todo el ancho de la tarjeta (footer apilado);
       en ≥560px vuelven a su tamaño natural a la derecha del precio. */
    .card-foot .add-btn, .card-foot .buy-btn {
      width: 100%; justify-content: center; padding: 9px 12px;
    }
    @media (min-width: 560px) {
      .card-foot .add-btn, .card-foot .buy-btn { width: auto; padding: 7px 12px; }
    }

    /* ─────────────────── ESTADOS: loading / vacío ────────── */
    .skeleton-card {
      height: 220px; border-radius: 14px;
      background: linear-gradient(100deg, rgba(23,23,23,0.6) 30%, rgba(38,38,38,0.7) 50%, rgba(23,23,23,0.6) 70%);
      background-size: 200% 100%; animation: sk 1.3s ease-in-out infinite;
      border: 1px solid var(--neutral-800);
    }
    @keyframes sk { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    .empty {
      text-align: center; max-width: 30rem; margin: 24px auto 0;
      background: rgba(23,23,23,0.5); border: 1px solid var(--neutral-800);
      border-radius: 20px; padding: 40px 28px;
    }
    .empty-ic {
      width: 64px; height: 64px; margin: 0 auto 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(69,26,3,0.5); border: 1px solid rgba(180,83,9,0.4);
      color: var(--amber-500); font-size: 30px;
    }
    .empty h3 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: var(--neutral-400); line-height: 1.6; margin-bottom: 22px; }
    .empty-cta {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 700; color: #0a0a0a;
      background: linear-gradient(90deg, var(--amber-500), var(--amber-600));
      padding: 12px 22px; border-radius: 14px;
    }

    .foot-note {
      text-align: center; font-size: 12px; color: var(--neutral-700);
      padding: 8px 16px 40px;
    }
    .foot-note a { color: var(--neutral-400); font-weight: 600; }

    /* ── Selector "Agregar a cita" (reemplaza el botón de acción in-stock) ── */
    .add-btn {
      display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
      font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid transparent;
      color: #0a0a0a;
      background: linear-gradient(90deg, var(--amber-600), var(--amber-700));
      padding: 7px 12px; border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
      transition: background .2s ease, color .2s ease, border-color .2s ease, box-shadow .2s ease, transform .12s ease;
    }
    .add-btn:hover { background: linear-gradient(90deg, var(--amber-500), var(--amber-600)); }
    .add-btn:active { transform: scale(0.95); }
    .add-btn.active {
      background: rgba(16,185,129,0.20);
      border-color: #10b981;
      color: #34d399;
      box-shadow: 0 0 15px -3px rgba(16,185,129,0.30);
    }
    .add-btn.active:hover { background: rgba(16,185,129,0.28); }
    .add-btn i { font-size: 14px; }

    /* ── Barra flotante de resumen (sticky bottom) ── */
    .sticky-bar {
      position: fixed; left: 16px; right: 16px; bottom: 16px;
      max-width: 42rem; margin: 0 auto;
      background: rgba(20,15,12,0.95);
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      border: 1px solid rgba(245,158,11,0.50);
      border-radius: 16px; padding: 14px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.80);
      z-index: 50;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      transform: translateY(150%); opacity: 0;
      transition: transform .38s cubic-bezier(0.16,1,0.3,1), opacity .38s ease;
    }
    .sticky-bar.visible { transform: translateY(0); opacity: 1; }
    .sticky-info { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
    .sticky-count { font-size: 12px; font-weight: 500; color: rgba(251,191,36,0.80); }
    .sticky-total { font-size: 18px; font-weight: 900; color: #fff; }
    .sticky-cta {
      display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0;
      font-size: 14px; font-weight: 700; color: #0a0a0a;
      background: var(--amber-500);
      padding: 10px 20px; border-radius: 12px; cursor: pointer; border: none;
      transition: background .2s ease, transform .12s ease;
    }
    .sticky-cta:hover { background: var(--amber-400); }
    .sticky-cta:active { transform: scale(0.95); }
    body.has-cart { padding-bottom: 96px; }  /* deja aire para que la barra no tape el footer */
  </style>
</head>
<body>
  <!-- ─────────────── HERO ─────────────── -->
  <header class="hero">
    <div class="hero-inner">
      <a id="backBtn" class="back-btn">
        <i class="ph-bold ph-arrow-left"></i> Volver a la reserva
      </a>
      <img class="hero-logo" src="/kronnos/viking-authentic.webp" alt="Viking Authentic Man">
      <p class="hero-tagline">El estándar de oro en cuidado para la barba, cabello y afeitado auténtico.</p>
      <span class="hero-badge"><i class="ph-fill ph-seal-check"></i> Embajador oficial · <span id="sedeName">Kronnos</span></span>
    </div>
  </header>

  <!-- ─────────────── CATÁLOGO ─────────────── -->
  <main class="catalog">
    <div class="section-label">Catálogo Viking</div>
    <div id="grid" class="grid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </main>

  <p class="foot-note">
    Productos disponibles en el local · <a id="waFoot" href="#" target="_blank" rel="noopener">Escríbenos por WhatsApp</a>
  </p>

  <!-- Barra flotante: aparece cuando hay ≥1 producto seleccionado para la cita -->
  <div id="stickyBar" class="sticky-bar" role="region" aria-label="Resumen de productos">
    <div class="sticky-info">
      <span id="stickyCount" class="sticky-count"></span>
      <span id="stickyTotal" class="sticky-total"></span>
    </div>
    <button id="stickyCta" class="sticky-cta" type="button">Confirmar y agendar <i class="ph-bold ph-arrow-right"></i></button>
  </div>

  <!-- Firebase (compat) + config del tenant -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="/config.js"></script>
  <script src="/firebase-config.js?v=1.3"></script>

  <script>
    (function () {
      'use strict';

      // ── Resolución de tenant/sede ─────────────────────────────
      // Prioridad: ?local= explícito → CURRENT_TENANT_ID (config.js: dominio/sessionStorage).
      var TENANT_ID = new URLSearchParams(location.search).get('local')
                   || window.CURRENT_TENANT_ID
                   || 'kronnos_penablanca';

      // Regla de negocio: Kronnos Woman NUNCA muestra Viking (marca masculina).
      if (TENANT_ID === 'kronnos_woman') {
        location.replace('/?local=kronnos_woman');
        return;
      }

      // ── Carrito compartido con la agenda (localStorage por sede) ──
      // Misma clave que index.html hidrata en el paso 4 (_selectedProducts).
      var CART_KEY = 'reservaProductos_' + TENANT_ID;
      var Cart = {
        load:  function () { try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; } catch (_) { return []; } },
        save:  function (a) { try { localStorage.setItem(CART_KEY, JSON.stringify(a || [])); } catch (_) {} },
        toggle: function (prod) {
          var a = this.load();
          var i = a.findIndex(function (p) { return p.id === prod.id; });
          if (i === -1) a.push(prod); else a.splice(i, 1);
          this.save(a);
          return i === -1;                 // true = quedó agregado
        },
        total: function () { return this.load().reduce(function (s, p) { return s + (Number(p.precio) || 0); }, 0); },
        count: function () { return this.load().length; },
      };

      var SHOP = window.SHOP || {};
      var sedeName = SHOP.nombreCorto || SHOP.nombre || 'Kronnos';
      document.getElementById('sedeName').textContent = sedeName;

      // WhatsApp de la sede (fallback: Instagram de Viking).
      var VIKING_IG = 'https://www.instagram.com/vikingbrand.chile/';
      var waDigits = String(SHOP.telefono || '').replace(/\D/g, '');
      function waLink(msg) {
        if (!waDigits) return VIKING_IG;
        return 'https://wa.me/' + waDigits + '?text=' + encodeURIComponent(msg);
      }
      var footWa = document.getElementById('waFoot');
      footWa.href = waLink('Hola ' + sedeName + '! Quiero consultar por los productos Viking.');

      // ── Volver a la reserva ───────────────────────────────────
      var back = document.getElementById('backBtn');
      var agendaHref = '/?local=' + encodeURIComponent(TENANT_ID);
      back.href = agendaHref;
      back.addEventListener('click', function (e) {
        e.preventDefault();
        if (history.length > 1) history.back();
        else location.href = agendaHref;
      });

      // ── Helpers ───────────────────────────────────────────────
      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
      function fmtPrice(n) { return '$' + Number(n).toLocaleString('es-CL'); }
      function isViking(p) {
        var m = (p.marca || '').toLowerCase();
        var n = (p.nombre || '').toLowerCase();
        return m === 'viking' || m.indexOf('viking') !== -1 || n.indexOf('viking') !== -1;
      }
      function stockBadge(p) {
        if (p.stock == null || p.stock === '') return '';
        var s = Number(p.stock);
        if (s <= 0)  return '<span class="stock-badge stock-out">Agotado</span>';
        if (s <= 3)  return '<span class="stock-badge stock-low">Últimas ' + s + '</span>';
        return '<span class="stock-badge stock-in">Disponible</span>';
      }
      function crossPill(p) {
        // Cross-selling real: se activa si el producto declara en qué servicio se usa
        // (campo `usadoEn` en el módulo de productos de gestión-interna). Sin dato → sin pill.
        var u = p.usadoEn || p.servicioRelacionado;
        if (!u) return '';
        return '<span class="cross-pill">✨ Usado en ' + esc(u) + '</span>';
      }

      function renderCards(prods) {
        var grid = document.getElementById('grid');
        if (!prods.length) { renderEmpty(); return; }
        grid.innerHTML = prods.map(function (p) {
          var out = p.stock != null && Number(p.stock) <= 0;
          var hasOffer = p.precioOriginal && p.precio && Number(p.precioOriginal) > Number(p.precio);
          var priceHtml = (p.precio != null && p.precio !== '')
            ? '<span class="price">' + fmtPrice(p.precio) + '</span>' +
              (hasOffer ? '<span class="price-orig">' + fmtPrice(p.precioOriginal) + '</span>' : '')
            : '<span class="price-consult">Consultar</span>';
          var hasPrice = (p.precio != null && p.precio !== '');
          var msg = 'Hola ' + sedeName + '! Me interesa el producto Viking "' + (p.nombre || '') + '"'
                  + (out ? '. ¿Cuándo tendrán stock?' : '. ¿Está disponible?');
          // In-stock con precio → selector "Agregar a cita"; si no, WhatsApp.
          var actionHtml = (!out && hasPrice)
            ? '<button class="add-btn" data-id="' + esc(p.id) + '" data-nombre="' + esc(p.nombre || 'Producto Viking') +
                '" data-precio="' + (Number(p.precio) || 0) + '" data-imagen="' + esc(p.imagen || '') + '">+ Agregar a cita</button>'
            : '<a class="buy-btn" href="' + waLink(msg) + '" target="_blank" rel="noopener">' +
                '<i class="ph-fill ph-whatsapp-logo"></i>' + (out ? 'Avísame' : 'Consultar') + '</a>';
          var imgHtml = p.imagen
            ? '<img src="' + esc(p.imagen) + '" alt="' + esc(p.nombre) + '" loading="lazy" decoding="async" class="img-loading" onload="this.classList.remove(\'img-loading\')" onerror="this.parentNode.innerHTML=\'<i class=&quot;ph-fill ph-drop-half card-img-ph&quot;></i>\'">'
            : '<i class="ph-fill ph-drop-half card-img-ph"></i>';
          return (
            '<article class="card">' +
              '<div>' +
                '<div class="card-img-wrap">' + imgHtml + stockBadge(p) + '</div>' +
                '<h3 class="card-name">' + esc(p.nombre || 'Producto Viking') + '</h3>' +
                (p.descripcion ? '<p class="card-desc">' + esc(p.descripcion) + '</p>' : '') +
                crossPill(p) +
              '</div>' +
              '<div class="card-foot">' +
                '<div class="price-wrap">' + priceHtml + '</div>' +
                actionHtml +
              '</div>' +
            '</article>'
          );
        }).join('');
        syncCartButtons();
        renderStickyBar();
      }

      // ── Selector de productos ↔ barra flotante ──
      function productFromBtn(btn) {
        return { id: btn.dataset.id, nombre: btn.dataset.nombre, precio: Number(btn.dataset.precio) || 0, imagen: btn.dataset.imagen || '' };
      }
      function setBtnState(btn, added) {
        btn.classList.toggle('active', added);
        btn.textContent = added ? '✓ Agregado' : '+ Agregar a cita';
      }
      function syncCartButtons() {
        var ids = {};
        Cart.load().forEach(function (p) { ids[p.id] = true; });
        document.querySelectorAll('.add-btn').forEach(function (btn) { setBtnState(btn, !!ids[btn.dataset.id]); });
      }
      function renderStickyBar() {
        var bar = document.getElementById('stickyBar');
        var n = Cart.count();
        if (!n) { bar.classList.remove('visible'); document.body.classList.remove('has-cart'); return; }
        document.getElementById('stickyCount').textContent = n + (n === 1 ? ' producto para tu cita' : ' productos para tu cita');
        document.getElementById('stickyTotal').textContent = '+ ' + fmtPrice(Cart.total());
        bar.classList.add('visible');
        document.body.classList.add('has-cart');
      }
      document.addEventListener('click', function (e) {
        var btn = e.target.closest && e.target.closest('.add-btn');
        if (!btn) return;
        setBtnState(btn, Cart.toggle(productFromBtn(btn)));
        renderStickyBar();
      });
      document.getElementById('stickyCta').addEventListener('click', function () {
        location.href = '/?local=' + encodeURIComponent(TENANT_ID);
      });
      renderStickyBar();  // por si vuelve con productos ya guardados

      function renderEmpty() {
        document.getElementById('grid').outerHTML =
          '<div class="empty">' +
            '<div class="empty-ic"><i class="ph-fill ph-drop-half"></i></div>' +
            '<h3>Catálogo en preparación</h3>' +
            '<p>Muy pronto encontrarás aquí la línea completa de productos Viking Authentic Man. ' +
               'Mientras tanto, consúltalos directamente con nosotros.</p>' +
            '<a class="empty-cta" href="' + waLink('Hola ' + sedeName + '! Quiero información de los productos Viking.') + '" target="_blank" rel="noopener">' +
              '<i class="ph-fill ph-whatsapp-logo"></i> Consultar productos' +
            '</a>' +
          '</div>';
      }

      // ── Carga desde Firestore (mismo inventario que gestión-interna) ──
      function prodCol() {
        return db.collection('tenants').doc(TENANT_ID).collection('productos');
      }
      prodCol().get()
        .then(function (snap) {
          var prods = snap.docs
            .map(function (d) { return Object.assign({ id: d.id }, d.data()); })
            .filter(function (p) { return p.activo !== false && isViking(p); })
            .sort(function (a, b) {
              // En stock primero; luego por precio ascendente.
              var ao = (a.stock != null && Number(a.stock) <= 0) ? 1 : 0;
              var bo = (b.stock != null && Number(b.stock) <= 0) ? 1 : 0;
              if (ao !== bo) return ao - bo;
              return (Number(a.precio) || 0) - (Number(b.precio) || 0);
            });
          renderCards(prods);
        })
        .catch(function (err) {
          console.error('viking catalog load error:', err);
          renderEmpty();
        });
    })();
  </script>
</body>
</html>
